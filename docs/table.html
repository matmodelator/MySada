
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Table</title>

  <!-- СТИЛЬ КОНСОЛИ -->
<link rel="stylesheet"
      href="styles/console.css" />

<link rel="stylesheet"
      href="styles/table.css" />

</head>

<body>

<header class="top-bar">

  <button id="createOrderBtn"
        class="create-order-btn"
        type="button">
  Create Order
</button>

  <div class="top-title">
    MySada Table
  </div>

  <div class="top-buttons">

    <button id="backBtn"
            type="button">
      Back to Hall
    </button>

    <button id="reloadBtn"
            type="button">
      Reload
    </button>

  </div>

</header>

<main class="container">

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">Project</div>
      <div id="projectBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Hall</div>
      <div id="hallBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table</div>
      <div id="tableBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table status</div>
      <div id="tableStatusBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User</div>
      <button id="userBox" class="info-value info-button" type="button">
  loading...
</button>
    </div>

  </section>

  <section class="orders-section">

    <div class="section-head">
      <div class="section-title">
        Today table orders
      </div>
    </div>

    <div id="ordersList"
         class="orders-list">
    </div>

  </section>

  <div id="status"
       class="status">
    Starting...
  </div>

</main>

<div id="service-console">

  <div class="row" id="build-top">
    TABLE PAGE | v1.0.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectBox =
  document.getElementById('projectBox')

const hallBox =
  document.getElementById('hallBox')

const tableBox =
  document.getElementById('tableBox')

const tableStatusBox =
  document.getElementById('tableStatusBox')

const userBox =
  document.getElementById('userBox')

const ordersList =
  document.getElementById('ordersList')

const statusBox =
  document.getElementById('status')

const createOrderBtn =
  document.getElementById('createOrderBtn')

const backBtn =
  document.getElementById('backBtn')

const reloadBtn =
  document.getElementById('reloadBtn')

let buildDown =
  document.getElementById('build-down')


/*
========================================
STATE
========================================
*/

let currentUser =
  null

let projectId =
  null

let hallId =
  null

let tableId =
  null

let projectName =
  'Project'

let hallName =
  'Hall'

let tableName =
  'Table'

let tableStatus =
  'unknown'


/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

/*
========================================
STATUS / LOG SYSTEM
========================================
*/

function setStatus(text) {

  const now = new Date()
  const time =
    now.toLocaleTimeString()

  const line =
    '[' + time + '] ' + text

  // 🔥 добавляем строку (а не перезаписываем)
  statusBox.innerHTML += line + '<br>'

  console.log('[TABLE]', text)

  updateBuildLine('ready')
}


/*
========================================
PARAMS
========================================
*/

function loadParams() {
  const params =
    new URLSearchParams(window.location.search)

  projectId =
    params.get('project_id')

  hallId =
    params.get('hall_id')

  tableId =
    params.get('table_id')

  if (!projectId)
    throw new Error('project_id is missing')

  if (!hallId)
    throw new Error('hall_id is missing')

  if (!tableId)
    throw new Error('table_id is missing')
}


/*
========================================
LOAD USER
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser =
    data.user

  // грузим данные из users
const { data: userData, error: userError } =
  await supabase
    .from('users')
    .select('user_number, name, role')
    .eq('user_id', currentUser.id)
    .single()

if (userError) {
  console.error(userError)
  userBox.textContent = currentUser.id
  return
}

// собираем только то, что есть
const parts = []

if (userData.name && userData.name.trim() !== '') {
  parts.push(userData.name)
}

if (userData.user_number) {
  parts.push('#' + userData.user_number)
}

if (userData.role && userData.role.trim() !== '') {
  parts.push(userData.role)
}

// если что-то есть → показываем
// если нет → fallback на id
userBox.textContent =
  parts.length
    ? parts.join(' | ')
    : currentUser.id
}


/*
========================================
LOAD CONTEXT
project / hall / table
========================================
*/

async function loadContext() {
  setStatus('Loading table context...')

  const { data: project, error: projectError } =
    await supabase
      .from('projects')
      .select('*')
      .eq('project_id', projectId)
      .maybeSingle()

  if (projectError)
    throw projectError

  if (project) {
    projectName =
      project.name || project.project_name || projectId
  }

  const { data: hall, error: hallError } =
    await supabase
      .from('halls')
      .select('*')
      .eq('hall_id', hallId)
      .maybeSingle()

  if (hallError)
    throw hallError

  if (hall) {
    hallName =
      hall.name || hallId
  }

  const { data: table, error: tableError } =
    await supabase
      .from('tables')
      .select('*')
      .eq('table_id', tableId)
      .maybeSingle()

  if (tableError)
    throw tableError

  if (table) {
    tableName =
      table.name || tableId

    tableStatus =
      table.table_status || table.status || 'unknown'
  }

  projectBox.textContent =
    projectName

  hallBox.textContent =
    hallName

  tableBox.textContent =
    tableName

  tableStatusBox.textContent =
    tableStatus
}


/*
========================================
TODAY RANGE
сегодня по локальному времени браузера
для фильтра created_at
========================================
*/

function getTodayRange() {
  const start =
    new Date()

  start.setHours(0, 0, 0, 0)

  const end =
    new Date(start)

  end.setDate(
    end.getDate() + 1
  )

  return {
    start: start.toISOString(),
    end: end.toISOString()
  }
}


/*
========================================
LOAD TABLE ORDERS
все заказы стола за текущий день:
open + closed
========================================
*/

async function loadOrders() {
  setStatus('Loading table orders...')

  ordersList.innerHTML =
    ''

  const range =
    getTodayRange()

  const { data, error } =
    await supabase
      .from('orders')
      .select(`
        *,
        items (*)
      `)
      .eq('project_id', projectId)
      .eq('hall_id', hallId)
      .eq('table_id', tableId)
      .gte('created_at', range.start)
      .lt('created_at', range.end)
      .order('order_number', { ascending: false })

  if (error)
    throw error

  if (!data || !data.length) {
    ordersList.innerHTML =
      '<div class="empty">No orders for this table today</div>'

    setStatus('No orders found')

    return
  }

  data.forEach(renderOrder)

  setStatus(
    'Orders loaded: ' + data.length
  )
}


/*
========================================
CREATE NEW ORDER
создаёт заказ, но НЕ открывает order.html
========================================
*/

async function createOrder() {
  try {

    if (!currentUser || !currentUser.id) {
      setStatus('User not loaded')
      return
    }

    createOrderBtn.disabled = true

    setStatus('Creating order...')

    const { data: orderNumber, error: numberError } =
      await supabase.rpc('generate_order_number', {
        p_hall_id: hallId
      })

    if (numberError)
      throw numberError

    const { data: orderData, error: orderError } =
      await supabase
        .from('orders')
        .insert({
          project_id: projectId,
          hall_id: hallId,
          table_id: tableId,
          user_id: currentUser.id,
          guest_count: 0,
          order_status: 'open',
          order_number: orderNumber
        })
        .select()
        .single()

    if (orderError)
      throw orderError

    const { error: tableError } =
      await supabase
        .from('tables')
        .update({
          table_status: 'occupied'
        })
        .eq('table_id', tableId)

    if (tableError)
      throw tableError

    // 🔥 ВАЖНО: НЕ ПЕРЕХОДИМ
    setStatus('ORDER CREATED: ' + orderData.order_id)

    // 🔥 ОБНОВЛЯЕМ СПИСОК
    await loadOrders()

    createOrderBtn.disabled = false

  } catch (err) {

    console.error(err)

    createOrderBtn.disabled = false

    setStatus('Create order error: ' + err.message)
  }
}
      
/*
========================================
CLOSE ORDER
закрывает заказ
если open orders больше нет — table free
========================================
*/

async function closeOrder(order) {
  try {
    setStatus('Closing order...')

    const orderId =
      order.order_id || order.id

    const { error: closeError } =
      await supabase
        .from('orders')
        .update({
          order_status: 'closed',
          closed_at: new Date().toISOString()
        })
        .eq('order_id', orderId)

    if (closeError)
      throw closeError

    const { data: openOrders, error: openError } =
      await supabase
        .from('orders')
        .select('order_id')
        .eq('table_id', tableId)
        .eq('order_status', 'open')

    if (openError)
      throw openError

    if (!openOrders || !openOrders.length) {
      const { error: tableError } =
        await supabase
          .from('tables')
          .update({
            table_status: 'free'
          })
          .eq('table_id', tableId)

      if (tableError)
        throw tableError
    }

    await loadContext()
    await loadOrders()

    setStatus('Order closed')
  }
  catch (err) {
    console.error(err)

    setStatus(
      'Close order error: ' + err.message
    )
  }
}


/*
========================================
RENDER ORDER CARD
карта заказа в списке стола
========================================
*/

function renderOrder(order) {
  const status =
    order.order_status || order.status || 'open'

  const card =
    document.createElement('article')

  card.className =
    'order-card ' + status

  if (status !== 'open') {
    card.classList.add('collapsed')
  }

  const head =
    document.createElement('div')

  head.className =
    'order-head'

  const main =
    document.createElement('div')

  main.className =
    'order-main'

  const number =
    document.createElement('div')

  number.className =
    'order-number'

  number.textContent =
    'Order #'
    + (
      order.order_number
      || order.order_id
      || order.id
      || '-'
    )

  const meta =
    document.createElement('div')

  meta.className =
    'order-meta'

  meta.textContent =
    status
    + ' | opened: '
    + formatDate(order.opened_at || order.created_at)

  main.appendChild(number)
  main.appendChild(meta)

  const actions =
    document.createElement('div')

  actions.className =
    'order-actions'

  const total =
    document.createElement('div')

  total.className =
    'order-total'

  total.textContent =
    order.total ?? '0'

  const goBtn =
    document.createElement('button')

  goBtn.className =
    'go-btn'

  goBtn.type =
    'button'

  goBtn.textContent =
    status === 'open'
      ? 'Edit'
      : 'Open'

  goBtn.addEventListener(
    'click',
    () => goToOrder(order)
  )

  const toggleBtn =
    document.createElement('button')

  toggleBtn.className =
    'toggle-btn'

  toggleBtn.type =
    'button'

  toggleBtn.textContent =
    status === 'open'
      ? 'Hide'
      : 'Show'

  toggleBtn.addEventListener(
    'click',
    () => {
      card.classList.toggle('collapsed')

      toggleBtn.textContent =
        card.classList.contains('collapsed')
          ? 'Show'
          : 'Hide'
    }
  )

  actions.appendChild(total)
  actions.appendChild(goBtn)

  if (status === 'open') {
    const closeBtn =
      document.createElement('button')

    closeBtn.className =
      'close-btn'

    closeBtn.type =
      'button'

    closeBtn.textContent =
      'Close'

    closeBtn.addEventListener(
      'click',
      () => closeOrder(order)
    )

    actions.appendChild(closeBtn)
  }

  actions.appendChild(toggleBtn)

  head.appendChild(main)
  head.appendChild(actions)

  const body =
    document.createElement('div')

  body.className =
    'order-body'

  body.appendChild(
    renderItems(order.items || [])
  )

  card.appendChild(head)
  card.appendChild(body)

  ordersList.appendChild(card)
}


/*
========================================
RENDER ITEMS
позиции заказа
========================================
*/

function renderItems(items) {
  const box =
    document.createElement('div')

  box.className =
    'order-items'

  const title =
    document.createElement('div')

  title.className =
    'order-item-row title'

  title.innerHTML =
    `
      <span>Name</span>
      <span>Qty</span>
      <span>Price</span>
      <span>Sum</span>
    `

  box.appendChild(title)

  if (!items.length) {
    const empty =
      document.createElement('div')

    empty.className =
      'empty'

    empty.textContent =
      'No positions'

    box.appendChild(empty)

    return box
  }

  items.forEach(item => {
    const qty =
      Number(item.qty || item.quantity || 1)

    const price =
      Number(item.price || 0)

    const sum =
      qty * price

    const row =
      document.createElement('div')

    row.className =
      'order-item-row'

    row.innerHTML =
      `
        <span>${escapeHtml(item.name || item.title || 'Item')}</span>
        <span>${qty}</span>
        <span>${price}</span>
        <span>${sum}</span>
      `

    box.appendChild(row)
  })

  return box
}


/*
========================================
GO TO ORDER
переход в редактор одного заказа
========================================
*/

function goToOrder(order) {
  const orderId =
    order.order_id || order.id

  window.location.href =
    'order.html'
    + '?project_id='
    + encodeURIComponent(projectId)
    + '&hall_id='
    + encodeURIComponent(hallId)
    + '&table_id='
    + encodeURIComponent(tableId)
    + '&order_id='
    + encodeURIComponent(orderId)
}
    
/*
========================================
FORMAT DATE
========================================
*/

function formatDate(value) {
  if (!value)
    return '-'

  const date =
    new Date(value)

  if (Number.isNaN(date.getTime()))
    return value

  return date.toLocaleString()
}


/*
========================================
ESCAPE HTML
========================================
*/

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}


/*
========================================
BUTTONS
========================================
*/

createOrderBtn.addEventListener(
  'click',
  createOrder
)

backBtn.addEventListener(
  'click',
  () => {
    window.location.href =
      'hall.html'
      + '?project_id='
      + encodeURIComponent(projectId)
      + '&hall_id='
      + encodeURIComponent(hallId)
  }
)

// USER CLICK → user.html
if (userBox) {
  userBox.addEventListener('click', () => {
    window.location.href = 'user.html';
  });
}
      
reloadBtn.addEventListener(
  'click',
  async () => {
    try {
      await loadContext()
      await loadOrders()
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Reload error: ' + err.message
      )
    }
  }
)
    
/*
========================================
INIT
========================================
*/

async function init() {
  try {
    loadParams()

    await loadUser()

    await loadContext()

    await loadOrders()
  }
  catch (err) {
    console.error('TABLE INIT ERROR:', err)

    setStatus(
      'Table error: ' + err.message
    )
  }
}

init()

</script>



<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

    createOrder fix  | v1.3.3

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>


</body>
</html>
