
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada User</title>

<!-- те же стили -->
<link rel="stylesheet" href="styles/console.css" />
<link rel="stylesheet" href="styles/table.css" />

</head>

<body>

<header class="top-bar">

  <div class="top-title">
    MySada User
  </div>

  <div class="top-buttons">

    <button id="backBtn" type="button">
      Back
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>

  </div>

</header>

<main class="container">

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">User</div>
      <div id="userBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User ID</div>
      <div id="userIdBox" class="info-value">loading...</div>
    </div>

  </section>

  <section class="orders-section">

    <div class="section-head">
      <div class="section-title">
        Today user orders
      </div>
    </div>

    <div id="ordersList"
         class="orders-list">
    </div>

  </section>

  <div id="status"
       class="status">
    Starting...
  </div>

</main>

<div id="service-console">
  <div class="row" id="build-top">
    USER PAGE | v1.0.0
  </div>
  <div class="row" id="build-down">
    deploy: --
  </div>
</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const userBox =
  document.getElementById('userBox')

const userIdBox =
  document.getElementById('userIdBox')

const ordersList =
  document.getElementById('ordersList')

const statusBox =
  document.getElementById('status')

const backBtn =
  document.getElementById('backBtn')

const reloadBtn =
  document.getElementById('reloadBtn')

let buildDown =
  document.getElementById('build-down')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  if (!buildDown)
    return

  const now = new Date()
  const pad = n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate()) + '.'
    + pad(now.getMonth() + 1) + '.'
    + now.getFullYear() + ' '
    + pad(now.getHours()) + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

function setStatus(text) {
  statusBox.textContent = text
  console.log('[USER]', text)
  updateBuildLine(text)
}

/*
========================================
LOAD USER
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error) throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser = data.user

  userBox.textContent =
    currentUser.email || currentUser.id

  userIdBox.textContent =
    currentUser.id
}

/*
========================================
TODAY RANGE
========================================
*/

function getTodayRange() {
  const start = new Date()
  start.setHours(0, 0, 0, 0)

  const end = new Date(start)
  end.setDate(end.getDate() + 1)

  return {
    start: start.toISOString(),
    end: end.toISOString()
  }
}

/*
========================================
LOAD USER ORDERS
========================================
*/

async function loadOrders() {
  setStatus('Loading user orders...')

  ordersList.innerHTML = ''

  const range = getTodayRange()

  const { data, error } =
    await supabase
      .from('orders')
      .select(`
        *,
        items (*)
      `)
      .eq('user_id', currentUser.id)   // 🔥 КЛЮЧЕВОЕ
      .gte('created_at', range.start)
      .lt('created_at', range.end)
      .order('order_number', { ascending: false })

  if (error) throw error

  if (!data || !data.length) {
    ordersList.innerHTML =
      '<div class="empty">No orders today</div>'

    setStatus('No orders found')
    return
  }

  data.forEach(renderOrder)

  setStatus('Orders loaded: ' + data.length)
}

/*
========================================
RENDER ORDER (ТОТ ЖЕ)
========================================
*/

function renderOrder(order) {
  const status = order.order_status || 'open'

  const card = document.createElement('article')
  card.className = 'order-card ' + status

  if (status !== 'open')
    card.classList.add('collapsed')

  const head = document.createElement('div')
  head.className = 'order-head'

  const main = document.createElement('div')
  main.className = 'order-main'

  const number = document.createElement('div')
  number.className = 'order-number'
  number.textContent =
    'Order #' + (order.order_number || order.id)

  const meta = document.createElement('div')
  meta.className = 'order-meta'
  meta.textContent =
    status + ' | ' + formatDate(order.created_at)

  main.appendChild(number)
  main.appendChild(meta)

  const actions = document.createElement('div')
  actions.className = 'order-actions'

  const total = document.createElement('div')
  total.className = 'order-total'
  total.textContent = order.total ?? '0'

  const goBtn = document.createElement('button')
  goBtn.className = 'go-btn'
  goBtn.textContent = 'Open'

  goBtn.addEventListener('click', () => {
    window.location.href =
      'order.html?order_id='
      + encodeURIComponent(order.order_id || order.id)
  })

  actions.appendChild(total)
  actions.appendChild(goBtn)

  head.appendChild(main)
  head.appendChild(actions)

  const body = document.createElement('div')
  body.className = 'order-body'
  body.appendChild(renderItems(order.items || []))

  card.appendChild(head)
  card.appendChild(body)

  ordersList.appendChild(card)
}

/*
========================================
RENDER ITEMS
========================================
*/

function renderItems(items) {
  const box = document.createElement('div')
  box.className = 'order-items'

  if (!items.length) {
    const empty = document.createElement('div')
    empty.className = 'empty'
    empty.textContent = 'No positions'
    box.appendChild(empty)
    return box
  }

  items.forEach(item => {
    const row = document.createElement('div')
    row.className = 'order-item-row'

    row.innerHTML = `
      <span>${escapeHtml(item.name || 'Item')}</span>
      <span>${item.qty || 1}</span>
      <span>${item.price || 0}</span>
      <span>${(item.qty || 1)*(item.price || 0)}</span>
    `

    box.appendChild(row)
  })

  return box
}

/*
========================================
UTILS
========================================
*/

function formatDate(v) {
  return v ? new Date(v).toLocaleString() : '-'
}

function escapeHtml(v) {
  return String(v)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
}

/*
========================================
BUTTONS
========================================
*/

backBtn.addEventListener('click', () => {
  window.history.back()
})

reloadBtn.addEventListener('click', async () => {
  await loadOrders()
})

/*
========================================
INIT
========================================
*/

async function init() {
  try {
    await loadUser()
    await loadOrders()
  } catch (err) {
    console.error(err)
    setStatus(err.message)
  }
}

init()

</script>



<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

   created by gpt from tavle.html | v1.0.0

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>


</body>
</html>
