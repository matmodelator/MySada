


<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>План зала — canvas</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f6;
      color: #243447;
    }
    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .toolbar button {
      border: 1px solid #b8c2cf;
      background: white;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f7f9fc; }
    .toolbar .hint { color: #5b6b7f; font-size: 14px; }
    .wrap {
      background: white;
      border: 1px solid #c3ccd8;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: auto;
    }
    canvas {
      display: block;
      width: 100%;
      max-width: 1460px;
      height: auto;
      border-radius: 10px;
      background: #f7f9fc;
      touch-action: none;
    }
    .legend {
      margin-top: 10px;
      color: #5b6b7f;
      font-size: 14px;
    }
    .console {
      margin-top: 14px;
      background: #10151c;
      color: #dbe7f5;
      border-radius: 14px;
      padding: 14px 16px;
      font-family: Consolas, Monaco, monospace;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .console-title {
      font-size: 14px;
      color: #8fb7ff;
      margin-bottom: 10px;
    }
    .console-line {
      padding: 3px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .console-line.error {
      color: #ff8b8b;
      font-weight: 700;
    }
    code {
      background: #eef3f8;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button id="undo">Отменить</button>
      <button id="reset">Сбросить</button>
      <button id="export">Показать JSON</button>
      <span class="hint">Тяни стол мышкой со склада или по плану. Клик по столу — сменить номер. Двойной клик по столу — удалить.</span>
    </div>

    <div class="wrap">
      <canvas id="plan" width="1460" height="1040"></canvas>
    </div>

    <div class="legend">
      Зоны: <code>hall</code>, <code>terrace_top</code>, <code>terrace_bottom</code>, <code>terrace_left</code>, <code>terrace_right</code>
    </div>

    <div class="console" id="consoleBox">
      <div class="console-title">Консоль столов</div>
      <div id="consoleLines"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('plan');
    const ctx = canvas.getContext('2d');
    const consoleLines = document.getElementById('consoleLines');

    const base = {
      outer: { x: 40, y: 40, w: 1380, h: 960 },
      ring: { x: 120, y: 140, w: 1120, h: 700 },
      hall: { x: 300, y: 250, w: 760, h: 480 },
      stock: { x: 1265, y: 70, w: 120, h: 300 }
    };

    const zones = {
      hall: { x: base.hall.x, y: base.hall.y, w: base.hall.w, h: base.hall.h },
      terrace_top: {
        x: base.ring.x,
        y: base.ring.y,
        w: base.ring.w,
        h: base.hall.y - base.ring.y
      },
      terrace_bottom: {
        x: base.ring.x,
        y: base.hall.y + base.hall.h,
        w: base.ring.w,
        h: base.ring.y + base.ring.h - (base.hall.y + base.hall.h)
      },
      terrace_left: {
        x: base.ring.x,
        y: base.hall.y,
        w: base.hall.x - base.ring.x,
        h: base.hall.h
      },
      terrace_right: {
        x: base.hall.x + base.hall.w,
        y: base.hall.y,
        w: base.ring.x + base.ring.w - (base.hall.x + base.hall.w),
        h: base.hall.h
      }
    };

    const stockItems = [
      { id: 'stock_round', type: 'round', x: 1325, y: 165, size: 64, seats: 2, label: 'round' },
      { id: 'stock_square', type: 'square', x: 1325, y: 255, size: 68, seats: 4, label: 'square' },
      { id: 'stock_half_square', type: 'half_square', x: 1325, y: 350, size: 78, seats: 6, label: 'half square' }
    ];

    let scale = 1;
    let tables = [
      { id: 1, type: 'square', x: 390, y: 360, size: 68, seats: 4 },
      { id: 2, type: 'round', x: 690, y: 420, size: 64, seats: 2 },
      { id: 3, type: 'half_square', x: 180, y: 180, size: 78, seats: 6 },
      { id: 4, type: 'round', x: 1140, y: 780, size: 64, seats: 2 }
    ];

    let drag = null;
    let nextId = 5;
    let history = [];

    function cloneTables() {
      return JSON.parse(JSON.stringify(tables));
    }

    function pushHistory() {
      history.push(cloneTables());
      if (history.length > 80) history.shift();
    }

    function screenToWorld(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) * (canvas.width / rect.width) / scale;
      const y = (clientY - rect.top) * (canvas.height / rect.height) / scale;
      return { x, y };
    }

    function pointInRect(p, r) {
      return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
    }

    function getZoneName(table) {
      const p = { x: table.x, y: table.y };
      for (const [name, rect] of Object.entries(zones)) {
        if (pointInRect(p, rect)) return name;
      }
      return 'outside';
    }

    function drawTileArea(r) {
      ctx.fillStyle = '#d9dde3';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = '#b9c1cb';
      ctx.lineWidth = 1;
      for (let x = r.x; x <= r.x + r.w; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, r.y);
        ctx.lineTo(x, r.y + r.h);
        ctx.stroke();
      }
      for (let y = r.y; y <= r.y + r.h; y += 40) {
        ctx.beginPath();
        ctx.moveTo(r.x, y);
        ctx.lineTo(r.x + r.w, y);
        ctx.stroke();
      }
    }

    function drawWoodArea(r) {
      ctx.fillStyle = '#efd8b4';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = '#e0c39a';
      ctx.lineWidth = 1;
      for (let y = r.y; y <= r.y + r.h; y += 18) {
        ctx.beginPath();
        ctx.moveTo(r.x, y);
        ctx.lineTo(r.x + r.w, y);
        ctx.stroke();
      }
      for (let x = r.x; x <= r.x + r.w; x += 110) {
        ctx.beginPath();
        ctx.moveTo(x, r.y);
        ctx.lineTo(x, r.y + r.h);
        ctx.stroke();
      }
    }

    function drawZoneLabel(text, x, y) {
      ctx.fillStyle = '#67788d';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(text, x, y);
    }

    function getDuplicateIds() {
      const counts = {};
      tables.forEach(t => {
        const key = String(t.id);
        counts[key] = (counts[key] || 0) + 1;
      });
      return new Set(Object.keys(counts).filter(key => counts[key] > 1));
    }

    function drawHalfSquareShape(x, y, size) {
      const w = size;
      const h = Math.round(size * 0.62);
      const r = 10;
      roundRect(x - w / 2, y - h / 2, w, h, r, true, false);
    }

    function drawTableShape(t, fillColor) {
      ctx.fillStyle = fillColor;
      if (t.type === 'square') {
        ctx.fillRect(t.x - t.size / 2, t.y - t.size / 2, t.size, t.size);
      } else if (t.type === 'round') {
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        drawHalfSquareShape(t.x, t.y, t.size);
      }
    }

    function drawTable(t) {
      const zone = getZoneName(t);
      const isOutside = zone === 'outside';
      const duplicateIds = getDuplicateIds();
      const isDuplicate = duplicateIds.has(String(t.id));
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.18)';
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 4;
      let color = '#4d87c7';
      if (t.type === 'round') color = '#7aa65a';
      if (t.type === 'half_square') color = '#9b7bd1';
      if (isOutside) color = '#d95f5f';
      if (isDuplicate) color = '#e24848';
      drawTableShape(t, color);
      ctx.restore();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(t.id), t.x, t.y);

      ctx.fillStyle = isDuplicate ? '#e24848' : '#243447';
      ctx.font = '14px Arial';
      ctx.fillText(zone, t.x, t.y + t.size / 2 + 18);
    }

    function drawStockItem(item) {
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.12)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 3;
      const color = item.type === 'round' ? '#7aa65a' : item.type === 'square' ? '#4d87c7' : '#9b7bd1';
      drawTableShape(item, color);
      ctx.restore();

      ctx.fillStyle = '#243447';
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(item.label, item.x, item.y + item.size / 2 + 16);
      ctx.font = '12px Arial';
      ctx.fillText(item.seats + ' seats', item.x, item.y + item.size / 2 + 32);
    }

    function draw() {
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#eef1f6';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#f7f9fc';
      roundRect(base.outer.x, base.outer.y, base.outer.w, base.outer.h, 18, true, false);
      ctx.strokeStyle = '#bcc6d3';
      ctx.lineWidth = 3;
      roundRect(base.outer.x, base.outer.y, base.outer.w, base.outer.h, 18, false, true);

      drawTileArea(base.ring);

      ctx.fillStyle = '#f7f9fc';
      ctx.fillRect(base.hall.x - 4, base.hall.y - 4, base.hall.w + 8, base.hall.h + 8);
      drawWoodArea(base.hall);
      ctx.strokeStyle = '#4b5563';
      ctx.lineWidth = 8;
      ctx.strokeRect(base.hall.x, base.hall.y, base.hall.w, base.hall.h);

      ctx.fillStyle = '#35506f';
      ctx.font = 'bold 34px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('План зала', 90, 105);

      ctx.fillStyle = '#f3f6fb';
      roundRect(base.stock.x, base.stock.y, base.stock.w, base.stock.h, 14, true, false);
      ctx.strokeStyle = '#c0cad7';
      ctx.lineWidth = 2;
      roundRect(base.stock.x, base.stock.y, base.stock.w, base.stock.h, 14, false, true);
      ctx.fillStyle = '#35506f';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Склад столов', base.stock.x + base.stock.w / 2, base.stock.y + 28);

      drawZoneLabel('УЛИЦА — ВЕРХ', 680, 195);
      drawZoneLabel('УЛИЦА — НИЗ', 680, 820);

      ctx.save();
      ctx.translate(175, 490);
      ctx.rotate(-Math.PI / 2);
      drawZoneLabel('УЛИЦА — ЛЕВО', 0, 0);
      ctx.restore();

      ctx.save();
      ctx.translate(1185, 490);
      ctx.rotate(Math.PI / 2);
      drawZoneLabel('УЛИЦА — ПРАВО', 0, 0);
      ctx.restore();

      ctx.fillStyle = 'rgba(122,90,45,0.35)';
      ctx.font = 'bold 52px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('ЗАЛ', 680, 505);

      stockItems.forEach(drawStockItem);
      tables.forEach(drawTable);
      renderConsole();
    }

    function roundRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function isInsideHalfSquare(p, t) {
      const w = t.size;
      const h = Math.round(t.size * 0.62);
      return p.x >= t.x - w / 2 && p.x <= t.x + w / 2 && p.y >= t.y - h / 2 && p.y <= t.y + h / 2;
    }

    function findTable(p) {
      for (let i = tables.length - 1; i >= 0; i--) {
        const t = tables[i];
        if (t.type === 'square') {
          const half = t.size / 2;
          if (p.x >= t.x - half && p.x <= t.x + half && p.y >= t.y - half && p.y <= t.y + half) return i;
        } else if (t.type === 'round') {
          const dx = p.x - t.x;
          const dy = p.y - t.y;
          if (Math.sqrt(dx * dx + dy * dy) <= t.size / 2) return i;
        } else if (isInsideHalfSquare(p, t)) {
          return i;
        }
      }
      return -1;
    }

    function findStockItem(p) {
      for (let i = stockItems.length - 1; i >= 0; i--) {
        const t = stockItems[i];
        if (t.type === 'square') {
          const half = t.size / 2;
          if (p.x >= t.x - half && p.x <= t.x + half && p.y >= t.y - half && p.y <= t.y + half) return i;
        } else if (t.type === 'round') {
          const dx = p.x - t.x;
          const dy = p.y - t.y;
          if (Math.sqrt(dx * dx + dy * dy) <= t.size / 2) return i;
        } else {
          if (isInsideHalfSquare(p, t)) return i;
        }
      }
      return -1;
    }

    function renderConsole() {
      const duplicateIds = getDuplicateIds();
      const groups = {
        round: [],
        square: [],
        half_square: []
      };

      tables.forEach(t => groups[t.type].push(t));
      Object.values(groups).forEach(arr => arr.sort((a, b) => Number(a.id) - Number(b.id)));

      const lines = [];
      lines.push({ text: 'round / 2 place: ' + (groups.round.length ? groups.round.map(t => '#' + t.id + ' [' + getZoneName(t) + ']').join(', ') : '—') });
      lines.push({ text: 'square / 4 place: ' + (groups.square.length ? groups.square.map(t => '#' + t.id + ' [' + getZoneName(t) + ']').join(', ') : '—') });
      lines.push({ text: 'half square / 6 place: ' + (groups.half_square.length ? groups.half_square.map(t => '#' + t.id + ' [' + getZoneName(t) + ']').join(', ') : '—') });

      if (duplicateIds.size) {
        lines.push({ text: 'ERROR: duplicate number -> ' + Array.from(duplicateIds).join(', '), error: true });
      } else {
        lines.push({ text: 'OK: all table numbers are unique' });
      }

      const outsideCount = tables.filter(t => getZoneName(t) === 'outside').length;
      if (outsideCount) {
        lines.push({ text: 'WARNING: outside valid zones -> ' + outsideCount, error: true });
      }

      consoleLines.innerHTML = lines.map(line => '<div class="console-line' + (line.error ? ' error' : '') + '">' + escapeHtml(line.text) + '</div>').join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    canvas.addEventListener('pointerdown', (e) => {
      const p = screenToWorld(e.clientX, e.clientY);
      const index = findTable(p);
      if (index >= 0) {
        pushHistory();
        drag = { index, dx: p.x - tables[index].x, dy: p.y - tables[index].y, createdFromStock: false };
        canvas.setPointerCapture(e.pointerId);
        return;
      }

      const stockIndex = findStockItem(p);
      if (stockIndex >= 0) {
        pushHistory();
        const item = stockItems[stockIndex];
        const newTable = {
          id: nextId++,
          type: item.type,
          x: p.x,
          y: p.y,
          size: item.size,
          seats: item.seats
        };
        tables.push(newTable);
        drag = {
          index: tables.length - 1,
          dx: 0,
          dy: 0,
          createdFromStock: true
        };
        canvas.setPointerCapture(e.pointerId);
        draw();
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!drag) return;
      const p = screenToWorld(e.clientX, e.clientY);
      tables[drag.index].x = p.x - drag.dx;
      tables[drag.index].y = p.y - drag.dy;
      draw();
    });

    canvas.addEventListener('pointerup', () => {
      drag = null;
    });

    canvas.addEventListener('click', (e) => {
      const p = screenToWorld(e.clientX, e.clientY);
      const index = findTable(p);
      if (index < 0) return;
      if (drag) return;
      const current = tables[index];
      const value = prompt('Номер стола', String(current.id));
      if (value === null) return;
      const clean = value.trim();
      if (!clean) return;
      pushHistory();
      current.id = clean;
      draw();
    });

    canvas.addEventListener('dblclick', (e) => {
      const p = screenToWorld(e.clientX, e.clientY);
      const index = findTable(p);
      if (index >= 0) {
        pushHistory();
        tables.splice(index, 1);
        draw();
      }
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      scale += e.deltaY < 0 ? 0.05 : -0.05;
      scale = Math.max(0.6, Math.min(1.6, scale));
      draw();
    }, { passive: false });

    document.getElementById('undo').addEventListener('click', () => {
      if (!history.length) return;
      tables = history.pop();
      const ids = tables
        .map(t => parseInt(t.id, 10))
        .filter(n => !Number.isNaN(n));
      nextId = ids.length ? Math.max(...ids) + 1 : tables.length + 1;
      draw();
    });

    document.getElementById('reset').addEventListener('click', () => {
      pushHistory();
      scale = 1;
      tables = [];
      nextId = 1;
      draw();
    });

    document.getElementById('export').addEventListener('click', () => {
      const data = tables.map(t => ({ ...t, zone: getZoneName(t) }));
      alert(JSON.stringify(data, null, 2));
    });

    draw();
  </script>




<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

    рабочий вход с обезьянкой и повтором пароля | v1.1.0

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

</body>
</html>
