<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Order</title>

<link rel="stylesheet" href="styles/console.css" />
<link rel="stylesheet" href="styles/order.css" />

</head>

<body>

<header class="top-bar">

  <div class="left-actions">

    <button id="changeTableBtn"
            class="change-table-btn"
            type="button">
      Change Table
    </button>

    <button id="splitBillBtn"
            class="split-bill-btn"
            type="button">
      Split Check
    </button>

    <button id="printBillBtn"
            class="print-bill-btn"
            type="button">
      Print Check
    </button>

    <button id="closeOrderBtn"
            class="close-order-btn"
            type="button">
      Close Order
    </button>

  </div>

  <div class="top-title">
    MySada Order
  </div>

  <div class="top-buttons">

    <button id="backBtn" type="button">
      Back to Hall
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>

  </div>

</header>

<main class="container">

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">Project</div>
      <div id="projectBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Hall</div>
      <div id="hallBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table</div>
      <div id="tableBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User</div>
      <div id="userBox" class="info-value">loading...</div>
    </div>

  </section>

  <section class="order-card">

    <div class="order-head">

      <div style="display:flex; justify-content:space-between; width:100%;">

        <strong id="orderTitle">
          Check
        </strong>

        <span id="orderTime" style="font-size:12px; opacity:0.9;">
          --
        </span>

      </div>

    </div>

    <div class="order-body">

      <div class="order-row order-row-title">
        <span>Position</span>
        <span>Qty</span>
        <span>Price</span>
        <span>Sum</span>
      </div>

      <div id="orderItems"></div>

      <button id="addItemBtn" type="button">
        + Add position
      </button>

      <div id="orderSummary" style="margin-top:15px;">

        <div>
          Subtotal: <span id="subTotal">0</span>
        </div>

        <div>
          <span id="serviceLabel">Service</span>:
          <span id="serviceTotal">0</span>
        </div>

        <div style="font-weight:bold; font-size:16px; margin-top:6px;">
          TOTAL: <span id="finalTotal">0</span>
        </div>

      </div>

    </div>

  </section>

  <div id="status" class="status">
    Starting...
  </div>

</main>

<script type="module">

const DEBUG_IDS =
  true

const SERVICE_PERCENT =
  10

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectBox =
  document.getElementById('projectBox')

const hallBox =
  document.getElementById('hallBox')

const tableBox =
  document.getElementById('tableBox')

const userBox =
  document.getElementById('userBox')

const statusBox =
  document.getElementById('status')

const itemsBox =
  document.getElementById('orderItems')

const addBtn =
  document.getElementById('addItemBtn')

const orderTitle =
  document.getElementById('orderTitle')

const orderTime =
  document.getElementById('orderTime')

const subTotalBox =
  document.getElementById('subTotal')

const serviceBox =
  document.getElementById('serviceTotal')

const finalBox =
  document.getElementById('finalTotal')

const serviceLabel =
  document.getElementById('serviceLabel')

const changeTableBtn =
  document.getElementById('changeTableBtn')

const splitBillBtn =
  document.getElementById('splitBillBtn')

const printBillBtn =
  document.getElementById('printBillBtn')

const closeOrderBtn =
  document.getElementById('closeOrderBtn')

const backBtn =
  document.getElementById('backBtn')

const reloadBtn =
  document.getElementById('reloadBtn')

let buildDown =
  document.getElementById('build-down')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let orderId =
  null

let currentOrder =
  null

serviceLabel.textContent =
  'Service ' + SERVICE_PERCENT + '%'

/*
========================================
BUILD LINE
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

/*
========================================
STATUS
========================================
*/

function setStatus(text) {
  const now =
    new Date()

  const time =
    now.toLocaleTimeString()

  const line =
    '[' + time + '] ' + text

  statusBox.innerHTML +=
    line + '<br>'

  console.log(
    '[ORDER]',
    text
  )

  updateBuildLine(text)
}

/*
========================================
LOGS
реальные поля logs:
project_id, hall_id, table_id, order_id, user_id, action, message
========================================
*/

async function addConsoleLog(action, details = {}) {

  const row = {

    project_id:
      details.project_id || null,

    hall_id:
      details.hall_id || null,

    table_id:
      details.table_id || null,

    order_id:
      details.order_id || null,

    user_id:
      currentUser
        ? currentUser.id
        : null,

    action:
      action,

    message:
      details.message || ''
  }

  console.log(
    'LOG INSERT ROW:',
    row
  )

  const { data, error } =
    await supabase
      .from('logs')
      .insert(row)
      .select()
      .single()

  if (error) {

    console.error(
      'LOG INSERT ERROR:',
      error
    )

    setStatus(
      'LOG INSERT ERROR: '
      + error.message
    )

    throw error
  }

  console.log(
    'LOG INSERT OK:',
    data
  )

  setStatus(
    'LOG SAVED'
  )

  return data
}

/*
========================================
PARAMS
========================================
*/

function loadParams() {
  const params =
    new URLSearchParams(window.location.search)

  orderId =
    params.get('order_id')

  if (!orderId)
    throw new Error('order_id is missing')
}

/*
========================================
LOAD USER
========================================
*/

async function loadUser() {

  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  currentUser =
    data.user

  if (!currentUser)
    throw new Error('User not logged in')

  userBox.textContent =
    currentUser.email || currentUser.id
}

/*
========================================
LOAD CONTEXT
========================================
*/

async function loadContext(order) {

  setStatus('Loading order context...')

  const { data: project, error: projectError } =
    await supabase
      .from('projects')
      .select('name')
      .eq('project_id', order.project_id)
      .maybeSingle()

  if (projectError)
    throw projectError

  projectBox.textContent =
    project?.name || order.project_id

  const { data: hall, error: hallError } =
    await supabase
      .from('halls')
      .select('name')
      .eq('hall_id', order.hall_id)
      .maybeSingle()

  if (hallError)
    throw hallError

  hallBox.textContent =
    hall?.name || order.hall_id

  const { data: table, error: tableError } =
    await supabase
      .from('tables')
      .select('name')
      .eq('table_id', order.table_id)
      .maybeSingle()

  if (tableError)
    throw tableError

  tableBox.textContent =
    table?.name || order.table_id
}

/*
========================================
LOAD ORDER
========================================
*/

async function loadOrder() {

  setStatus('Loading order...')

  const { data, error } =
    await supabase
      .from('orders')
      .select('*')
      .eq('order_id', orderId)
      .single()

  if (error)
    throw error

  currentOrder =
    data

  await loadContext(data)

  renderOrder(data)

  setStatus(
    'Order loaded: '
    + (data.order_number || data.order_id)
  )
}

/*
========================================
RENDER ORDER
Opened at / Closed at
========================================
*/

function renderOrder(order) {

  let title =
    'Check #' + (order.order_number ?? '-')

  if (DEBUG_IDS) {
    title +=
      ' [' + order.order_id + ']'
  }

  orderTitle.textContent =
    title

  const openedAt =
    order.opened_at || order.created_at

  const closedAt =
    order.closed_at || null

  orderTime.innerHTML =
    `
      <div style="color:#dc2626; font-weight:700;">
        Opened at:
        ${
          openedAt
            ? new Date(openedAt).toLocaleString()
            : '-'
        }
      </div>

      ${
        closedAt
          ? `
            <div style="color:#16a34a; font-weight:700; margin-top:4px;">
              Closed at:
              ${new Date(closedAt).toLocaleString()}
            </div>
          `
          : ''
      }
    `

  itemsBox.innerHTML =
    ''

  addRow()
}

/*
========================================
CREATE ROW
========================================
*/

function createRow(name = '', qty = 1, price = 0) {

  const row =
    document.createElement('div')

  row.className =
    'order-row'

  row.innerHTML =
    `
      <input value="${escapeHtml(name)}" class="name">
      <input type="number" value="${qty}" class="qty">
      <input type="number" value="${price}" class="price">
      <span class="sum">${qty * price}</span>
    `

  row
    .querySelector('.qty')
    .addEventListener(
      'input',
      update
    )

  row
    .querySelector('.price')
    .addEventListener(
      'input',
      update
    )

  return row
}

function addRow() {
  itemsBox.appendChild(
    createRow()
  )

  update()
}

/*
========================================
TOTAL
========================================
*/

function update() {

  let subtotal =
    0

  itemsBox
    .querySelectorAll('.order-row')
    .forEach(row => {

      const qty =
        Number(row.querySelector('.qty').value) || 0

      const price =
        Number(row.querySelector('.price').value) || 0

      const sum =
        qty * price

      row.querySelector('.sum').textContent =
        sum

      subtotal +=
        sum
    })

  const service =
    subtotal * SERVICE_PERCENT / 100

  const total =
    subtotal + service

  subTotalBox.textContent =
    subtotal.toFixed(2)

  serviceBox.textContent =
    service.toFixed(2)

  finalBox.textContent =
    total.toFixed(2)
}

/*
========================================
CLOSE ORDER
========================================
*/

async function closeOrder() {

  try {

    if (!currentOrder)
      return

    setStatus('Closing order...')

    const { error: closeError } =
      await supabase
        .from('orders')
        .update({
          order_status: 'closed',
          closed_at: new Date().toISOString()
        })
        .eq('order_id', currentOrder.order_id)

    if (closeError)
      throw closeError

    const { data: openOrders, error: openError } =
      await supabase
        .from('orders')
        .select('order_id')
        .eq('table_id', currentOrder.table_id)
        .eq('order_status', 'open')

    if (openError)
      throw openError

    if (!openOrders || !openOrders.length) {
      const { error: tableError } =
        await supabase
          .from('tables')
          .update({
            table_status: 'free'
          })
          .eq('table_id', currentOrder.table_id)

      if (tableError)
        throw tableError
    }

    await addConsoleLog(
      'close order',
      {
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        order_id: currentOrder.order_id,
        message:
          'ORDER CLOSED: '
          + (currentOrder.order_number || currentOrder.order_id)
      }
    )

    setStatus('Order closed')

    closeOrderBtn.disabled =
      true

    await loadOrder()

  }
  catch (err) {

    console.error(err)

    setStatus(
      'Close order error: '
      + err.message
    )
  }
}

/*
========================================
CHANGE TABLE
выбор из свободных столов
========================================
*/

async function changeTable() {

  try {

    if (!currentOrder)
      return

    setStatus('Loading free tables...')

    const { data: freeTables, error: freeError } =
      await supabase
        .from('tables')
        .select('*')
        .eq('project_id', currentOrder.project_id)
        .eq('table_status', 'free')
        .order('name', { ascending: true })

    if (freeError)
      throw freeError

    if (!freeTables || !freeTables.length) {
      setStatus('No free tables')
      return
    }

    const listText =
      freeTables
        .map((table, index) =>
          (index + 1)
          + '. '
          + (table.name || table.table_id)
          + ' / '
          + table.table_id
        )
        .join('\n')

    const selected =
      Number(
        prompt(
          'Select free table:\n\n'
          + listText
        )
      )

    if (!selected || !freeTables[selected - 1]) {
      setStatus('Change table canceled')
      return
    }

    const newTable =
      freeTables[selected - 1]

    const oldTableId =
      currentOrder.table_id

    const { error: orderError } =
      await supabase
        .from('orders')
        .update({
          table_id: newTable.table_id,
          hall_id: newTable.hall_id
        })
        .eq('order_id', currentOrder.order_id)

    if (orderError)
      throw orderError

    const { error: newTableError } =
      await supabase
        .from('tables')
        .update({
          table_status: 'occupied'
        })
        .eq('table_id', newTable.table_id)

    if (newTableError)
      throw newTableError

    const { data: oldOpenOrders, error: oldOpenError } =
      await supabase
        .from('orders')
        .select('order_id')
        .eq('table_id', oldTableId)
        .eq('order_status', 'open')

    if (oldOpenError)
      throw oldOpenError

    if (!oldOpenOrders || !oldOpenOrders.length) {
      const { error: oldTableError } =
        await supabase
          .from('tables')
          .update({
            table_status: 'free'
          })
          .eq('table_id', oldTableId)

      if (oldTableError)
        throw oldTableError
    }

    await addConsoleLog(
      'change table',
      {
        project_id: currentOrder.project_id,
        hall_id: newTable.hall_id,
        table_id: newTable.table_id,
        order_id: currentOrder.order_id,
        message:
          'TABLE CHANGED: '
          + oldTableId
          + ' -> '
          + newTable.table_id
      }
    )

    await loadOrder()

    setStatus('Table changed')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Change table error: '
      + err.message
    )
  }
}

/*
========================================
SPLIT CHECK
закрывает старый check
и создает несколько новых open checks
========================================
*/

async function splitBill() {

  try {

    if (!currentOrder)
      return

    const count =
      Number(
        prompt('How many checks?')
      )

    if (!count || count < 2) {
      setStatus('Split canceled')
      return
    }

    setStatus('Splitting check...')

    const rows =
      []

    for (let i = 1; i <= count; i++) {
      rows.push({
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        user_id: currentUser ? currentUser.id : null,
        guest_count: 0,
        order_status: 'open'
      })
    }

    const { data: newOrders, error: insertError } =
      await supabase
        .from('orders')
        .insert(rows)
        .select()

    if (insertError)
      throw insertError

    const { error: closeError } =
      await supabase
        .from('orders')
        .update({
          order_status: 'closed',
          closed_at: new Date().toISOString()
        })
        .eq('order_id', currentOrder.order_id)

    if (closeError)
      throw closeError

    await addConsoleLog(
      'split check',
      {
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        order_id: currentOrder.order_id,
        message:
          'CHECK SPLIT: '
          + (
            currentOrder.order_number
            || currentOrder.order_id
          )
          + ' -> '
          + count
          + ' checks'
      }
    )

    setStatus(
      'Check split: '
      + count
    )

    await loadOrder()
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Split check error: '
      + err.message
    )
  }
}

/*
========================================
BUILD CHECK DATA
данные для файла печати
========================================
*/

function buildCheckData() {

  const items =
    []

  itemsBox
    .querySelectorAll('.order-row')
    .forEach(row => {

      const name =
        row.querySelector('.name')?.value || 'Item'

      const qty =
        Number(row.querySelector('.qty')?.value) || 0

      const price =
        Number(row.querySelector('.price')?.value) || 0

      items.push({
        name,
        qty,
        price,
        sum: qty * price
      })
    })

  return {
    order_id: currentOrder.order_id,
    order_number: currentOrder.order_number,
    project_id: currentOrder.project_id,
    hall_id: currentOrder.hall_id,
    table_id: currentOrder.table_id,
    opened_at: currentOrder.opened_at || currentOrder.created_at,
    closed_at: currentOrder.closed_at || null,
    items,
    subtotal: Number(subTotalBox.textContent) || 0,
    service_percent: SERVICE_PERCENT,
    service_total: Number(serviceBox.textContent) || 0,
    total: Number(finalBox.textContent) || 0
  }
}

/*
========================================
BUILD CHECK HTML
файл для печати
========================================
*/

function buildCheckHtml(checkData) {

  const itemsHtml =
    checkData.items
      .map(item => `
        <tr>
          <td>${escapeHtml(item.name)}</td>
          <td>${item.qty}</td>
          <td>${item.price.toFixed(2)}</td>
          <td>${item.sum.toFixed(2)}</td>
        </tr>
      `)
      .join('')

  return `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Check ${checkData.order_number || checkData.order_id}</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 24px;
  color: #111827;
}
h1 {
  margin-bottom: 10px;
}
.meta {
  margin-bottom: 4px;
}
.opened {
  color: #dc2626;
  font-weight: bold;
}
.closed {
  color: #16a34a;
  font-weight: bold;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th,
td {
  border: 1px solid #d1d5db;
  padding: 8px;
  text-align: left;
}
th {
  background: #f3f4f6;
}
.total-block {
  margin-top: 24px;
  text-align: right;
}
.total-final {
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>MySada Check</h1>

<div class="meta">
Check:
${checkData.order_number || checkData.order_id}
</div>

<div class="meta">
Project:
${escapeHtml(projectBox.textContent)}
</div>

<div class="meta">
Hall:
${escapeHtml(hallBox.textContent)}
</div>

<div class="meta">
Table:
${escapeHtml(tableBox.textContent)}
</div>

<div class="meta opened">
Opened at:
${
  checkData.opened_at
    ? new Date(checkData.opened_at).toLocaleString()
    : '-'
}
</div>

${
  checkData.closed_at
    ? `
      <div class="meta closed">
        Closed at:
        ${new Date(checkData.closed_at).toLocaleString()}
      </div>
    `
    : ''
}

<table>
<thead>
<tr>
  <th>Position</th>
  <th>Qty</th>
  <th>Price</th>
  <th>Sum</th>
</tr>
</thead>

<tbody>
${itemsHtml}
</tbody>
</table>

<div class="total-block">
  <div>Subtotal: ${checkData.subtotal.toFixed(2)}</div>
  <div>Service ${checkData.service_percent}%: ${checkData.service_total.toFixed(2)}</div>
  <div class="total-final">TOTAL: ${checkData.total.toFixed(2)}</div>
</div>

<script>
window.onload = function () {
  window.print()
}
<\/script>

</body>
</html>
`
}

/*
========================================
PRINT CHECK
создает HTML-файл для печати
========================================
*/

async function printBill() {

  try {

    if (!currentOrder)
      return

    setStatus('Preparing check file...')

    const checkData =
      buildCheckData()

    const htmlText =
      buildCheckHtml(checkData)

    const htmlBlob =
      new Blob(
        [htmlText],
        {
          type: 'text/html;charset=utf-8'
        }
      )

    const htmlUrl =
      URL.createObjectURL(htmlBlob)

    const htmlLink =
      document.createElement('a')

    htmlLink.href =
      htmlUrl

    htmlLink.download =
      'check-'
      + (
        currentOrder.order_number
        || currentOrder.order_id
      )
      + '.html'

    document.body.appendChild(htmlLink)

    htmlLink.click()

    htmlLink.remove()

    URL.revokeObjectURL(htmlUrl)

    await addConsoleLog(
      'print check',
      {
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        order_id: currentOrder.order_id,
        message:
          'CHECK FILE CREATED: '
          + (
            currentOrder.order_number
            || currentOrder.order_id
          )
      }
    )

    setStatus('Check file saved')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Print check error: '
      + err.message
    )
  }
}

/*
========================================
ESCAPE HTML
========================================
*/

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}

/*
========================================
BUTTONS
========================================
*/

addBtn.addEventListener(
  'click',
  addRow
)

changeTableBtn.addEventListener(
  'click',
  changeTable
)

splitBillBtn.addEventListener(
  'click',
  splitBill
)

printBillBtn.addEventListener(
  'click',
  printBill
)

closeOrderBtn.addEventListener(
  'click',
  closeOrder
)

backBtn.addEventListener(
  'click',
  () => {
    window.history.back()
  }
)

reloadBtn.addEventListener(
  'click',
  async () => {
    try {
      await loadOrder()
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Reload error: ' + err.message
      )
    }
  }
)

/*
========================================
INIT
========================================
*/

async function init() {
  try {
    statusBox.innerHTML =
      ''

    loadParams()

    await loadUser()

    await loadOrder()
  }
  catch (err) {
    console.error(
      'ORDER INIT ERROR:',
      err
    )

    setStatus(
      'Order error: ' + err.message
    )
  }
}

init()

</script>

(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
