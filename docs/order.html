<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Order</title>

<link rel="stylesheet" href="styles/console.css" />
<link rel="stylesheet" href="styles/order.css" />

</head>

<body>

<header class="top-bar">

  <div class="top-title">
    MySada Order
  </div>

  <div class="top-buttons">
    <button id="backBtn" type="button">
      Back to Hall
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>
  </div>

</header>

<main class="container">

  <!-- ========================================
       INFO PANEL
  ======================================== -->

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">Project</div>
      <div id="projectBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Hall</div>
      <div id="hallBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table</div>
      <div id="tableBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User</div>
      <div id="userBox" class="info-value">loading...</div>
    </div>

  </section>

  <!-- ========================================
       ORDER FORM
  ======================================== -->

  <section class="order-card">

    <div class="order-head">

      <strong id="orderTitle">
        Order
      </strong>

    </div>

    <div class="order-body">

      <div class="order-row order-row-title">
        <span>Position</span>
        <span>Qty</span>
        <span>Price</span>
        <span>Sum</span>
      </div>

      <div id="orderItems"></div>

      <button id="addItemBtn" type="button">
        + Add position
      </button>

      <!-- ========================================
           SUMMARY BLOCK
      ======================================== -->

      <div id="orderSummary" style="margin-top:15px;">

        <div>
          Subtotal: <span id="subTotal">0</span>
        </div>

        <div>
          <span id="serviceLabel">Service</span>:
          <span id="serviceTotal">0</span>
        </div>

        <div style="font-weight:bold; font-size:16px; margin-top:6px;">
          TOTAL: <span id="finalTotal">0</span>
        </div>

      </div>

    </div>

  </section>

  <div id="status" class="status">
    Starting...
  </div>

</main>

<script type="module">

/*
========================================
DEBUG
========================================
*/
const DEBUG_IDS = true

/*
========================================
SERVICE PARAM (ГЛАВНОЕ)
меняется в одном месте
========================================
*/
const SERVICE_PERCENT = 10

import { supabase } from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectBox = document.getElementById('projectBox')
const hallBox = document.getElementById('hallBox')
const tableBox = document.getElementById('tableBox')
const userBox = document.getElementById('userBox')
const statusBox = document.getElementById('status')

const itemsBox = document.getElementById('orderItems')
const addBtn = document.getElementById('addItemBtn')
const orderTitle = document.getElementById('orderTitle')

const subTotalBox = document.getElementById('subTotal')
const serviceBox = document.getElementById('serviceTotal')
const finalBox = document.getElementById('finalTotal')
const serviceLabel = document.getElementById('serviceLabel')

const backBtn = document.getElementById('backBtn')
const reloadBtn = document.getElementById('reloadBtn')

/*
========================================
STATE
========================================
*/

let currentUser = null
let orderId = null

/*
========================================
INIT SERVICE LABEL
динамический %
========================================
*/
serviceLabel.textContent =
  'Service ' + SERVICE_PERCENT + '%'

/*
========================================
STATUS
========================================
*/

function setStatus(text) {
  statusBox.textContent = text
  console.log('[ORDER]', text)
}

/*
========================================
PARAMS
========================================
*/

function loadParams() {
  const params = new URLSearchParams(window.location.search)

  orderId = params.get('order_id')

  if (!orderId)
    throw new Error('order_id is missing')
}

/*
========================================
LOAD USER
========================================
*/

async function loadUser() {

  const { data } =
    await supabase.auth.getUser()

  currentUser = data.user

  userBox.textContent =
    currentUser?.email || currentUser?.id
}

/*
========================================
LOAD ORDER
========================================
*/

async function loadOrder() {

  const { data, error } =
    await supabase
      .from('orders')
      .select('*')
      .eq('order_id', orderId)
      .single()

  if (error) throw error

  renderOrder(data)
}

/*
========================================
RENDER ORDER
========================================
*/

function renderOrder(order) {

  let title = 'Order #' + (order.order_number ?? '-')

  if (DEBUG_IDS) {
    title += ' [' + order.order_id + ']'
  }

  orderTitle.textContent = title

  itemsBox.innerHTML = ''

  addRow()
}

/*
========================================
CREATE ROW
========================================
*/

function createRow(name = '', qty = 1, price = 0) {

  const row = document.createElement('div')
  row.className = 'order-row'

  row.innerHTML = `
    <input value="${name}" class="name">
    <input type="number" value="${qty}" class="qty">
    <input type="number" value="${price}" class="price">
    <span class="sum">${qty * price}</span>
  `

  row.querySelector('.qty').addEventListener('input', update)
  row.querySelector('.price').addEventListener('input', update)

  return row
}

/*
========================================
ADD ROW
========================================
*/

function addRow() {
  itemsBox.appendChild(createRow())
}

/*
========================================
UPDATE TOTAL (ГЛАВНАЯ ЛОГИКА)
========================================
*/

function update() {

  let subtotal = 0

  const rows =
    itemsBox.querySelectorAll('.order-row')

  rows.forEach(row => {

    const qty =
      Number(row.querySelector('.qty').value) || 0

    const price =
      Number(row.querySelector('.price').value) || 0

    const sum = qty * price

    row.querySelector('.sum').textContent = sum

    subtotal += sum
  })

  const service =
    subtotal * SERVICE_PERCENT / 100

  const total =
    subtotal + service

  subTotalBox.textContent = subtotal.toFixed(2)
  serviceBox.textContent = service.toFixed(2)
  finalBox.textContent = total.toFixed(2)
}

/*
========================================
BUTTONS
========================================
*/

addBtn.addEventListener('click', addRow)

backBtn.addEventListener('click', () => {
  window.history.back()
})

reloadBtn.addEventListener('click', loadOrder)

/*
========================================
INIT
========================================
*/

async function init() {
  loadParams()
  await loadUser()
  if (!currentUser) return
  await loadOrder()
}

init()

</script>




<!--
========================================
КОНСОЛЬ
========================================
-->

<div id="service-console">

  <div class="row" id="build-top">
   loading items test & fix form order| v8.0.2
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
