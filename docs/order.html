<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Orders</title>

<link rel="stylesheet"
      href="styles/console.css" />

<link rel="stylesheet"
      href="styles/order.css" />

</head>

<body>

<header class="top-bar">

  <button id="openOrderBtn"
          class="open-order-main-btn"
          type="button">
    Open Order
  </button>

  <div class="top-title">MySada Orders</div>

  <div class="top-buttons">
    <button id="backBtn" type="button">
      Back to Hall
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>
  </div>

</header>

<main class="container">

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">Project</div>
      <div id="projectBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Hall</div>
      <div id="hallBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table</div>
      <div id="tableBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User</div>
      <div id="userBox" class="info-value">loading...</div>
    </div>

  </section>

  <!-- ========================================
  ORDER CARD / INPUT FORM
  ======================================== -->

  <section class="order-card open-order">

    <div class="order-head">

      <strong>New Order</strong>

      <div class="order-actions">

        <div class="order-total" id="orderTotal">
          0
        </div>

        <button class="order-toggle-btn"
                type="button">
          Hide
        </button>

      </div>

    </div>

    <div class="order-body">

      <div class="order-row order-row-title">
        <span>Position</span>
        <span>Qty</span>
        <span>Price</span>
        <span>Sum</span>
      </div>

      <div id="orderItems"></div>

      <button id="addItemBtn"
              type="button">
        + Add position
      </button>

    </div>

  </section>

  <div id="status" class="status">
    Starting...
  </div>

  <section id="ordersList"
           class="orders-list">
  </section>

</main>

<!--
========================================
КОНСОЛЬ
========================================
-->

<div id="service-console">

  <div class="row" id="build-top">
    SHOW/HIDE ORDER SWITCH | v6.4.2
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectBox =
  document.getElementById('projectBox')

const hallBox =
  document.getElementById('hallBox')

const tableBox =
  document.getElementById('tableBox')

const userBox =
  document.getElementById('userBox')

const statusBox =
  document.getElementById('status')

const ordersList =
  document.getElementById('ordersList')

let buildDown =
  document.getElementById('build-down')

const openOrderBtn =
  document.getElementById('openOrderBtn')

const backBtn =
  document.getElementById('backBtn')

const reloadBtn =
  document.getElementById('reloadBtn')

const itemsBox =
  document.getElementById('orderItems')

const totalBox =
  document.getElementById('orderTotal')

const addBtn =
  document.getElementById('addItemBtn')


/*
========================================
STATE
========================================
*/

let currentUser =
  null

let projectId =
  null

let hallId =
  null

let tableId =
  null

let projectName =
  'Project'

let hallName =
  'Hall'

let tableName =
  'Table'


/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

function setStatus(text) {
  statusBox.textContent =
    text

  console.log('[ORDERS]', text)

  updateBuildLine(text)
}


/*
========================================
PARAMS
берём project_id / hall_id / table_id из URL
========================================
*/

function loadParams() {
  const params =
    new URLSearchParams(window.location.search)

  projectId =
    params.get('project_id')

  hallId =
    params.get('hall_id')

  tableId =
    params.get('table_id')

  if (!projectId)
    throw new Error('project_id is missing')

  if (!hallId)
    throw new Error('hall_id is missing')

  if (!tableId)
    throw new Error('table_id is missing')
}


/*
========================================
LOAD USER
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser =
    data.user

  // ЗАГРУЗКА user_number + name + role из users
const { data: userData, error: userError } =
  await supabase
    .from('users')
    .select('user_number, name, role')
    .eq('user_id', currentUser.id)
    .single()

if (userError) {
  console.error(userError)
  userBox.textContent = 'User load error'
  return
}

const userInfo =
  '#' + (userData.user_number ?? '-')
  + ' | ' + (userData.name || 'no name')
  + ' | ' + (userData.role || 'no role')

userBox.textContent = userInfo
}


/*
========================================
LOAD NAMES
загружаем имена проекта / зала / стола
========================================
*/

async function loadNames() {
  setStatus('Loading names...')

  const { data: project, error: projectError } =
    await supabase
      .from('projects')
      .select('*')
      .eq('project_id', projectId)
      .maybeSingle()

  if (projectError)
    throw projectError

  if (project) {
    projectName =
      project.name || project.project_name || projectId
  }

  const { data: hall, error: hallError } =
    await supabase
      .from('halls')
      .select('*')
      .eq('hall_id', hallId)
      .maybeSingle()

  if (hallError)
    throw hallError

  if (hall) {
    hallName =
      hall.name || hallId
  }

  const { data: table, error: tableError } =
    await supabase
      .from('tables')
      .select('*')
      .eq('table_id', tableId)
      .maybeSingle()

  if (tableError)
    throw tableError

  if (table) {
    tableName =
      table.name || tableId
  }

 projectName =
  (project && project.name && project.name.trim() !== '')
    ? project.name
    : projectId

hallName =
  (hall && hall.name && hall.name.trim() !== '')
    ? hall.name
    : hallId

tableName =
  (table && table.name && table.name.trim() !== '')
    ? table.name
    : tableId

projectBox.textContent = projectName
hallBox.textContent = hallName
tableBox.textContent = tableName      
}


/*
========================================
LOAD ORDERS
загружаем все заказы выбранного стола
+ user_number + name + role (через orders_full)
========================================
*/

async function loadOrders() {
  setStatus('Loading orders...')

  ordersList.innerHTML = ''

  const { data, error } =
    await supabase
      .from('orders_full')
      .select(`
        *,
        items (*)
      `)
      .eq('project_id', projectId)
      .eq('hall_id', hallId)
      .eq('table_id', tableId)
      .order('opened_at', { ascending: false })

  if (error)
    throw error

  if (!data || !data.length) {
    ordersList.innerHTML =
      '<div class="empty">No orders for this table</div>'

    setStatus('No orders found')
    return
  }

  // 🔥 ДОБАВЛЯЕМ user info в каждый заказ
  data.forEach(order => {
    order._userInfo =
      '#' + (order.user_number ?? '-')
      + ' | ' + (order.name || 'no name')
      + ' | ' + (order.role || 'no role')

    renderOrder(order)
  })

  setStatus('Orders loaded: ' + data.length)
}

/*
========================================
OPEN ORDER
создаёт новый заказ
и переводит стол в occupied
========================================
*/

async function openOrder() {
  try {
    setStatus('Opening order...')

    const { data: orderData, error: orderError } =
      await supabase
        .from('orders')
        .insert({
  project_id: projectId,
  hall_id: hallId,
  table_id: tableId,
  user_id: currentUser.id, // 🔥 КЛЮЧЕВОЕ
  guest_count: 1,
  order_status: 'open',
  order_number: orderNumber
})
        .select()
        .single()

    if (orderError)
      throw orderError

    const { error: tableError } =
      await supabase
        .from('tables')
        .update({
          table_status: 'occupied'
        })
        .eq('table_id', tableId)

    if (tableError)
      throw tableError

    await loadOrders()

    setStatus(
      'Order opened: '
      + (orderData.order_id || orderData.id)
    )
  }
  catch (err) {
    console.error(err)

    setStatus(
      'Open order error: ' + err.message
    )
  }
}


/*
========================================
CLOSE ORDER
закрывает order
если open orders больше нет — table free
========================================
*/

async function closeOrder(order) {
  try {
    setStatus('Closing order...')

    const { error: closeError } =
      await supabase
        .from('orders')
        .update({
          order_status: 'closed',
          closed_at: new Date().toISOString()
        })
        .eq(
          'order_id',
          order.order_id || order.id
        )

    if (closeError)
      throw closeError

    const { data: openOrders, error: openError } =
      await supabase
        .from('orders')
        .select('order_id')
        .eq('table_id', order.table_id)
        .eq('order_status', 'open')

    if (openError)
      throw openError

    if (!openOrders || !openOrders.length) {
      const { error: tableError } =
        await supabase
          .from('tables')
          .update({
            table_status: 'free'
          })
          .eq('table_id', order.table_id)

      if (tableError)
        throw tableError
    }

    await loadOrders()

    setStatus('Order closed')
  }
  catch (err) {
    console.error(err)

    setStatus(
      'Close order error: ' + err.message
    )
  }
}


/*
========================================
RENDER ORDER
+ USER INFO (#number | name | role)
========================================
*/

function renderOrder(order) {
  const card =
    document.createElement('article')

  const status =
    order.order_status || order.status || 'open'

  card.className =
    'order-card ' + status

  if (status !== 'open') {
    card.classList.add('closed')
  }

  const head =
    document.createElement('div')

  head.className =
    'order-head'

  const title =
    document.createElement('strong')

  title.textContent =
    'Order '
    + (order.order_id || order.id || '')

  const actions =
    document.createElement('div')

  actions.className =
    'order-actions'

  const total =
    document.createElement('div')

  total.className =
    'order-total'

  total.textContent =
    order.total ?? '-'

  actions.appendChild(total)

  if (status === 'open') {
    const closeBtn =
      document.createElement('button')

    closeBtn.className =
      'order-close-btn'

    closeBtn.type =
      'button'

    closeBtn.textContent =
      'Close Order'

    closeBtn.addEventListener(
      'click',
      event => {
        event.stopPropagation()
        closeOrder(order)
      }
    )

    actions.appendChild(closeBtn)
  }

  const toggleBtn =
    document.createElement('button')

  toggleBtn.className =
    'order-toggle-btn'

  toggleBtn.type =
    'button'

  toggleBtn.textContent =
    status === 'open'
      ? 'Hide'
      : 'Show'

  actions.appendChild(toggleBtn)

  head.appendChild(title)
  head.appendChild(actions)

  card.appendChild(head)

  const body =
    document.createElement('div')

  body.className =
    'order-body'

  const grid =
    document.createElement('div')

  grid.className =
    'order-grid'

  // 🔥 USER INFO
  const userInfo =
    '#' + (order.user_number ?? '-')
    + ' | ' + (order.name || 'no name')
    + ' | ' + (order.role || 'no role')

  addField(grid, 'User', userInfo)

  addField(grid, 'Status', status)
  addField(grid, 'Guests', order.guest_count ?? '-')
  addField(grid, 'Total', order.total ?? '-')
  addField(grid, 'Opened', formatDate(order.opened_at))
  addField(grid, 'Closed', formatDate(order.closed_at))
  addField(grid, 'Shift', order.shift_id || '-')
  addField(grid, 'Note', order.note || '-')
  addField(grid, 'Created', formatDate(order.created_at))

  body.appendChild(grid)

  if (order.items && order.items.length) {
    const itemsBox =
      document.createElement('div')

    itemsBox.className =
      'order-items'

    order.items.forEach(item => {
      const row =
        document.createElement('div')

      row.className =
        'order-item-row'

      row.textContent =
        (item.name || item.title || 'Item')
        + ' / qty: '
        + (item.qty || item.quantity || 1)
        + ' / price: '
        + (item.price || 0)
        + ' / sum: '
        + (
          Number(item.qty || item.quantity || 1)
          * Number(item.price || 0)
        )

      itemsBox.appendChild(row)
    })

    body.appendChild(itemsBox)
  }

  card.appendChild(body)

  ordersList.appendChild(card)
}


/*
========================================
ADD FIELD
поле внутри карточки заказа
========================================
*/

function addField(parent, label, value) {
  const box =
    document.createElement('div')

  box.className =
    'order-field'

  const labelEl =
    document.createElement('div')

  labelEl.className =
    'order-label'

  labelEl.textContent =
    label

  const valueEl =
    document.createElement('div')

  valueEl.className =
    'order-value'

  valueEl.textContent =
    value

  box.appendChild(labelEl)
  box.appendChild(valueEl)

  parent.appendChild(box)
}


/*
========================================
FORMAT DATE
========================================
*/

function formatDate(value) {
  if (!value)
    return '-'

  const date =
    new Date(value)

  if (Number.isNaN(date.getTime()))
    return value

  return date.toLocaleString()
}


/*
========================================
SHOW / HIDE ORDER SWITCH
работает и для формы, и для заказов из базы
========================================
*/

document.addEventListener('click', function (e) {
  const btn =
    e.target.closest('.order-toggle-btn')

  if (!btn)
    return

  const card =
    btn.closest('.order-card')

  if (!card)
    return

  const isClosed =
    card.classList.toggle('closed')

  btn.textContent =
    isClosed ? 'Show' : 'Hide'
})


/*
========================================
ORDER INPUT LOGIC
========================================
*/

addBtn.addEventListener(
  'click',
  addRow
)

function addRow() {
  const row =
    document.createElement('div')

  row.className =
    'order-row'

  row.innerHTML =
    `
      <input placeholder="name" class="name">
      <input type="number" placeholder="qty" class="qty">
      <input type="number" placeholder="price" class="price">
      <span class="sum">0</span>
    `

  itemsBox.appendChild(row)

  const qty =
    row.querySelector('.qty')

  const price =
    row.querySelector('.price')

  qty.addEventListener('input', update)
  price.addEventListener('input', update)
}

function update() {
  let total =
    0

  const rows =
    itemsBox.querySelectorAll('.order-row')

  rows.forEach(row => {
    const qty =
      Number(row.querySelector('.qty').value) || 0

    const price =
      Number(row.querySelector('.price').value) || 0

    const sum =
      qty * price

    row.querySelector('.sum').textContent =
      sum

    total +=
      sum
  })

  totalBox.textContent =
    total
}


/*
========================================
BUTTONS
========================================
*/

openOrderBtn.addEventListener(
  'click',
  openOrder
)

backBtn.addEventListener(
  'click',
  () => {
    window.location.href =
      'hall.html'
      + '?project_id='
      + projectId
      + '&hall_id='
      + hallId
  }
)

reloadBtn.addEventListener(
  'click',
  async () => {
    try {
      await loadOrders()
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Reload error: ' + err.message
      )
    }
  }
)


/*
========================================
INIT
========================================
*/

async function init() {
  try {
    console.log('ORDERS INIT START')

    loadParams()

    await loadUser()

    await loadNames()

    addRow()

    await loadOrders()
  }
  catch (err) {
    console.error('ORDERS INIT ERROR:', err)

    setStatus(
      'Orders error: ' + err.message
    )
  }
}

init()

</script>



<!--
========================================
КОНСОЛЬ
========================================
-->

<div id="service-console">

  <div class="row" id="build-top">
   insert names (number)| v7.0.1
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
