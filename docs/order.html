<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Order</title>

<link rel="stylesheet" href="styles/console.css" />
<link rel="stylesheet" href="styles/order.css" />

</head>

<body>

<header class="top-bar">

  <div class="top-title">
    MySada Order
  </div>

  <div class="top-buttons">
    <button id="backBtn" type="button">
      Back to Hall
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>
  </div>

</header>

<main class="container">

  <!-- ========================================
       INFO PANEL
  ======================================== -->

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">Project</div>
      <div id="projectBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Hall</div>
      <div id="hallBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table</div>
      <div id="tableBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User</div>
      <div id="userBox" class="info-value">loading...</div>
    </div>

  </section>

  <!-- ========================================
       ORDER FORM
  ======================================== -->

  <section class="order-card">

    <div class="order-head">

      <!-- ШАПКА: номер заказа + время открытия -->
      <div style="display:flex; justify-content:space-between; width:100%;">

        <strong id="orderTitle">
          Order
        </strong>

        <span id="orderTime" style="font-size:12px; opacity:0.7;">
          --
        </span>

      </div>

    </div>

    <div class="order-body">

      <div class="order-row order-row-title">
        <span>Position</span>
        <span>Qty</span>
        <span>Price</span>
        <span>Sum</span>
      </div>

      <div id="orderItems"></div>

      <button id="addItemBtn" type="button">
        + Add position
      </button>

      <!-- ========================================
           SUMMARY BLOCK
      ======================================== -->

      <div id="orderSummary" style="margin-top:15px;">

        <div>
          Subtotal: <span id="subTotal">0</span>
        </div>

        <div>
          <span id="serviceLabel">Service</span>:
          <span id="serviceTotal">0</span>
        </div>

        <div style="font-weight:bold; font-size:16px; margin-top:6px;">
          TOTAL: <span id="finalTotal">0</span>
        </div>

      </div>

    </div>

  </section>

  <div id="status" class="status">
    Starting...
  </div>

</main>

<!-- ========================================
     SERVICE CONSOLE
     ОДИН блок консоли на странице
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">
    order log insert | v8.0.4
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script type="module">

/*
========================================
DEBUG
========================================
*/

const DEBUG_IDS =
  true

/*
========================================
SERVICE PARAM
========================================
*/

const SERVICE_PERCENT =
  10

/*
========================================
SUPABASE
========================================
*/

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectBox =
  document.getElementById('projectBox')

const hallBox =
  document.getElementById('hallBox')

const tableBox =
  document.getElementById('tableBox')

const userBox =
  document.getElementById('userBox')

const statusBox =
  document.getElementById('status')

const itemsBox =
  document.getElementById('orderItems')

const addBtn =
  document.getElementById('addItemBtn')

const orderTitle =
  document.getElementById('orderTitle')

const orderTime =
  document.getElementById('orderTime')

const subTotalBox =
  document.getElementById('subTotal')

const serviceBox =
  document.getElementById('serviceTotal')

const finalBox =
  document.getElementById('finalTotal')

const serviceLabel =
  document.getElementById('serviceLabel')

const backBtn =
  document.getElementById('backBtn')

const reloadBtn =
  document.getElementById('reloadBtn')

let buildDown =
  document.getElementById('build-down')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let orderId =
  null

/*
========================================
SERVICE LABEL
========================================
*/

serviceLabel.textContent =
  'Service ' + SERVICE_PERCENT + '%'

/*
========================================
BUILD LINE
обновляет нижнюю строку сервисной консоли
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

/*
========================================
STATUS
пишет строку в экранный статус
НЕ пишет в Supabase
========================================
*/

function setStatus(text) {
  const now =
    new Date()

  const time =
    now.toLocaleTimeString()

  const line =
    '[' + time + '] ' + text

  statusBox.innerHTML +=
    line + '<br>'

  console.log(
    '[ORDER]',
    text
  )

  updateBuildLine(text)
}

/*
========================================
LOGS
пишет событие в таблицу public.logs
========================================
*/

async function addConsoleLog(type, payload = {}) {

  const { error } =
    await supabase
      .from('logs')
      .insert({
        project_id: payload.project_id || null,
        hall_id: payload.hall_id || null,
        table_id: payload.table_id || null,
        order_id: payload.order_id || null,
        user_id: currentUser ? currentUser.id : null,
        log_type: type,
        message: payload.message || '',
        payload: payload
      })

  if (error) {
    console.error(
      'LOG INSERT ERROR:',
      error
    )

    setStatus(
      'Log insert error: ' + error.message
    )
  }
}

/*
========================================
PARAMS
берём order_id из URL
========================================
*/

function loadParams() {
  const params =
    new URLSearchParams(window.location.search)

  orderId =
    params.get('order_id')

  if (!orderId)
    throw new Error('order_id is missing')
}

/*
========================================
LOAD USER
загружает текущего auth user
========================================
*/

async function loadUser() {

  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  currentUser =
    data.user

  if (!currentUser)
    throw new Error('User not logged in')

  userBox.textContent =
    currentUser.email || currentUser.id
}

/*
========================================
LOAD CONTEXT
подтягивает project / hall / table по order
========================================
*/

async function loadContext(order) {

  setStatus('Loading order context...')

  const { data: project, error: projectError } =
    await supabase
      .from('projects')
      .select('name')
      .eq('project_id', order.project_id)
      .maybeSingle()

  if (projectError)
    throw projectError

  projectBox.textContent =
    project?.name || order.project_id

  const { data: hall, error: hallError } =
    await supabase
      .from('halls')
      .select('name')
      .eq('hall_id', order.hall_id)
      .maybeSingle()

  if (hallError)
    throw hallError

  hallBox.textContent =
    hall?.name || order.hall_id

  const { data: table, error: tableError } =
    await supabase
      .from('tables')
      .select('name')
      .eq('table_id', order.table_id)
      .maybeSingle()

  if (tableError)
    throw tableError

  tableBox.textContent =
    table?.name || order.table_id
}

/*
========================================
LOAD ORDER
загружает заказ и пишет факт открытия страницы в logs
========================================
*/

async function loadOrder() {

  setStatus('Loading order...')

  const { data, error } =
    await supabase
      .from('orders')
      .select('*')
      .eq('order_id', orderId)
      .single()

  if (error)
    throw error

  /*
  ========================================
  LOG EVENT
  здесь фиксируется открытие order.html
  ========================================
  */

  await addConsoleLog('order_page', {
    order_id: data.order_id,
    project_id: data.project_id,
    hall_id: data.hall_id,
    table_id: data.table_id,
    order_number: data.order_number,
    message:
      'ORDER PAGE OPENED: '
      + (data.order_number || data.order_id)
  })

  await loadContext(data)

  renderOrder(data)

  setStatus(
    'Order loaded: '
    + (data.order_number || data.order_id)
  )
}

/*
========================================
RENDER ORDER
рисует номер заказа и пустую строку позиции
========================================
*/

function renderOrder(order) {

  let title =
    'Order #' + (order.order_number ?? '-')

  if (DEBUG_IDS) {
    title +=
      ' [' + order.order_id + ']'
  }

  orderTitle.textContent =
    title

  if (order.opened_at || order.created_at) {
    const d =
      new Date(order.opened_at || order.created_at)

    orderTime.textContent =
      d.toLocaleString()
  }

  itemsBox.innerHTML =
    ''

  addRow()
}

/*
========================================
CREATE ROW
создает строку позиции заказа
пока строка только визуальная
в базу items здесь НЕ пишет
========================================
*/

function createRow(name = '', qty = 1, price = 0) {

  const row =
    document.createElement('div')

  row.className =
    'order-row'

  row.innerHTML =
    `
      <input value="${escapeHtml(name)}" class="name">
      <input type="number" value="${qty}" class="qty">
      <input type="number" value="${price}" class="price">
      <span class="sum">${qty * price}</span>
    `

  row
    .querySelector('.qty')
    .addEventListener(
      'input',
      update
    )

  row
    .querySelector('.price')
    .addEventListener(
      'input',
      update
    )

  return row
}

/*
========================================
ADD ROW
добавляет новую строку позиции
========================================
*/

function addRow() {
  itemsBox.appendChild(
    createRow()
  )

  update()
}

/*
========================================
TOTAL
считает subtotal / service / total
только на экране
========================================
*/

function update() {

  let subtotal =
    0

  itemsBox
    .querySelectorAll('.order-row')
    .forEach(row => {

      const qty =
        Number(row.querySelector('.qty').value) || 0

      const price =
        Number(row.querySelector('.price').value) || 0

      const sum =
        qty * price

      row.querySelector('.sum').textContent =
        sum

      subtotal +=
        sum
    })

  const service =
    subtotal * SERVICE_PERCENT / 100

  const total =
    subtotal + service

  subTotalBox.textContent =
    subtotal.toFixed(2)

  serviceBox.textContent =
    service.toFixed(2)

  finalBox.textContent =
    total.toFixed(2)
}

/*
========================================
ESCAPE HTML
защита от вставки HTML в input value
========================================
*/

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}

/*
========================================
BUTTONS
========================================
*/

addBtn.addEventListener(
  'click',
  addRow
)

backBtn.addEventListener(
  'click',
  () => {
    window.history.back()
  }
)

reloadBtn.addEventListener(
  'click',
  async () => {
    try {
      await loadOrder()
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Reload error: ' + err.message
      )
    }
  }
)

/*
========================================
INIT
========================================
*/

async function init() {
  try {
    statusBox.innerHTML =
      ''

    loadParams()

    await loadUser()

    await loadOrder()
  }
  catch (err) {
    console.error(
      'ORDER INIT ERROR:',
      err
    )

    setStatus(
      'Order error: ' + err.message
    )
  }
}

init()

</script>





<!--
========================================
КОНСОЛЬ
========================================
-->

<div id="service-console">

  <div class="row" id="build-top">
   logs / status| v8.1.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
