
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Order</title>

<link rel="stylesheet" href="styles/console.css" />
<link rel="stylesheet" href="styles/order.css" />

</head>

<body>

<header class="top-bar">

  <div class="left-actions">

    <button id="changeTableBtn"
            class="change-table-btn"
            type="button">
      Change Table
    </button>

    <button id="splitBillBtn"
            class="split-bill-btn"
            type="button">
      Split Check
    </button>

    <button id="printBillBtn"
            class="print-bill-btn"
            type="button">
      Print Check
    </button>

    <button id="closeOrderBtn"
            class="close-order-btn"
            type="button">
      Close Order
    </button>

  </div>

  <div class="top-title">
    MySada Order
  </div>

  <div class="top-buttons">

    <button id="backBtn" type="button">
      Back to Hall
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>

  </div>

</header>

<main class="container">

  <section class="info-panel">

    <div class="info-card">
      <div class="info-label">Project</div>
      <div id="projectBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Hall</div>
      <div id="hallBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">Table</div>
      <div id="tableBox" class="info-value">loading...</div>
    </div>

    <div class="info-card">
      <div class="info-label">User</div>
      <div id="userBox" class="info-value">loading...</div>
    </div>

  </section>

  <section class="order-card">

    <div class="order-head">

      <div style="display:flex; justify-content:space-between; width:100%;">

        <strong id="orderTitle">
          Check
        </strong>

        <span id="orderTime" style="font-size:12px; opacity:0.9;">
          --
        </span>

      </div>

    </div>

    <div class="order-body">

      <div class="order-row order-row-title">
        <span>Position</span>
        <span>Qty</span>
        <span>Price</span>
        <span>Sum</span>
      </div>

      <div id="orderItems"></div>

      <button id="addItemBtn" type="button">
        + Add position
      </button>

      <div id="orderSummary" style="margin-top:15px;">

        <div>
          Subtotal: <span id="subTotal">0</span>
        </div>

        <div>
          <span id="serviceLabel">Service</span>:
          <span id="serviceTotal">0</span>
        </div>

        <div style="font-weight:bold; font-size:16px; margin-top:6px;">
          TOTAL: <span id="finalTotal">0</span>
        </div>

      </div>

    </div>

  </section>

  <div id="status" class="status">
    Starting...
  </div>

</main>

<!-- ========================================
     CHANGE TABLE DIALOG
======================================== -->

<div id="changeTableDialog" class="dialog hidden">
  <div class="dialog-box">

    <h3>Change Table</h3>

    <div id="freeTablesBox"
         class="free-tables-list">
    </div>

    <button id="closeChangeTableDialogBtn"
            type="button">
      Close
    </button>

  </div>
</div>


<!-- ========================================
     SPLIT CHECK DIALOG
======================================== -->

<div id="splitCheckDialog" class="dialog hidden">
  <div class="dialog-box">

    <h3>Split Check</h3>

    <label>
      Checks count
    </label>

    <input id="splitCheckCount"
           type="number"
           min="2"
           value="2" />

    <div class="split-actions">

      <button id="splitEqualBtn"
              type="button">
        Split equally
      </button>

      <button id="splitByItemsBtn"
              type="button">
        Split by positions
      </button>

    </div>

    <div id="splitItemsBox"
         class="split-items-box">
    </div>

    <button id="printSplitByItemsBtn"
            class="hidden"
            type="button">
      Print selected checks
    </button>

    <button id="closeSplitCheckDialogBtn"
            type="button">
      Close
    </button>

  </div>
</div>

<script type="module">

const DEBUG_IDS =
  true

const SERVICE_PERCENT =
  10

import { supabase }
from "./scripts/config.js"
      
/*
========================================
DOM
========================================
*/

const projectBox =
  document.getElementById('projectBox')

const hallBox =
  document.getElementById('hallBox')

const tableBox =
  document.getElementById('tableBox')

const userBox =
  document.getElementById('userBox')

const statusBox =
  document.getElementById('status')

const itemsBox =
  document.getElementById('orderItems')

const addBtn =
  document.getElementById('addItemBtn')

const orderTitle =
  document.getElementById('orderTitle')

const orderTime =
  document.getElementById('orderTime')

const subTotalBox =
  document.getElementById('subTotal')

const serviceBox =
  document.getElementById('serviceTotal')

const finalBox =
  document.getElementById('finalTotal')

const serviceLabel =
  document.getElementById('serviceLabel')

const changeTableBtn =
  document.getElementById('changeTableBtn')

const splitBillBtn =
  document.getElementById('splitBillBtn')

const printBillBtn =
  document.getElementById('printBillBtn')

const closeOrderBtn =
  document.getElementById('closeOrderBtn')

const backBtn =
  document.getElementById('backBtn')

const reloadBtn =
  document.getElementById('reloadBtn')

let buildDown =
  document.getElementById('build-down')

const changeTableDialog =
  document.getElementById('changeTableDialog')

const freeTablesBox =
  document.getElementById('freeTablesBox')

const closeChangeTableDialogBtn =
  document.getElementById('closeChangeTableDialogBtn')

const splitCheckDialog =
  document.getElementById('splitCheckDialog')

const splitCheckCount =
  document.getElementById('splitCheckCount')

const closeSplitCheckDialogBtn =
  document.getElementById('closeSplitCheckDialogBtn')

const splitEqualBtn =
  document.getElementById('splitEqualBtn')

const splitByItemsBtn =
  document.getElementById('splitByItemsBtn')

const splitItemsBox =
  document.getElementById('splitItemsBox')

const printSplitByItemsBtn =
  document.getElementById('printSplitByItemsBtn')
      
/*
========================================
STATE
========================================
*/

let currentUser =
  null

let orderId =
  null

let currentOrder =
  null

serviceLabel.textContent =
  'Service ' + SERVICE_PERCENT + '%'

/*
========================================
BUILD LINE
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

/*
========================================
STATUS
========================================
*/

function setStatus(text) {
  const now =
    new Date()

  const time =
    now.toLocaleTimeString()

  const line =
    '[' + time + '] ' + text

  statusBox.innerHTML +=
    line + '<br>'

  console.log(
    '[ORDER]',
    text
  )

  updateBuildLine(text)
}

/*
========================================
LOGS
реальные поля logs:
project_id, hall_id, table_id, order_id, user_id, action, message
========================================
*/

async function addConsoleLog(action, details = {}) {

  const row = {

    project_id:
      details.project_id || null,

    hall_id:
      details.hall_id || null,

    table_id:
      details.table_id || null,

    order_id:
      details.order_id || null,

    user_id:
      currentUser
        ? currentUser.id
        : null,

    action:
      action,

    message:
      details.message || ''
  }

  console.log(
    'LOG INSERT ROW:',
    row
  )

  const { data, error } =
    await supabase
      .from('logs')
      .insert(row)
      .select()
      .single()

  if (error) {

    console.error(
      'LOG INSERT ERROR:',
      error
    )

    setStatus(
      'LOG INSERT ERROR: '
      + error.message
    )

    throw error
  }

  console.log(
    'LOG INSERT OK:',
    data
  )

  setStatus(
    'LOG SAVED'
  )

  return data
}

/*
========================================
PARAMS
========================================
*/

function loadParams() {
  const params =
    new URLSearchParams(window.location.search)

  orderId =
    params.get('order_id')

  if (!orderId)
    throw new Error('order_id is missing')
}

/*
========================================
LOAD USER
========================================
*/

async function loadUser() {

  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  currentUser =
    data.user

  if (!currentUser)
    throw new Error('User not logged in')

  userBox.textContent =
    currentUser.email || currentUser.id
}

/*
========================================
LOAD CONTEXT
========================================
*/

async function loadContext(order) {

  setStatus('Loading order context...')

  const { data: project, error: projectError } =
    await supabase
      .from('projects')
      .select('name')
      .eq('project_id', order.project_id)
      .maybeSingle()

  if (projectError)
    throw projectError

  projectBox.textContent =
    project?.name || order.project_id

  const { data: hall, error: hallError } =
    await supabase
      .from('halls')
      .select('name')
      .eq('hall_id', order.hall_id)
      .maybeSingle()

  if (hallError)
    throw hallError

  hallBox.textContent =
    hall?.name || order.hall_id

  const { data: table, error: tableError } =
    await supabase
      .from('tables')
      .select('name')
      .eq('table_id', order.table_id)
      .maybeSingle()

  if (tableError)
    throw tableError

  tableBox.textContent =
    table?.name || order.table_id
}

/*
========================================
LOAD ORDER
========================================
*/

async function loadOrder() {

  setStatus('Loading order...')

  const { data, error } =
    await supabase
      .from('orders')
      .select('*')
      .eq('order_id', orderId)
      .single()

  if (error)
    throw error

  currentOrder =
    data

  await loadContext(data)

  renderOrder(data)

  setStatus(
    'Order loaded: '
    + (data.order_number || data.order_id)
  )
}

/*
========================================
RENDER ORDER
Opened at / Closed at
========================================
*/

function renderOrder(order) {

  let title =
    'Check #' + (order.order_number ?? '-')

  if (DEBUG_IDS) {
    title +=
      ' [' + order.order_id + ']'
  }

  orderTitle.textContent =
    title

  const openedAt =
    order.opened_at || order.created_at

  const closedAt =
    order.closed_at || null

  orderTime.innerHTML =
    `
      <div style="color:#dc2626; font-weight:700;">
        Opened at:
        ${
          openedAt
            ? new Date(openedAt).toLocaleString()
            : '-'
        }
      </div>

      ${
        closedAt
          ? `
            <div style="color:#16a34a; font-weight:700; margin-top:4px;">
              Closed at:
              ${new Date(closedAt).toLocaleString()}
            </div>
          `
          : ''
      }
    `

  itemsBox.innerHTML =
    ''
  loadItems()
}

/*
========================================
LOAD ITEMS
загрузка позиций заказа
========================================
*/

async function loadItems() {

  try {

    if (!currentOrder)
      return

    setStatus('Loading items...')

   const { data, error } =
  await supabase
    .from('items')
    .select('*')
    .eq('order_id', currentOrder.order_id)
    .order('created_at', { ascending: true })

    if (error)
      throw error

    itemsBox.innerHTML =
      ''

    if (!data || !data.length) {

      update()

      setStatus('No items found')

      return
    }

    data.forEach(item => {
      createRow(item)
    })

    update()

    setStatus(
      'Items loaded: '
      + data.length
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Load items error: '
      + err.message
    )
  }
}

/*
========================================
CREATE ROW
позиция из DB
========================================
*/

function createRow(item) {

  const row =
    document.createElement('div')

  row.className =
    'order-row'

  row.dataset.itemId =
    item.item_id

  row.innerHTML =
    `
      <input
        value="${escapeHtml(item.name || '')}"
        class="name">

      <input
        type="number"
        value="${item.qty || 1}"
        class="qty">

      <input
        type="number"
        value="${item.price || 0}"
        class="price">

      <span class="sum">
        ${Number(item.line_total || 0).toFixed(2)}
      </span>
    `

  const nameInput =
    row.querySelector('.name')

  const qtyInput =
    row.querySelector('.qty')

  const priceInput =
    row.querySelector('.price')

  async function saveRow() {

    try {

      const qty =
        Number(qtyInput.value) || 0

      const price =
        Number(priceInput.value) || 0

      const sum =
        qty * price

      row.querySelector('.sum').textContent =
        sum.toFixed(2)

      const { error } =
        await supabase
          .from('items')
          .update({
            name: nameInput.value,
            qty,
            price
          })
          .eq('item_id', item.item_id)

      if (error)
        throw error

      update()
    }
    catch (err) {

      console.error(err)

      setStatus(
        'Save item error: '
        + err.message
      )
    }
  }

  nameInput.addEventListener(
    'change',
    saveRow
  )

  qtyInput.addEventListener(
    'change',
    saveRow
  )

  priceInput.addEventListener(
    'change',
    saveRow
  )

  itemsBox.appendChild(row)
}

/*
========================================
ADD ITEM
создание новой позиции
========================================
*/

async function addRow() {

  try {

    if (!currentOrder)
      return

    const { data, error } =
      await supabase
        .from('items')
        .insert({
          order_id:
            currentOrder.order_id,

          name:
            'New item',

          qty:
            1,

          price:
            0,

          item_status:
            'new'
        })
        .select()
        .single()

    console.log('ADD ITEM DATA:', data)
    console.log('ADD ITEM ERROR:', error)

    if (error)
      throw error

    createRow(data)

    update()

    setStatus('Item created')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Add item error: '
      + err.message
    )
  }
}
      
/*
========================================
TOTAL
from table_items
========================================
*/

function update() {

  let subtotal =
    0

  itemsBox
    .querySelectorAll('.order-row')
    .forEach(row => {

      const qty =
        Number(
          row.querySelector('.qty')?.value
        ) || 0

      const price =
        Number(
          row.querySelector('.price')?.value
        ) || 0

      const sum =
        qty * price

      row.querySelector('.sum').textContent =
        sum.toFixed(2)

      subtotal +=
        sum
    })

  const service =
    subtotal * SERVICE_PERCENT / 100

  const total =
    subtotal + service

  subTotalBox.textContent =
    subtotal.toFixed(2)

  serviceBox.textContent =
    service.toFixed(2)

  finalBox.textContent =
    total.toFixed(2)
}

/*
========================================
CLOSE ORDER
========================================
*/

async function closeOrder() {

  try {

    if (!currentOrder)
      return

    setStatus('Closing order...')

    const { error: closeError } =
      await supabase
        .from('orders')
        .update({
          order_status: 'closed',
          closed_at: new Date().toISOString()
        })
        .eq('order_id', currentOrder.order_id)

    if (closeError)
      throw closeError

    const { data: openOrders, error: openError } =
      await supabase
        .from('orders')
        .select('order_id')
        .eq('table_id', currentOrder.table_id)
        .eq('order_status', 'open')

    if (openError)
      throw openError

    if (!openOrders || !openOrders.length) {
      const { error: tableError } =
        await supabase
          .from('tables')
          .update({
            table_status: 'free'
          })
          .eq('table_id', currentOrder.table_id)

      if (tableError)
        throw tableError
    }

    await addConsoleLog(
      'close order',
      {
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        order_id: currentOrder.order_id,
        message:
          'ORDER CLOSED: '
          + (currentOrder.order_number || currentOrder.order_id)
      }
    )

    setStatus('Order closed')

    closeOrderBtn.disabled =
      true

    await loadOrder()

  }
  catch (err) {

    console.error(err)

    setStatus(
      'Close order error: '
      + err.message
    )
  }
}

/*
========================================
CHANGE TABLE
свободные столы сгруппированы по залам
как Grid Hall
========================================
*/

async function changeTable() {

  try {

    if (!currentOrder)
      return

    setStatus('Loading free tables by halls...')

    const { data, error } =
      await supabase
        .from('tables')
        .select(`
          *,
          halls (
            hall_id,
            name
          )
        `)
        .eq('project_id', currentOrder.project_id)
        .eq('table_status', 'free')
        .order('hall_id', { ascending: true })
        .order('name', { ascending: true })

    if (error)
      throw error

    freeTablesBox.innerHTML =
      ''

    if (!data || !data.length) {
      freeTablesBox.innerHTML =
        '<div class="empty">No free tables</div>'

      changeTableDialog.classList.remove('hidden')

      return
    }

    const groups =
      {}

    data.forEach(table => {

      const hallId =
        table.hall_id || 'no-hall'

      if (!groups[hallId]) {
        groups[hallId] = {
          hallName:
            table.halls?.name || hallId,

          tables:
            []
        }
      }

      groups[hallId].tables.push(table)
    })

    Object.keys(groups).forEach(hallId => {

      const group =
        groups[hallId]

      const hallBlock =
        document.createElement('div')

      hallBlock.className =
        'change-hall-card'

      const title =
        document.createElement('div')

      title.className =
        'change-hall-title'

      title.textContent =
        group.hallName
        + ' · '
        + group.tables.length

      const list =
        document.createElement('div')

      list.className =
        'change-table-list'

      group.tables.forEach(table => {

        const btn =
          document.createElement('button')

        btn.type =
          'button'

        btn.className =
          'change-table-row table-free'

        btn.textContent =
          (table.name || table.table_id)
          + ' · free'

        btn.addEventListener(
          'click',
          () => moveOrderToTable(table)
        )

        list.appendChild(btn)
      })

      hallBlock.appendChild(title)
      hallBlock.appendChild(list)

      freeTablesBox.appendChild(hallBlock)
    })

    changeTableDialog.classList.remove('hidden')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Change table error: '
      + err.message
    )
  }
}
      
/*
========================================
MOVE ORDER TO TABLE
переносит check на свободный стол
========================================
*/

async function moveOrderToTable(newTable) {

  try {

    if (!currentOrder)
      return

    const oldTableId =
      currentOrder.table_id

    setStatus('Changing table...')

    const { error: orderError } =
      await supabase
        .from('orders')
        .update({
          table_id: newTable.table_id,
          hall_id: newTable.hall_id
        })
        .eq('order_id', currentOrder.order_id)

    if (orderError)
      throw orderError

    const { error: newTableError } =
      await supabase
        .from('tables')
        .update({
          table_status: 'occupied'
        })
        .eq('table_id', newTable.table_id)

    if (newTableError)
      throw newTableError

    const { data: oldOpenOrders, error: oldOpenError } =
      await supabase
        .from('orders')
        .select('order_id')
        .eq('table_id', oldTableId)
        .eq('order_status', 'open')

    if (oldOpenError)
      throw oldOpenError

    if (!oldOpenOrders || !oldOpenOrders.length) {

      const { error: oldTableError } =
        await supabase
          .from('tables')
          .update({
            table_status: 'free'
          })
          .eq('table_id', oldTableId)

      if (oldTableError)
        throw oldTableError
    }

    await addConsoleLog(
      'change table',
      {
        project_id: currentOrder.project_id,
        hall_id: newTable.hall_id,
        table_id: newTable.table_id,
        order_id: currentOrder.order_id,
        message:
          'TABLE CHANGED: '
          + oldTableId
          + ' -> '
          + newTable.table_id
      }
    )

    changeTableDialog.classList.add('hidden')

    await loadOrder()

    setStatus('Table changed')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Move table error: '
      + err.message
    )
  }
}

/*
========================================
SPLIT CHECK
только открывает окно выбора
order в базе НЕ меняется
========================================
*/

function splitBill() {

  if (!currentOrder)
    return

  splitItemsBox.innerHTML =
    ''

  printSplitByItemsBtn.classList.add('hidden')

  splitCheckDialog.classList.remove('hidden')
}

/*
========================================
SPLIT EQUALLY
делит итог поровну
готовит split checks для print.html
window.open только в самом конце
========================================
*/

async function printSplitEqually() {

  try {

    const count =
      Number(splitCheckCount.value)

    if (!count || count < 2) {
      setStatus('Wrong checks count')
      return
    }

    const baseData =
      buildCheckData()

    const oneTotal =
      baseData.total / count

    const checks =
      []

    for (let i = 1; i <= count; i++) {

      checks.push({
        ...baseData,

        order_number:
          (baseData.order_number || baseData.order_id)
          + '-'
          + i,

        items: [
          {
            name:
              'Split equally '
              + i
              + ' / '
              + count,

            qty: 1,
            price: oneTotal,
            sum: oneTotal
          }
        ],

        subtotal:
          oneTotal,

        service_total:
          0,

        total:
          oneTotal
      })
    }

    localStorage.setItem(
      'print_split_checks',
      JSON.stringify(checks)
    )

    await addConsoleLog(
      'split check',
      {
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        order_id: currentOrder.order_id,
        message:
          'SPLIT EQUALLY OPENED: '
          + count
          + ' checks'
      }
    )

    splitCheckDialog.classList.add(
      'hidden'
    )

    setStatus(
      'Split equally opened'
    )

    window.open(
      'print.html?mode=split',
      '_blank'
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Split equally error: '
      + err.message
    )
  }
}

/*
========================================
DRAG&DROP BY POSITIONS 
исходный Check #0 слева
конечные Checks 1..N справа
позиции перетаскиваются мышкой
order в базе НЕ меняется
========================================
*/

function buildSplitByItemsUi() {

  const count =
    Number(splitCheckCount.value)

  if (!count || count < 2) {
    setStatus('Wrong checks count')
    return
  }

localStorage.removeItem(
  'print_split_checks'
)
      
  splitItemsBox.innerHTML =
    ''

  const source =
    document.createElement('div')

  source.className =
    'split-source'

  source.innerHTML =
    '<h4>Check #0</h4>'

  const targets =
    document.createElement('div')

  targets.className =
    'split-targets'

  const targetBoxes =
    {}

  for (let i = 1; i <= count; i++) {

    const box =
      document.createElement('div')

    box.className =
      'split-target'

    box.dataset.check =
      String(i)

    box.innerHTML =
      '<h4>Check #' + i + '</h4>'

    box.addEventListener(
      'dragover',
      event => {
        event.preventDefault()
      }
    )

    box.addEventListener(
      'drop',
      event => {
        event.preventDefault()

        const rowId =
          event.dataTransfer.getData('text/plain')

        const row =
          document.getElementById(rowId)

        if (row) {
          box.appendChild(row)
        }
      }
    )

    targetBoxes[i] =
      box

    targets.appendChild(box)
  }

  const rows =
    [...itemsBox.querySelectorAll('.order-row')]

  rows.forEach((row, rowIndex) => {

  const name =
    row.querySelector('.name')?.value || 'Item'

  const qty =
    Number(row.querySelector('.qty')?.value) || 0

  const price =
    Number(row.querySelector('.price')?.value) || 0

  /*
  ----------------------------------------
  SPLIT QTY TO UNITS
  каждая единица товара = отдельная карточка
  ----------------------------------------
  */

  for (let unit = 1; unit <= qty; unit++) {

    const item =
      document.createElement('div')

    item.id =
      'split-item-'
      + rowIndex
      + '-'
      + unit

    item.className =
      'split-draggable-item'

    item.draggable =
      true

    item.dataset.name =
      name

    item.dataset.qty =
      '1'

    item.dataset.price =
      String(price)

    item.dataset.sum =
      String(price)

    item.innerHTML =
      `
        <strong>${escapeHtml(name)}</strong>
        <span>Unit: ${unit} / ${qty}</span>
        <span>Qty: 1</span>
        <span>Price: ${price.toFixed(2)}</span>
        <span>Sum: ${price.toFixed(2)}</span>
      `

    item.addEventListener(
      'dragstart',
      event => {
        event.dataTransfer.setData(
          'text/plain',
          item.id
        )
      }
    )

    source.appendChild(item)
  }
})

  splitItemsBox.appendChild(source)

  splitItemsBox.appendChild(targets)

  printSplitByItemsBtn.classList.remove('hidden')
}     
      
/*
========================================
SPLIT BY POSITIONS
готовит split checks для print.html
order в базе НЕ меняется
window.open только в самом конце
========================================
*/

async function printSplitByPositions() {

  try {

    const count =
      Number(splitCheckCount.value)

    if (!count || count < 2) {

      setStatus(
        'Wrong checks count'
      )

      return
    }

    const baseData =
      buildCheckData()

    const checks =
      []

    for (let i = 1; i <= count; i++) {

      const box =
        splitItemsBox.querySelector(
          '.split-target[data-check="' + i + '"]'
        )

      const items =
        [...box.querySelectorAll('.split-draggable-item')]
          .map(item => ({

            name:
              item.dataset.name || 'Item',

            qty:
              Number(item.dataset.qty) || 0,

            price:
              Number(item.dataset.price) || 0,

            sum:
              Number(item.dataset.sum) || 0
          }))

      const subtotal =
        items.reduce(
          (sum, item) => sum + item.sum,
          0
        )

      checks.push({

        ...baseData,

        order_number:
          (baseData.order_number || baseData.order_id)
          + '-'
          + i,

        items,

        subtotal,

        service_total:
          0,

        total:
          subtotal
      })
    }

    localStorage.setItem(
      'print_split_checks',
      JSON.stringify(checks)
    )

    await addConsoleLog(
      'split check',
      {
        project_id:
          currentOrder.project_id,

        hall_id:
          currentOrder.hall_id,

        table_id:
          currentOrder.table_id,

        order_id:
          currentOrder.order_id,

        message:
          'SPLIT BY POSITIONS OPENED: '
          + count
          + ' checks'
      }
    )

    splitCheckDialog.classList.add(
      'hidden'
    )

    setStatus(
      'Split by positions opened'
    )

    window.open(
      'print.html?mode=split',
      '_blank'
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Split by positions error: '
      + err.message
    )
  }
}
      
/*
========================================
BUILD CHECK DATA
собирает данные чека для print.html
========================================
*/

function buildCheckData() {

  const items =
    []

  itemsBox
    .querySelectorAll('.order-row')
    .forEach(row => {

      const name =
        row.querySelector('.name')?.value || 'Item'

      const qty =
        Number(row.querySelector('.qty')?.value) || 0

      const price =
        Number(row.querySelector('.price')?.value) || 0

      items.push({
        name,
        qty,
        price,
        sum: qty * price
      })
    })

  return {
    order_id: currentOrder.order_id,
    order_number: currentOrder.order_number,

    project_id: currentOrder.project_id,
    hall_id: currentOrder.hall_id,
    table_id: currentOrder.table_id,

    project_name: projectBox.textContent,
    hall_name: hallBox.textContent,
    table_name: tableBox.textContent,

    opened_at: currentOrder.opened_at || currentOrder.created_at,
    closed_at: currentOrder.closed_at || null,

    items,

    subtotal: Number(subTotalBox.textContent) || 0,
    service_percent: SERVICE_PERCENT,
    service_total: Number(serviceBox.textContent) || 0,
    total: Number(finalBox.textContent) || 0
  }
}

  try {

  }
}
      
/*
========================================
ESCAPE HTML
========================================
*/

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}
