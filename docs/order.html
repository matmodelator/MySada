/*
========================================
BUILD LINE
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

/*
========================================
STATUS
========================================
*/

function setStatus(text) {
  const now =
    new Date()

  const time =
    now.toLocaleTimeString()

  const line =
    '[' + time + '] ' + text

  statusBox.innerHTML +=
    line + '<br>'

  console.log(
    '[ORDER]',
    text
  )

  updateBuildLine(text)
}

/*
========================================
LOGS
реальные поля logs:
project_id, hall_id, table_id, order_id, user_id, action, message
========================================
*/

async function addConsoleLog(action, details = {}) {

  const row = {

    project_id:
      details.project_id || null,

    hall_id:
      details.hall_id || null,

    table_id:
      details.table_id || null,

    order_id:
      details.order_id || null,

    user_id:
      currentUser
        ? currentUser.id
        : null,

    action:
      action,

    message:
      details.message || ''
  }

  console.log(
    'LOG INSERT ROW:',
    row
  )

  const { data, error } =
    await supabase
      .from('logs')
      .insert(row)
      .select()
      .single()

  if (error) {

    console.error(
      'LOG INSERT ERROR:',
      error
    )

    setStatus(
      'LOG INSERT ERROR: '
      + error.message
    )

    throw error
  }

  console.log(
    'LOG INSERT OK:',
    data
  )

  setStatus(
    'LOG SAVED'
  )

  return data
}

/*
========================================
PARAMS
========================================
*/

function loadParams() {
  const params =
    new URLSearchParams(window.location.search)

  orderId =
    params.get('order_id')

  if (!orderId)
    throw new Error('order_id is missing')
}

/*
========================================
LOAD USER
========================================
*/

async function loadUser() {

  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  currentUser =
    data.user

  if (!currentUser)
    throw new Error('User not logged in')

  userBox.textContent =
    currentUser.email || currentUser.id
}

/*
========================================
LOAD CONTEXT
========================================
*/

async function loadContext(order) {

  setStatus('Loading order context...')

  const { data: project, error: projectError } =
    await supabase
      .from('projects')
      .select('name')
      .eq('project_id', order.project_id)
      .maybeSingle()

  if (projectError)
    throw projectError

  projectBox.textContent =
    project?.name || order.project_id

  const { data: hall, error: hallError } =
    await supabase
      .from('halls')
      .select('name')
      .eq('hall_id', order.hall_id)
      .maybeSingle()

  if (hallError)
    throw hallError

  hallBox.textContent =
    hall?.name || order.hall_id

  const { data: table, error: tableError } =
    await supabase
      .from('tables')
      .select('name')
      .eq('table_id', order.table_id)
      .maybeSingle()

  if (tableError)
    throw tableError

  tableBox.textContent =
    table?.name || order.table_id
}

/*
========================================
LOAD ORDER
========================================
*/

async function loadOrder() {

  setStatus('Loading order...')

  const { data, error } =
    await supabase
      .from('orders')
      .select('*')
      .eq('order_id', orderId)
      .single()

  if (error)
    throw error

  currentOrder =
    data

  await loadContext(data)

  renderOrder(data)

  await loadMenusSelect()    

  setStatus(
    'Order loaded: '
    + (data.order_number || data.order_id)
  )
}

/*
========================================
RENDER ORDER
Opened at / Closed at
========================================
*/

function renderOrder(order) {

  let title =
    'Check #' + (order.order_number ?? '-')

  if (DEBUG_IDS) {
    title +=
      ' [' + order.order_id + ']'
  }

  orderTitle.textContent =
    title

  const openedAt =
    order.opened_at || order.created_at

  const closedAt =
    order.closed_at || null

  orderTime.innerHTML =
    `
      <div style="color:#dc2626; font-weight:700;">
        Opened at:
        ${
          openedAt
            ? new Date(openedAt).toLocaleString()
            : '-'
        }
      </div>

      ${
        closedAt
          ? `
            <div style="color:#16a34a; font-weight:700; margin-top:4px;">
              Closed at:
              ${new Date(closedAt).toLocaleString()}
            </div>
          `
          : ''
      }
    `

paidBox.textContent =
  Number(order.paid || 0).toFixed(2)
      
  itemsBox.innerHTML =
    ''
   cancelledItemsBox.innerHTML =
  ''
      
  loadItems()
}

/*
========================================
LOAD MENUS SELECT
загружает список меню
========================================
*/

async function loadMenusSelect() {

  try {

    if (!currentOrder)
      return

    const { data, error } =
      await supabase
        .from('menus')
        .select('menu_id, menu_name, sort_order')
        .eq('project_id', currentOrder.project_id)
        .order('sort_order', { ascending: true })

    console.log('MENUS DATA:', data)
    console.log('MENUS ERROR:', error)

    if (error)
      throw error

    menuSelect.innerHTML =
      '<option value="">Menu...</option>'

    data.forEach(menu => {

      const option =
        document.createElement('option')

      option.value =
        menu.menu_id

      option.textContent =
        menu.menu_name

      menuSelect.appendChild(option)
    })

    setStatus(
      'Menus loaded: '
      + data.length
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Load menus error: '
      + err.message
    )
  }
}
      
/*
========================================
LOAD CATS BY MENU
категории по выбранному меню
dishes.menu_id = основное меню
multis = дополнительные меню
========================================
*/

async function loadCatsByMenu() {

  const menuId =
    menuSelect.value


      
      console.log(
  'SELECTED MENU ID:',
  menuId
)


      
  catSelect.innerHTML =
    '<option value="">Category...</option>'

  dishSelect.innerHTML =
    '<option value="">Dish...</option>'

  catSelect.disabled =
    true

  dishSelect.disabled =
    true

  if (!menuId)
    return

  const { data, error } =
    await supabase
      .from('dishes')

        
        
      .select(`
  dish_id,
  dish_name,
  menu_id,
  category_id,
  cats (
    cat_id,
    cat_name,
    sort_order
  ),
  multis (
    menu_id
  )
`)


        
      .eq('project_id', currentOrder.project_id)

  console.log('CATS RAW DATA:', data)
  console.log('CATS ERROR:', error)


      
console.log(
  'CATS FILTERED:',
  data
    .filter(dish => dish.menu_id === menuId)
    .map(dish => ({
      dish: dish.dish_name,
      menu_id: dish.menu_id,
      category_id: dish.category_id,
      cat: dish.cats?.cat_name
    }))
)


      
  if (error)
    throw error

  const map =
    new Map()

  data.forEach(dish => {

    const inMainMenu =
      dish.menu_id === menuId

    const inExtraMenu =
      Array.isArray(dish.multis)
      && dish.multis.some(ms =>
        ms.menu_id === menuId
      )

    if (!inMainMenu && !inExtraMenu)
      return

    if (!dish.category_id || !dish.cats)
      return

    map.set(
      dish.category_id,
      dish.cats
    )
  })

  const cats =
    [...map.values()]
      .sort((a, b) =>
        (a.sort_order || 0) - (b.sort_order || 0)
      )

  cats.forEach(cat => {

    const option =
      document.createElement('option')

    option.value =
      cat.cat_id

    option.textContent =
      cat.cat_name

    catSelect.appendChild(option)
  })

  catSelect.disabled =
    false

  setStatus(
    'Categories loaded: '
    + cats.length
  )
}

/*
========================================
LOAD DISHES BY MENU + CAT
блюда по выбранному меню и категории
dishes.menu_id = основное меню
multis = дополнительные меню
========================================
*/

async function loadDishesByMenuAndCat() {

  const menuId =
    menuSelect.value

  const catId =
    catSelect.value

  dishSelect.innerHTML =
    '<option value="">Dish...</option>'

  dishSelect.disabled =
    true

  if (!menuId || !catId)
    return

  const { data, error } =
    await supabase
      .from('dishes')
      .select(`
        dish_id,
        dish_name,
        price,
        sort_order,
        menu_id,
        category_id,
        multis (
          menu_id
        )
      `)
      .eq('project_id', currentOrder.project_id)
      .eq('category_id', catId)
      .eq('dish_status', 'active')
      .order('sort_order', { ascending: true })

  console.log('DISHES RAW DATA:', data)
  console.log('DISHES ERROR:', error)

  if (error)
    throw error

  const dishes =
    data.filter(dish => {

      const inMainMenu =
        dish.menu_id === menuId

      const inExtraMenu =
        Array.isArray(dish.multis)
        && dish.multis.some(ms =>
          ms.menu_id === menuId
        )

      return inMainMenu || inExtraMenu
    })

  dishes.forEach(dish => {

    const option =
      document.createElement('option')

    option.value =
      dish.dish_id

    option.textContent =
      dish.dish_name
      + ' — '
      + Number(dish.price || 0).toFixed(2)

    option.dataset.name =
      dish.dish_name

    option.dataset.price =
      String(dish.price || 0)

    dishSelect.appendChild(option)
  })

  dishSelect.disabled =
    false

  setStatus(
    'Dishes loaded: '
    + dishes.length
  )
}

/*
========================================
ADD SELECTED DISH
добавляет выбранное блюдо в items

ЛОГИКА:

если уже есть такая же позиция со статусом NEW:
- увеличиваем qty

если такая же позиция уже PROCESSING:
- НЕ трогаем её
- создаём новую строку NEW

cancelled строки не трогаем
========================================
*/

async function addSelectedDish() {

  try {

    if (!currentOrder)
      return

    const option =
      dishSelect.selectedOptions[0]

    if (!option || !option.value) {
      setStatus('Select dish first')
      return
    }

    const qty =
      Number(dishQty.value) || 1

    const price =
      Number(option.dataset.price) || 0

    const name =
      option.dataset.name || 'Item'

    const { data: existingNew, error: findError } =
      await supabase
        .from('items')
        .select('*')
        .eq('order_id', currentOrder.order_id)
        .eq('name', name)
        .eq('price', price)
        .eq('item_status', 'new')
        .maybeSingle()

    if (findError)
      throw findError

    if (existingNew) {

      const { error: updateError } =
        await supabase
          .from('items')
          .update({
            qty:
              (Number(existingNew.qty) || 0) + qty
          })
          .eq('item_id', existingNew.item_id)

      if (updateError)
        throw updateError

    } else {

      const { error: insertError } =
        await supabase
          .from('items')
          .insert({
            order_id:
              currentOrder.order_id,

            name,
            qty,
            price,

            item_status:
              'new'
          })

      if (insertError)
        throw insertError
    }

    await loadOrder()

    dishSelect.value =
      ''

    dishQty.value =
      1

    setStatus('Dish added')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Add dish error: '
      + err.message
    )
  }
}
      
/*
========================================
LOAD ITEMS
загрузка позиций заказа
========================================
*/

async function loadItems() {

  try {

    if (!currentOrder)
      return

    setStatus('Loading items...')

   const { data, error } =
  await supabase
    .from('items')
    .select('*')
    .eq('order_id', currentOrder.order_id)
    .order('created_at', { ascending: true })

    if (error)
      throw error

    itemsBox.innerHTML =
      ''

    if (!data || !data.length) {

      update()

      setStatus('No items found')

      return
    }

   data.forEach(item => {

  if (item.item_status === 'cancelled') {
    createCancelledRow(item)
  } else {
    createRow(item)
  }
})

/*
----------------------------------------
ENABLE / DISABLE SEND ALL
----------------------------------------
*/

const hasNewItems =
  data.some(item =>
    item.item_status === 'new'
  )

sendAllBtn.disabled =
  !hasNewItems
        
    update()

    setStatus(
      'Items loaded: '
      + data.length
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Load items error: '
      + err.message
    )
  }
}

/*
========================================
CREATE ROW
позиция из DB
========================================
*/

function createRow(item) {

  const row =
    document.createElement('div')

  row.className =
    'order-row'

  row.dataset.itemId =
    item.item_id

  row.dataset.itemStatus =
    item.item_status || 'new'

  row.innerHTML =
    `
      <input
        value="${escapeHtml(item.name || '')}"
        class="name">

      <input
        type="number"
        value="${item.qty || 1}"
        class="qty">

      <input
        type="number"
        value="${item.price || 0}"
        class="price">

      <span class="sum">
        ${Number(item.line_total || 0).toFixed(2)}
      </span>

      <span class="item-status">
        ${escapeHtml(item.item_status || 'new')}
      </span>

      <button
        type="button"

/*
========================================
SEND ITEM TO WORK
1 нажатие = 1 unit
NEW -> PROCESSING

ЛОГИКА:

если:
Pizza qty=5 NEW

и нажать SEND

станет:

Pizza qty=4 NEW
Pizza qty=1 PROCESSING

если processing строка уже существует:
новый unit добавляется в неё

DELETE для processing запрещён
SEND для processing запрещён
========================================
*/

async function sendItemToWork(item) {

  try {

    if ((item.item_status || 'new') !== 'new') {

      setStatus(
        'Only NEW item can be sent'
      )

      return
    }

    /*
    ----------------------------------------
    LOAD CURRENT ITEM
    ----------------------------------------
    */

    const { data: current, error: loadError } =
      await supabase
        .from('items')
        .select('*')
        .eq('item_id', item.item_id)
        .single()

    if (loadError)
      throw loadError

    const qty =
      Number(current.qty) || 0

    /*
    ----------------------------------------
    REMOVE 1 UNIT FROM NEW
    ----------------------------------------
    */

    if (qty <= 1) {

      const { error: deleteError } =
        await supabase
          .from('items')
          .delete()
          .eq('item_id', item.item_id)

      if (deleteError)
        throw deleteError

    } else {

      const { error: updateError } =
        await supabase
          .from('items')
          .update({
            qty:
              qty - 1
          })
          .eq('item_id', item.item_id)

      if (updateError)
        throw updateError
    }

    /*
    ----------------------------------------
    FIND EXISTING PROCESSING ROW
    same name + same price
    ----------------------------------------
    */

    const { data: existingProcessing } =
      await supabase
        .from('items')
        .select('*')
        .eq('order_id', currentOrder.order_id)
        .eq('name', current.name)
        .eq('price', current.price)
        .eq('item_status', 'processing')
        .maybeSingle()

    /*
    ----------------------------------------
    ADD TO EXISTING PROCESSING
    ----------------------------------------
    */

    if (existingProcessing) {

      const { error: mergeError } =
        await supabase
          .from('items')
          .update({
            qty:
              (Number(existingProcessing.qty) || 0) + 1
          })
          .eq('item_id', existingProcessing.item_id)

      if (mergeError)
        throw mergeError

    } else {

      /*
      ----------------------------------------
      CREATE NEW PROCESSING ROW
      ----------------------------------------
      */

      const { error: insertError } =
        await supabase
          .from('items')
          .insert({
            order_id:
              currentOrder.order_id,

            name:
              current.name,

            qty:
              1,

            price:
              current.price,

            item_status:
              'processing'
          })

      if (insertError)
        throw insertError
    }

    await loadOrder()

    setStatus(
      '1 unit sent to work'
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Send item error: '
      + err.message
    )
  }
}
      
/*
========================================
SEND ALL TO WORK
все NEW -> PROCESSING

ЛОГИКА:

все строки NEW:
- переносятся в PROCESSING
- объединяются с существующими
  PROCESSING строками

пример:

Pizza qty=3 NEW
Pizza qty=2 PROCESSING

после ALL TO WORK:

Pizza qty=5 PROCESSING

если NEW позиций нет:
кнопка ALL TO WORK disabled
========================================
*/

async function sendAllToWork() {

  try {

    if (!currentOrder)
      return

    /*
    ----------------------------------------
    LOAD ALL NEW ITEMS
    ----------------------------------------
    */

    const { data: items, error: loadError } =
      await supabase
        .from('items')
        .select('*')
        .eq('order_id', currentOrder.order_id)
        .eq('item_status', 'new')

    if (loadError)
      throw loadError

    if (!items || !items.length) {

      setStatus(
        'No NEW items'
      )

      return
    }

    /*
    ----------------------------------------
    MOVE EACH ITEM
    ----------------------------------------
    */

    for (const item of items) {

      const { data: existingProcessing } =
        await supabase
          .from('items')
          .select('*')
          .eq('order_id', currentOrder.order_id)
          .eq('name', item.name)
          .eq('price', item.price)
          .eq('item_status', 'processing')
          .maybeSingle()

      if (existingProcessing) {

        const { error: mergeError } =
          await supabase
            .from('items')
            .update({
              qty:
                (Number(existingProcessing.qty) || 0)
                + (Number(item.qty) || 0)
            })
            .eq('item_id', existingProcessing.item_id)

        if (mergeError)
          throw mergeError

      } else {

        const { error: insertError } =
          await supabase
            .from('items')
            .insert({
              order_id:
                currentOrder.order_id,

              name:
                item.name,

              qty:
                item.qty,

              price:
                item.price,

              item_status:
                'processing'
            })

        if (insertError)
          throw insertError
      }

      /*
      ----------------------------------------
      REMOVE OLD NEW ROW
      ----------------------------------------
      */

      const { error: deleteError } =
        await supabase
          .from('items')
          .delete()
          .eq('item_id', item.item_id)

      if (deleteError)
        throw deleteError
    }

    await loadOrder()

    setStatus(
      'All NEW items sent to work'
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Send all error: '
      + err.message
    )
  }
}

async function changeTable() {

      return

    const { data, error } =
      await supabase
        .from('tables')
        .select(`
          *,
          halls (
            hall_id,
            name
          )
        `)
        .eq('project_id', currentOrder.project_id)
        .eq('table_status', 'free')
        .order('hall_id', { ascending: true })
        .order('name', { ascending: true })

    if (error)
      throw error

    freeTablesBox.innerHTML =
      ''

    if (!data || !data.length) {
      freeTablesBox.innerHTML =
        '<div class="empty">No free tables</div>'

      changeTableDialog.classList.remove('hidden')

      return
    }

    const groups =
      {}

    data.forEach(table => {

      const hallId =
        table.hall_id || 'no-hall'

      if (!groups[hallId]) {
        groups[hallId] = {
          hallName:
            table.halls?.name || hallId,

          tables:
            []
        }
      }

      groups[hallId].tables.push(table)
    })

    Object.keys(groups).forEach(hallId => {

      const group =
        groups[hallId]

      const hallBlock =
        document.createElement('div')

      hallBlock.className =
        'change-hall-card'

      const title =
        document.createElement('div')

      title.className =
        'change-hall-title'

      title.textContent =
        group.hallName
        + ' · '
        + group.tables.length

      const list =
        document.createElement('div')

      list.className =
        'change-table-list'

      group.tables.forEach(table => {

        const btn =
          document.createElement('button')

        btn.type =
          'button'

        btn.className =
          'change-table-row table-free'

        btn.textContent =
          (table.name || table.table_id)
          + ' · free'

        btn.addEventListener(
          'click',
          () => moveOrderToTable(table)
        )

        list.appendChild(btn)
      })

      hallBlock.appendChild(title)
      hallBlock.appendChild(list)

      freeTablesBox.appendChild(hallBlock)
    })

    changeTableDialog.classList.remove('hidden')
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Change table error: '
      + err.message
    )
  }
}

========================================
*/

async function printSplitByPositions() {

  try {

    const count =
      Number(splitCheckCount.value)

    if (!count || count < 2) {

      setStatus(
        'Wrong checks count'
      )

      return
    }

    const baseData =
      buildCheckData()

    const checks =
      []

    for (let i = 1; i <= count; i++) {

      const box =
        splitItemsBox.querySelector(
          '.split-target[data-check="' + i + '"]'
        )

      const items =
        [...box.querySelectorAll('.split-draggable-item')]
          .map(item => ({

            name:
              item.dataset.name || 'Item',

            qty:
              Number(item.dataset.qty) || 0,

            price:
              Number(item.dataset.price) || 0,

            sum:
              Number(item.dataset.sum) || 0
          }))

      const subtotal =
        items.reduce(
          (sum, item) => sum + item.sum,
          0
        )

      checks.push({

        ...baseData,

        order_number:
          (baseData.order_number || baseData.order_id)
          + '-'
          + i,

        items,

        subtotal,

        service_total:
          0,

        total:
          subtotal
      })
    }

    localStorage.setItem(
      'print_split_checks',
      JSON.stringify(checks)
    )

    await addConsoleLog(
      'split check',
      {
        project_id:
          currentOrder.project_id,

        hall_id:
          currentOrder.hall_id,

        table_id:
          currentOrder.table_id,

        order_id:
          currentOrder.order_id,

        message:
          'SPLIT BY POSITIONS OPENED: '
          + count
          + ' checks'
      }
    )

    splitCheckDialog.classList.add(
      'hidden'
    )

    setStatus(
      'Split by positions opened'
    )

    openDetachedPrintPage(
  'print.html?mode=split'
)
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Split by positions error: '
      + err.message
    )
  }
}
      
/*
========================================
BUILD CHECK DATA
собирает данные чека для print.html
========================================
*/

function buildCheckData() {

  const items =
    []

  itemsBox
    .querySelectorAll('.order-row')
    .forEach(row => {

      const name =
        row.querySelector('.name')?.value || 'Item'

      const qty =
        Number(row.querySelector('.qty')?.value) || 0

      const price =
        Number(row.querySelector('.price')?.value) || 0

      items.push({
        name,
        qty,
        price,
        sum: qty * price
      })
    })

  return {
    order_id: currentOrder.order_id,
    order_number: currentOrder.order_number,

    project_id: currentOrder.project_id,
    hall_id: currentOrder.hall_id,
    table_id: currentOrder.table_id,

    project_name: projectBox.textContent,
    hall_name: hallBox.textContent,
    table_name: tableBox.textContent,

    opened_at: currentOrder.opened_at || currentOrder.created_at,
    closed_at: currentOrder.closed_at || null,

    items,

    subtotal: Number(subTotalBox.textContent) || 0,
    service_percent: SERVICE_PERCENT,
    service_total: Number(serviceBox.textContent) || 0,
    total: Number(finalBox.textContent) || 0
  }
}

/*
========================================
OPEN DETACHED PRINT PAGE
открывает print.html отдельно от order
========================================
*/

function openDetachedPrintPage(url) {

  const link =
    document.createElement('a')

  link.href =
    url

  link.target =
    '_blank'

  link.rel =
    'noopener noreferrer'

  document.body.appendChild(
    link
  )

  link.click()

  link.remove()
}

/*
========================================
OPEN PAYMENT DIALOG
открывает окно внесения оплаты
========================================
*/

function openPaymentDialog() {

  if (!currentOrder)
    return

  const total =
    Number(currentOrder.total || 0)

  const paid =
    Number(currentOrder.paid || 0)

  const rest =
    Math.max(
      total - paid,
      0
    )

  paymentAmount.value =
    rest.toFixed(2)

  paymentDialog.classList.remove(
    'hidden'
  )
}

/*
========================================
ADD PAYMENT
добавляет сумму оплаты прямо в orders.paid
method пока только для лога
========================================
*/

async function addPayment(method) {

  try {

    if (!currentOrder)
      return

    const amount =
      Number(paymentAmount.value) || 0

    if (amount <= 0) {

      setStatus(
        'Wrong payment amount'
      )

      return
    }

    const oldPaid =
      Number(currentOrder.paid || 0)

    const newPaid =
      oldPaid + amount

    const { error } =
      await supabase
        .from('orders')
        .update({
          paid:
            newPaid
        })
        .eq('order_id', currentOrder.order_id)

    if (error)
      throw error

    await addConsoleLog(
      'add payment',
      {
        project_id: currentOrder.project_id,
        hall_id: currentOrder.hall_id,
        table_id: currentOrder.table_id,
        order_id: currentOrder.order_id,
        message:
          'PAYMENT ADDED: '
          + amount.toFixed(2)
          + ' '
          + method
      }
    )

    paymentDialog.classList.add(
      'hidden'
    )

    await loadOrder()

    setStatus(
      'Payment added'
    )
  }
  catch (err) {

    console.error(err)

    setStatus(
      'Payment error: '
      + err.message
    )
  }
}
      
/*
========================================
ESCAPE HTML
========================================
*/

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}
