========================================
ДИАЛОГ ДЕЙСТВИЙ СО СТОЛОМ

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectNameBox =
  document.getElementById('projectName')

const hallNameBox =
  document.getElementById('hallName')

const userNameBox =
  document.getElementById('userName')

const hallSelect =
  document.getElementById('hallSelect')

const statusBox =
  document.getElementById('status')

const hallTabs =
  document.getElementById('hallTabs')

const tabsInfo =
  document.getElementById('tabsInfo')

const hallGrid =
  document.getElementById('hallGrid')

const singleHallWrap =
  document.getElementById('singleHallWrap')

const hallCanvas =
  document.getElementById('hallCanvas')

const allHalls =
  document.getElementById('allHalls')

const hallConsole =
  document.getElementById('hallConsole')

let buildDown =
  document.getElementById('build-down')

const viewTabsBtn =
  document.getElementById('viewTabsBtn')

const viewGridBtn =
  document.getElementById('viewGridBtn')

const viewAllBtn =
  document.getElementById('viewAllBtn')

const viewConsoleBtn =
  document.getElementById('viewConsoleBtn')

const dialog =
  document.getElementById('tableDialog')

const dialogTitle =
  document.getElementById('dialogTitle')

const dialogInfo =
  document.getElementById('dialogInfo')

const btnOpenOrder =
  document.getElementById('btnOpenOrder')

const btnCloseOrder =
  document.getElementById('btnCloseOrder')

const btnReserveTable =
  document.getElementById('btnReserveTable')

const btnCleanTable =
  document.getElementById('btnCleanTable')

const btnAddChair =
  document.getElementById('btnAddChair')

const btnRemoveChair =
  document.getElementById('btnRemoveChair')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let currentProjectId =
  null

let currentProjectName =
  ''

let currentHallId =
  null

let currentHallName =
  ''

let activeTable =
  null

let hallViewMode =
  sessionStorage.getItem('mysada_hall_view_mode') || 'tabs'

let hallsList =
  []

let tablesList =
  []

let ordersList =
  []

let consoleLogs =
  []

/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

function setStatus(text) {
  statusBox.textContent =
    text

  console.log('[HALL]', text)

  updateBuildLine(text)
}

/*
========================================
CONSOLE ACCESS
developer / owner / manager
========================================
*/

function canUseConsole() {
  if (!currentUser || !currentUser.role)
    return false

  return [
    'developer',
    'owner',
    'manager'
  ].includes(currentUser.role)
}

/*
========================================
CONSOLE LOG
журнал действий
========================================
*/

function addConsoleLog(action, details = {}) {
  const item = {
    time: new Date().toLocaleString(),
    action,
    user:
      currentUser
      ? currentUser.email + ' / ' + currentUser.role
      : '-',
    hall:
      details.hall || currentHallName || '-',
    table:
      details.table || '-',
    details:
      details.message || ''
  }

  consoleLogs.unshift(item)

  if (consoleLogs.length > 300) {
    consoleLogs =
      consoleLogs.slice(0, 300)
  }

  if (hallViewMode === 'console') {
    renderConsole()
  }
}

/*
========================================
LOAD USER
берём текущего Supabase Auth пользователя
и роль из public.users
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser = {
    user_id: data.user.id,
    email: data.user.email,
    name: data.user.email,
    role: null
  }

  const { data: appUser, error: appUserError } =
    await supabase
      .from('users')
      .select('role')
      .eq('user_id', currentUser.user_id)
      .maybeSingle()

  if (appUserError) {
    console.error(appUserError)
  }

  if (appUser && appUser.role) {
    currentUser.role =
      appUser.role
  }
  else {
    currentUser.role =
      'developer'
  }

  userNameBox.textContent =
    currentUser.name
    + ' / '
    + currentUser.role

  sessionStorage.setItem(
    'mysada_user',
    JSON.stringify(currentUser)
  )

  viewConsoleBtn.classList.toggle(
    'hidden',
    !canUseConsole()
  )

  addConsoleLog(
    'user log in',
    {
      message: currentUser.email
    }
  )

  return currentUser
}

/*
========================================
LOAD PROJECT
берём project из sessionStorage
========================================
*/

function loadProjectFromSession() {
  setStatus('Loading project from session...')

  const rawProject =
    sessionStorage.getItem('mysada_project')

  if (!rawProject)
    throw new Error('Project not found in sessionStorage')

  const savedProject =
    JSON.parse(rawProject)

  currentProjectId =
    savedProject.project_id

  currentProjectName =
    savedProject.project_name || savedProject.name || 'Project'

  if (!currentProjectId)
    throw new Error('Project ID is empty in sessionStorage')

  projectNameBox.textContent =
    currentProjectName + ' / ' + currentProjectId

  return currentProjectId
}

/*
========================================
LOAD PROJECT DATA
залы / столы / заказы
========================================
*/

async function loadProjectData() {
  setStatus('Loading halls and tables...')

  const { data: halls, error: hallsError } =
    await supabase
      .from('halls')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('name', { ascending: true })

  if (hallsError)
    throw hallsError

  hallsList =
    halls || []

  const { data: tables, error: tablesError } =
    await supabase
      .from('tables')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('name', { ascending: true })

  if (tablesError)
    throw tablesError

  tablesList =
    tables || []

  const { data: orders, error: ordersError } =
    await supabase
      .from('orders')
      .select('*')
      .eq('project_id', currentProjectId)

  if (ordersError)
    throw ordersError

  ordersList =
    orders || []

  setStatus(
    'Project data loaded: halls '
    + hallsList.length
    + ', tables '
    + tablesList.length
    + ', orders '
    + ordersList.length
  )
}

/*
========================================
LOAD HALL LIST
========================================
*/

function loadHallList() {
  setStatus('Rendering hall list...')

  hallSelect.innerHTML =
    ''

  if (!hallsList.length) {
    hallSelect.innerHTML =
      '<option value="">No halls</option>'

    hallNameBox.textContent =
      'No halls'

    setStatus('No halls found for project')

    return null
  }

  hallsList.forEach(hall => {
    const option =
      document.createElement('option')

    option.value =
      hall.hall_id || hall.id

    option.textContent =
      hall.name || option.value

    hallSelect.appendChild(option)
  })

  const params =
    new URLSearchParams(window.location.search)

  const hallIdFromUrl =
    params.get('hall_id')

  if (hallIdFromUrl) {
    hallSelect.value =
      hallIdFromUrl
  }

  if (!hallSelect.value) {
    hallSelect.selectedIndex =
      0
  }

  currentHallId =
    hallSelect.value

  currentHallName =
    hallSelect.options[hallSelect.selectedIndex].textContent

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  setStatus(
    'Hall list rendered: ' + hallsList.length
  )

  return currentHallId
}

/*
========================================
COUNT TABLES FOR HALL
========================================
*/

function countTablesForHall(hallId) {
  return tablesList.filter(
    table => table.hall_id === hallId
  ).length
}

/*
========================================
GET HALL NAME
========================================
*/

function getHallName(hallId) {
  const hall =
    hallsList.find(
      item => (item.hall_id || item.id) === hallId
    )

  if (!hall)
    return hallId

  return hall.name || hallId
}

/*
========================================
SEATS
round = 2
square = 4
rect = 6
========================================
*/

function getDefaultSeats(shape) {
  if (shape === 'round')
    return 2

  if (shape === 'rect')
    return 6

  return 4
}

function getTableSeats(table) {
  if (table.seats !== null && table.seats !== undefined)
    return Number(table.seats)

  if (table.chair_count !== null && table.chair_count !== undefined)
    return Number(table.chair_count)

  return getDefaultSeats(table.shape)
}

/*
========================================
HALL INFO HTML
для Tabs / Grid info / Mosaic info
========================================
*/

function getHallInfoHtml(hallId) {
  const hallTables =
    tablesList.filter(
      table => table.hall_id === hallId
    )

  const free =
    hallTables.filter(
      table => (table.table_status || 'free') === 'free'
    ).length

  const occupied =
    hallTables.filter(
      table => table.table_status === 'occupied'
    ).length

  const reserved =
    hallTables.filter(
      table => table.table_status === 'reserved'
    ).length

  const cleaning =
    hallTables.filter(
      table => table.table_status === 'cleaning'
    ).length

  const chairs =
    hallTables.reduce(
      (sum, table) => sum + getTableSeats(table),
      0
    )

  const openOrders =
    ordersList.filter(order =>
      order.hall_id === hallId
      &&
      (order.order_status || order.status) === 'open'
    )

  const clients =
    openOrders.reduce(
      (sum, order) => sum + Number(order.guest_count || 0),
      0
    )

  const waiters =
    new Set(
      openOrders
        .map(order => order.shift_id)
        .filter(Boolean)
    ).size

  return (
    'Tables: ' + hallTables.length
    + '/  Free: ' + free
    + '/  Occupied: ' + occupied
    + '/  Reserved: ' + reserved
    + '/  Cleaning: ' + cleaning
    + '/  Chairs: ' + chairs
    + '/  Seats: ' + clients
    + '/  Waiters: ' + waiters
  )
}

/*
========================================
TABS INFO
========================================
*/

function renderTabsInfo() {
  if (!currentHallId)
    return

  tabsInfo.innerHTML =
    getHallInfoHtml(currentHallId)
}

/*
========================================
SET CURRENT HALL
========================================
*/

function setCurrentHall(hallId) {
  currentHallId =
    hallId

  currentHallName =
    getHallName(hallId)

  hallSelect.value =
    hallId

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  sessionStorage.setItem(
    'mysada_current_hall_id',
    currentHallId
  )

  renderHallTabs()
  renderHallGrid()

  if (hallViewMode !== 'all') {
    renderCurrentHall()
  }

  if (hallViewMode === 'all') {
    renderAllHalls()
  }

  if (hallViewMode === 'console') {
    renderConsole()
  }

 setStatus(
    'Selected hall: ' + currentHallName
  )
}

/*
========================================
RENDER HALL TABS
========================================
*/

function renderHallTabs() {
  hallTabs.innerHTML =
    ''

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const button =
      document.createElement('button')

    button.type =
      'button'

    button.className =
      'hall-tab'

    if (hallId === currentHallId) {
      button.classList.add('active')
    }

    button.textContent =
      (hall.name || hallId)
      + ' · '
      + countTablesForHall(hallId)

    button.addEventListener('click', () => {
      setCurrentHall(hallId)
    })

    hallTabs.appendChild(button)
  })
}

/*
========================================
GRID HALL INFO
правый клик по белому фону зала
========================================
*/

function showHallInfoDialog(hallId) {
  dialog.classList.add('hall-info-mode')

  dialogTitle.textContent =
    getHallName(hallId)

  dialogInfo.innerHTML =
    getHallInfoHtml(hallId)

  activeTable =
    null

  dialog.classList.remove('hidden')
}

/*
========================================
RENDER HALL GRID
левая кнопка по столу = orders.html
правая кнопка по столу = действия
левая кнопка по фону = Tabs
правая кнопка по фону = info
========================================
*/

function renderHallGrid() {
  hallGrid.innerHTML =
    ''

  if (!hallsList.length) {
    setStatus('No halls to render')
    return
  }

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const card =
      document.createElement('div')

    card.className =
      'hall-card'

    if (hallId === currentHallId) {
      card.classList.add('active')
    }

    const title =
      document.createElement('div')

    title.className =
      'hall-card-title'

    title.textContent =
      hall.name || hallId

    card.appendChild(title)

    const info =
      document.createElement('div')

    info.className =
      'hall-card-info'

    info.textContent =
      'tables: '
      + countTablesForHall(hallId)

    card.appendChild(info)

    const tree =
      document.createElement('div')

    tree.className =
      'table-tree'

    card.appendChild(tree)

    tablesList
      .filter(
        table =>
          table.hall_id === hallId
      )
      .forEach(table => {
        const row =
          document.createElement('button')

        const status =
          table.table_status || 'free'

        row.type =
          'button'

        row.className =
          'table-tree-row table-'
          + status

        row.textContent =
          (table.name || table.table_id)
          + ' · '
          + status
          + ' · chairs '
          + getTableSeats(table)

        row.addEventListener(
          'click',
          event => {
            event.stopPropagation()

            window.location.href =
              'orders.html'
              + '?project_id='
              + table.project_id
              + '&hall_id='
              + table.hall_id
              + '&table_id='
              + table.table_id
          }
        )

        row.addEventListener(
          'contextmenu',
          event => {
            event.preventDefault()
            event.stopPropagation()

            setCurrentHall(hallId)

            openTableDialog(table)
          }
        )

        tree.appendChild(row)
      })

    card.addEventListener(
      'click',
      event => {
        if (event.target.closest('.table-tree-row'))
          return

        setCurrentHall(hallId)

        setHallViewMode('tabs')
      }
    )

    card.addEventListener(
      'contextmenu',
      event => {
        if (event.target.closest('.table-tree-row'))
          return

        event.preventDefault()
        event.stopPropagation()

        setCurrentHall(hallId)

        showHallInfoDialog(hallId)
      }
    )

    hallGrid.appendChild(card)
  })
}

/*
========================================
SET HALL VIEW MODE
tabs | grid | all | console
========================================
*/

function setHallViewMode(mode) {
  if (mode === 'console' && !canUseConsole()) {
    setStatus('Access denied: console')

    addConsoleLog(
      'errors',
      {
        message: 'Access denied: console'
      }
    )

    return
  }

  hallViewMode =
    mode

      const viewLabel =
  document.querySelector('.view-label')

if (viewLabel) {
  viewLabel.textContent =
    'View Mode: ' + mode
}

  sessionStorage.setItem(
    'mysada_hall_view_mode',
    mode
  )

  viewTabsBtn.classList.toggle(
    'active',
    mode === 'tabs'
  )

  viewGridBtn.classList.toggle(
    'active',
    mode === 'grid'
  )

  viewAllBtn.classList.toggle(
    'active',
    mode === 'all'
  )

  viewConsoleBtn.classList.toggle(
    'active',
    mode === 'console'
  )

  hallTabs.classList.toggle(
    'hidden',
    mode !== 'tabs'
  )

  tabsInfo.classList.toggle(
    'hidden',
    mode !== 'tabs'
  )

  hallGrid.classList.toggle(
    'hidden',
    mode !== 'grid'
  )

  singleHallWrap.classList.toggle(
    'hidden',
    mode === 'all' || mode === 'grid' || mode === 'console'
  )

  allHalls.classList.toggle(
    'hidden',
    mode !== 'all'
  )

  hallConsole.classList.toggle(
    'hidden',
    mode !== 'console'
  )

  dialog.classList.add('hidden')

  activeTable =
    null

  renderHallTabs()
  renderHallGrid()

  if (mode === 'all') {
    renderAllHalls()
  }

  if (mode === 'tabs') {
    renderCurrentHall()
    renderTabsInfo()
  }

  if (mode === 'console') {
    renderConsole()
  }

  
}

/*
========================================
LOAD TABLES
========================================
*/

function loadTables() {
  renderCurrentHall()
}

/*
========================================
RENDER CURRENT HALL
Tabs mode
========================================
*/

function renderCurrentHall() {
  hallCanvas.innerHTML =
    ''

  activeTable =
    null

  dialog.classList.add('hidden')

  if (!currentHallId) {
    setStatus('No hall selected')
    return
  }

  const tablesForHall =
    tablesList.filter(
      table => table.hall_id === currentHallId
    )

  if (!tablesForHall.length) {
    renderTabsInfo()

    setStatus(
      'No tables found for hall: ' + currentHallName
    )

    return
  }

  tablesForHall.forEach(table => {
    renderTableToCanvas(
      table,
      hallCanvas
    )
  })

  renderTabsInfo()

  setStatus(
    'Tables rendered: '
    + tablesForHall.length
    + ' | '
    + currentHallName
  )
}

/*
========================================
RENDER MOSAIC
title внутри scale
квадраты подряд
ширина = 1200 / число залов
========================================
*/

function renderAllHalls() {

  allHalls.innerHTML = ''

  activeTable = null

  dialog.classList.add('hidden')

  if (!hallsList.length) {
    setStatus('No halls to render')
    return
  }


  /*   ШИРИНА ОДНОГО ЗАЛА  */

  const hallsCount =
    hallsList.length || 1

  const boxWidth =
    Math.floor(1200 / hallsCount)



  hallsList.forEach(hall => {

    const hallId =
      hall.hall_id || hall.id



    /*    SCALE BOX    */

    const scaleBox =
      document.createElement('div')

    scaleBox.className =
      'hall-scale-box'

    /*     ШИРИНА = 1200 / число залов    */

    scaleBox.style.width =
      boxWidth + 'px'


    if (hallId === currentHallId) {
      scaleBox.classList.add('active')
    }



    /*      TITLE ВНУТРИ SCALE     */
   

    const title =
      document.createElement('div')

    title.className =
      'hall-block-title'

    /*
    ВЫВОД ШИРИНЫ В TITLE - не убивать!!!
    */

    title.textContent =
      (hall.name || hallId)
      + ' · '
      + boxWidth
      + ' px'



    /*      CANVAS      */

    const canvas =
      document.createElement('div')

    canvas.className =
      'hall-canvas-all'

    canvas.dataset.hallId =
      hallId



    /*     СОБИРАЕМ     */

    scaleBox.appendChild(title)
    scaleBox.appendChild(canvas)

    allHalls.appendChild(scaleBox)



    /*       EVENTS       */

    scaleBox.addEventListener(
      'click',
      () => {
        setCurrentHall(hallId)
      }
    )

    scaleBox.addEventListener(
      'dblclick',
      event => {

        event.stopPropagation()

        setCurrentHall(hallId)

        setHallViewMode('tabs')

      }
    )


    /* вставляем столы внутрь зала mosaic */

tablesList
  .filter(table =>
    table.hall_id === hallId
  )
  .forEach(table => {
    renderTableToCanvas(
      table,
      canvas,
               boxWidth / 1460
    )
  })

})


  setStatus(
    'Mosaic rendered: '
    + hallsList.length
    + ' | boxWidth: '
    + boxWidth
  )

}

/*
========================================
RENDER CONSOLE
логи действий
========================================
*/

function renderConsole() {
  hallConsole.innerHTML =
    ''

  const table =
    document.createElement('table')

  table.className =
    'console-table'

  table.innerHTML =
    `
    <thead>
      <tr>
        <th>Time</th>
        <th>Action</th>
        <th>User</th>
        <th>Hall</th>
        <th>Table</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody></tbody>
    `

  const tbody =
    table.querySelector('tbody')

  consoleLogs.forEach(log => {
    const tr =
      document.createElement('tr')

    tr.innerHTML =
      `
      <td>${log.time}</td>
      <td>${log.action}</td>
      <td>${log.user}</td>
      <td>${log.hall}</td>
      <td>${log.table}</td>

/*
========================================
RENDER TABLE TO CANVAS
левая кнопка = orders.html
правая кнопка = действия
========================================
*/

function renderTableToCanvas(item, targetCanvas, mosaicScale = 1) {
  const el =
    document.createElement('div')

  const shape =
    item.shape || 'square'

const layoutScale =
  targetCanvas === hallCanvas
    ? 0.7
    : 0.2

const hallTables =
  tablesList.filter(table =>
    table.hall_id === item.hall_id
  )

const minY =
  Math.min(
    ...hallTables.map(table =>
      Number(table.y || 0) * layoutScale
    )
  )

const x =
  Number(item.x || 0) * layoutScale

const topPadding =
  20

const y =
  Number(item.y || 0) * layoutScale - minY + topPadding
  
      
  const tableStatus =
    item.table_status || 'free'

  let shapeClass =
    'table-square'

  if (shape === 'round')
    shapeClass =
      'table-round'

  if (shape === 'rect')
    shapeClass =
      'table-rect'

  el.className =
    'table-item '
    + shapeClass
    + ' table-'
    + tableStatus

  el.dataset.tableId =
    item.table_id

  tableEl.style.left =
  (Number(item.x) * mosaicScale) + 'px'

  tableEl.style.top =
  (Number(item.y) * mosaicScale) + 'px'

  
      tableEl.style.transform =
      'scale(' + mosaicScale + ')'
      tableEl.style.transformOrigin =
      'top left'   

 
/* Table Title */
  const label =
  document.createElement('div')

label.className =
  'table-label'

label.innerHTML =
  (item.name || 'Table')
  + '<br>'
  + getTableSeats(item)
  + 'seats'

el.appendChild(label)

 /* if (targetCanvas === hallCanvas) {
    renderChairs(
       el,
      item,
      el.offsetWidth,
      el.offsetHeight
    )
  }*/

  el.addEventListener(
    'click',
    event => {
      event.stopPropagation()

      window.location.href =
        'orders.html'
        + '?project_id='
        + item.project_id
        + '&hall_id='
        + item.hall_id
        + '&table_id='
        + item.table_id
    }
  )

  el.addEventListener(
    'contextmenu',
    event => {
      event.preventDefault()
      event.stopPropagation()

      openTableDialog(item)
    }
  )

  targetCanvas.appendChild(el)
}

/*
========================================
UPDATE TABLE MEMORY
========================================
*/

function updateTableInMemory(updatedTable) {
  tablesList =
    tablesList.map(table => {
      if (table.table_id === updatedTable.table_id)
        return updatedTable

      return table
    })
}

/*
========================================
UPDATE ORDER MEMORY
========================================
*/

function addOrderInMemory(order) {
  if (!order)
    return

  ordersList =
    [
      order,
      ...ordersList
    ]
}

function updateOrderInMemory(updatedOrder) {
  if (!updatedOrder)
    return

  ordersList =
    ordersList.map(order => {
      if (
        order.order_id === updatedOrder.order_id
        ||
        order.id === updatedOrder.id
      ) {
        return updatedOrder
      }

      return order
    })
}

/*
========================================
UPDATE TABLE SCREEN
========================================
*/

function updateTable(updatedTable) {
  updateTableInMemory(updatedTable)

  if (hallViewMode === 'all') {
    renderAllHalls()
    return
  }

  if (hallViewMode === 'tabs') {
    renderCurrentHall()
    return
  }

  if (hallViewMode === 'console') {
    renderConsole()
    return
  }

  renderHallGrid()
}

          .from('orders')
          .insert({

            message: orderError.message
          }
        )

        addOrderInMemory(orderData[0])

        }
      )

      await setTableStatus(
        activeTable.table_id,
        'occupied'
      )

    catch (err) {

      addConsoleLog(

        }
      )

      setStatus(

      )
    }
  }
)

btnCloseOrder.addEventListener(
  'click',
  async () => {
    try {
      if (!activeTable)
        return

      setStatus('Finding open order...')

      const { data: openOrder, error: findError } =
        await supabase
          .from('orders')
          .select('*')
          .eq('table_id', activeTable.table_id)
          .eq('order_status', 'open')
          .order('opened_at', { ascending: false })
          .limit(1)
          .maybeSingle()

      console.log('FIND ORDER DATA:', openOrder)
      console.log('FIND ORDER ERROR:', findError)

      if (findError || !openOrder) {
        addConsoleLog(
          'errors',
          {
            table: activeTable.name || activeTable.table_id,
            message: 'Open order not found'
          }
        )

        alert('Открытый заказ не найден')
        return
      }

      const { data: closedOrder, error: closeError } =
        await supabase
          .from('orders')
          .update({
            order_status: 'closed',
            closed_at: new Date().toISOString()
          })
          .eq('order_id', openOrder.order_id)
          .select()
          .single()

      console.log('CLOSE ORDER DATA:', closedOrder)
      console.log('CLOSE ORDER ERROR:', closeError)

      if (closeError) {
        addConsoleLog(
          'errors',
          {
            table: activeTable.name || activeTable.table_id,
            message: closeError.message
          }
        )

        alert('Не удалось закрыть заказ')
        return
      }

      updateOrderInMemory(closedOrder)

      addConsoleLog(
        'close order',
        {
          table: activeTable.name || activeTable.table_id
        }
      )

      await setTableStatus(
        activeTable.table_id,
        'free'
      )
    }
    catch (err) {
      console.error(err)

      addConsoleLog(
        'errors',
        {
          message: err.message
        }
      )

      setStatus(
        'Close order error: ' + err.message
      )
    }
  }
)

async function updateTableSeats(table, seats) {
  const { data, error } =
    await supabase
      .from('tables')
      .update({ seats })
      .eq('table_id', table.table_id)
      .select()
      .single()

  if (error) {
    addConsoleLog(
      'errors',
      {
        table: table.name || table.table_id,
        message: error.message
      }
    )

    alert('Could not update chairs')

    setStatus(
      'Chair update error: ' + error.message
    )

    return
  }

  updateTable(data)

  activeTable =
    data

  openTableDialog(data)
}

async function setTableStatus(
  table_id,
  table_status
) {
  setStatus(
    'Updating table status: ' + table_status
  )

  const { data, error } =
    await supabase
      .from('tables')
      .update({
        table_status
      })
      .eq('table_id', table_id)
      .select()
      .single()

  console.log('TABLE STATUS DATA:', data)
  console.log('TABLE STATUS ERROR:', error)

  if (error) {
    addConsoleLog(
      'errors',
      {
        message: error.message
      }
    )

    alert('Не удалось изменить статус стола')
    return
  }

  if (data) {
    updateTable(data)
  }

  dialog.classList.add('hidden')

  activeTable =
    null

  setStatus(
    'Table status updated: ' + table_status
  )
}

========================================

function subscribeTablesRealtime() {
  setStatus('Realtime subscribe tables...')

  supabase
    .channel('tables-' + currentProjectId)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'tables',
        filter: 'project_id=eq.' + currentProjectId
      },
      payload => {
        console.log('REALTIME TABLE:', payload)

        if (!payload.new)
          return

        addConsoleLog(
          'realtime updates',
          {
            table: payload.new.name || payload.new.table_id,
            message:
              'table_status: '
              + (payload.new.table_status || 'free')
          }
        )

        updateTable(
          payload.new
        )
      }
    )
    .subscribe(status => {
      console.log('REALTIME STATUS:', status)
    })
}
