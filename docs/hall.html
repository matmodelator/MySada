
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>План зала</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
  
<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
}

#hall {
  position: relative;
  width: 100%;
  height: 100vh;
  background: #f8fafc;
  overflow: hidden;
}

.table {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: grab;
  user-select: none;
  transition: background 0.2s;
}

.table.free {
  background: #2ecc71;
}

.table.occupied {
  background: #e74c3c;
}

.table.reserved {
  background: #f1c40f;
}

.table.cleaning {
  background: #95a5a6;
}

</style>
</head>

<body>

<div id="hall"></div>

<script type="module">



import { supabase }
from "./scripts/config.js"

// теперь supabase уже готов


      

const hall =
  document.getElementById("hall")

let dragging = null
let offsetX = 0
let offsetY = 0

// ============================
// загрузить столы
// ============================

async function loadTables() {

  const { data, error } =
    await supabase
      .from("tables")
      .select("*")
      .order("name")

  if (error) {
    console.error(error)
    return
  }

  hall.innerHTML = ""

  data.forEach(createTable)

}

// ============================
// создать стол
// ============================

function createTable(row) {

  const el =
    document.createElement("div")

  el.className =
    "table " + row.table_status

  el.dataset.tableId =
    row.table_id

  el.textContent =
    row.name

  el.style.left =
    row.x + "px"

  el.style.top =
    row.y + "px"

  el.style.width =
    row.width + "px"

  el.style.height =
    row.height + "px"

  hall.appendChild(el)

  // drag

  el.addEventListener(
    "mousedown",
    e => {

      dragging = el

      offsetX =
        e.clientX -
        el.offsetLeft

      offsetY =
        e.clientY -
        el.offsetTop

    }
  )

}

// ============================
// движение
// ============================

document.addEventListener(
  "mousemove",
  e => {

    if (!dragging)
      return

    dragging.style.left =
      e.clientX -
      offsetX + "px"

    dragging.style.top =
      e.clientY -
      offsetY + "px"

  }
)

// ============================
// отпускание
// ============================

document.addEventListener(
  "mouseup",
  async () => {

    if (!dragging)
      return

    const table_id =
      dragging.dataset.tableId

    const x =
      parseInt(
        dragging.style.left
      )

    const y =
      parseInt(
        dragging.style.top
      )

    await supabase
      .from("tables")
      .update({
        x,
        y
      })
      .eq(
        "table_id",
        table_id
      )

    dragging = null

  }
)

// ============================
// realtime
// ============================

supabase
  .channel("tables-realtime")

  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "tables"
    },

    payload => {

      console.log(
        "Realtime:",
        payload
      )

      const row =
        payload.new ||
        payload.old

      if (!row)
        return

      updateTable(row)

    }

  )

  .subscribe()

// ============================
// обновить стол
// ============================

function updateTable(row) {

  let el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (!el) {

    createTable(row)
    return

  }

  if (row.table_status) {

    el.classList.remove(
      "free",
      "occupied",
      "reserved",
      "cleaning"
    )

    el.classList.add(
      row.table_status
    )

  }

  if (typeof row.x === "number")
    el.style.left =
      row.x + "px"

  if (typeof row.y === "number")
    el.style.top =
      row.y + "px"

  if (typeof row.width === "number")
    el.style.width =
      row.width + "px"

  if (typeof row.height === "number")
    el.style.height =
      row.height + "px"

}

// ============================

loadTables()

</script>



<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

   supabase & config| v1.0.1

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

  </body>
</html>
