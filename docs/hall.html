<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Hall</title>

<link rel="stylesheet"
      href="styles/hall.css" />

<link rel="stylesheet"
      href="styles/console.css" />

</head>

<body>

<header class="top-bar">
  <div class="top-title">MySada Hall</div>

  <div class="top-buttons">
    <button id="backBtn" type="button">Back</button>
    <button id="reloadBtn" type="button">Reload</button>
  </div>
</header>

<section class="top-info">

  <div class="info-card">
    <div class="info-label">Project</div>
    <div id="projectName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">User</div>
    <div id="userName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">Select Hall</div>
    <select id="hallSelect">
      <option value="">loading...</option>
    </select>
  </div>

  <div class="info-card">
    <div class="info-label">Hall</div>
    <div id="hallName" class="info-value">loading...</div>

</section>

<div class="view-panel">

  <div class="view-buttons">

    <button id="viewTabsBtn" type="button">
      Tabs
    </button>

    <button id="viewGridBtn" type="button">

    </button>

    </button>

  </div>

</div>

<div id="status" class="status">
  Starting...
</div>

<div id="hallTabs" class="hall-tabs"></div>

<div id="tabsInfo" class="tabs-info hidden"></div>

<div id="hallGrid" class="hall-grid hidden"></div>

<main id="singleHallWrap" class="hall-wrap">

</main>

<div id="allHalls" class="all-halls hidden"></div>

<!--
========================================
ДИАЛОГ ДЕЙСТВИЙ СО СТОЛОМ
========================================
-->

<div id="tableDialog" class="table-dialog hidden">

  <div id="dialogTitle" class="dialog-title">

  </div>

    <button id="btnOpenOrder" type="button">
      Open order
    </button>

    <button id="btnCloseOrder" type="button">
      Close order
    </button>

    <button id="btnReserveTable" type="button">
      Reserve table
    </button>

    <button id="btnCleanTable" type="button">
      Cleaning
    </button>

      <button id="btnAddChair" type="button">
        Add chair
      </button>

      </button>

    </div>

</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectNameBox =
  document.getElementById('projectName')

const hallNameBox =
  document.getElementById('hallName')

const userNameBox =
  document.getElementById('userName')

const hallSelect =
  document.getElementById('hallSelect')

const statusBox =
  document.getElementById('status')

const hallTabs =
  document.getElementById('hallTabs')

const tabsInfo =
  document.getElementById('tabsInfo')

const hallGrid =
  document.getElementById('hallGrid')

const singleHallWrap =
  document.getElementById('singleHallWrap')

const hallCanvas =
  document.getElementById('hallCanvas')

const allHalls =
  document.getElementById('allHalls')

let buildDown =
  document.getElementById('build-down')

const viewTabsBtn =
  document.getElementById('viewTabsBtn')

const viewGridBtn =
  document.getElementById('viewGridBtn')

const viewAllBtn =
  document.getElementById('viewAllBtn')

const dialog =
  document.getElementById('tableDialog')

const dialogTitle =
  document.getElementById('dialogTitle')

const dialogInfo =
  document.getElementById('dialogInfo')

const btnOpenOrder =
  document.getElementById('btnOpenOrder')

const btnCloseOrder =
  document.getElementById('btnCloseOrder')

const btnReserveTable =
  document.getElementById('btnReserveTable')

const btnCleanTable =
  document.getElementById('btnCleanTable')

const btnAddChair =
  document.getElementById('btnAddChair')

const btnRemoveChair =
  document.getElementById('btnRemoveChair')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let currentProjectId =
  null

let currentProjectName =
  ''

let currentHallId =
  null

let currentHallName =
  ''

let activeTable =
  null

let hallViewMode =
  sessionStorage.getItem('mysada_hall_view_mode') || 'tabs'

let hallsList =
  []

let tablesList =
  []

let ordersList =
  []

/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  if (!buildDown) {
    buildDown =
      document.getElementById('build-down')
  }

  if (!buildDown)
    return

  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

function setStatus(text) {
  statusBox.textContent =
    text

  console.log('[HALL]', text)

  updateBuildLine(text)
}

/*
========================================
LOAD USER
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser = {
  user_id: data.user.id,
  email: data.user.email,
  name: data.user.email,
  role: null
}

  /*
========================================
LOAD USER ROLE FROM public.users
========================================
*/

const { data: appUser, error: appUserError } =
  await supabase
    .from('users')
    .select('role')
    .eq('user_id', currentUser.user_id)
    .maybeSingle()

if (appUserError) {
  console.error(appUserError)
}

if (appUser && appUser.role) {

  currentUser.role =
    appUser.role

} else {

  /*
  fallback если пользователя нет
  */

  currentUser.role =
    'developer'

}

userNameBox.textContent =
  currentUser.name
  + ' / '
  + currentUser.role    

  userNameBox.textContent =
    currentUser.name + ' / ' + currentUser.role

  sessionStorage.setItem(
    'mysada_user',
    JSON.stringify(currentUser)
  )

  return currentUser
}

/*
========================================
LOAD PROJECT
========================================
*/

function loadProjectFromSession() {
  setStatus('Loading project from session...')

  const rawProject =
    sessionStorage.getItem('mysada_project')

  if (!rawProject)
    throw new Error('Project not found in sessionStorage')

  const savedProject =
    JSON.parse(rawProject)

  currentProjectId =
    savedProject.project_id

  currentProjectName =
    savedProject.project_name || savedProject.name || 'Project'

  if (!currentProjectId)
    throw new Error('Project ID is empty in sessionStorage')

  projectNameBox.textContent =
    currentProjectName + ' / ' + currentProjectId

  return currentProjectId
}

/*
========================================
LOAD PROJECT DATA
залы / столы / заказы
========================================
*/

async function loadProjectData() {
  setStatus('Loading halls and tables...')

  const { data: halls, error: hallsError } =
    await supabase
      .from('halls')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('name', { ascending: true })

  if (hallsError)
    throw hallsError

  hallsList =
    halls || []

  const { data: tables, error: tablesError } =
    await supabase
      .from('tables')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('name', { ascending: true })

  if (tablesError)
    throw tablesError

  tablesList =
    tables || []

  const { data: orders, error: ordersError } =
    await supabase
      .from('orders')
      .select('*')
      .eq('project_id', currentProjectId)

  if (ordersError)
    throw ordersError

  ordersList =
    orders || []

  setStatus(
    'Project data loaded: halls '
    + hallsList.length
    + ', tables '
    + tablesList.length
    + ', orders '
    + ordersList.length
  )
}

/*
========================================
LOAD HALL LIST
========================================
*/

function loadHallList() {
  setStatus('Rendering hall list...')

  hallSelect.innerHTML =
    ''

  if (!hallsList.length) {
    hallSelect.innerHTML =
      '<option value="">No halls</option>'

    hallNameBox.textContent =
      'No halls'

    setStatus('No halls found for project')

    return null
  }

  hallsList.forEach(hall => {
    const option =
      document.createElement('option')

    option.value =
      hall.hall_id || hall.id

    option.textContent =
      hall.name || option.value

    hallSelect.appendChild(option)
  })

  const params =
    new URLSearchParams(window.location.search)

  const hallIdFromUrl =
    params.get('hall_id')

  if (hallIdFromUrl) {
    hallSelect.value =
      hallIdFromUrl
  }

  if (!hallSelect.value) {
    hallSelect.selectedIndex =
      0
  }

  currentHallId =
    hallSelect.value

  currentHallName =
    hallSelect.options[hallSelect.selectedIndex].textContent

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  setStatus(
    'Hall list rendered: ' + hallsList.length
  )

  return currentHallId
}

/*
========================================
COUNT TABLES FOR HALL
========================================
*/

function countTablesForHall(hallId) {
  return tablesList.filter(
    table => table.hall_id === hallId
  ).length
}

/*
========================================
GET HALL NAME
========================================
*/

function getHallName(hallId) {
  const hall =
    hallsList.find(
      item => (item.hall_id || item.id) === hallId
    )

  if (!hall)
    return hallId

  return hall.name || hallId
}

/*
========================================
SEATS
стулья по умолчанию:
round = 2
square = 4
rect = 6
========================================
*/

function getDefaultSeats(shape) {
  if (shape === 'round')
    return 2

  if (shape === 'rect')
    return 6

  return 4
}

function getTableSeats(table) {
  return Number(
    table.seats
    || table.chair_count
    || getDefaultSeats(table.shape)
  )
}

/*
========================================
TABS INFO
========================================
*/

function renderTabsInfo() {
  if (!currentHallId)
    return

  const hallTables =
    tablesList.filter(
      table => table.hall_id === currentHallId
    )

  const free =
    hallTables.filter(
      table => (table.table_status || 'free') === 'free'
    ).length

  const occupied =
    hallTables.filter(
      table => table.table_status === 'occupied'
    ).length

  const reserved =
    hallTables.filter(
      table => table.table_status === 'reserved'
    ).length

  const cleaning =
    hallTables.filter(
      table => table.table_status === 'cleaning'
    ).length

  const chairs =
    hallTables.reduce(
      (sum, table) => sum + getTableSeats(table),
      0
    )

  const openOrders =
    ordersList.filter(order =>
      order.hall_id === currentHallId
      &&
      (order.order_status || order.status) === 'open'
    )

  const clients =
    openOrders.reduce(
      (sum, order) => sum + Number(order.guest_count || 0),
      0
    )

  const waiters =
    new Set(
      openOrders
        .map(order => order.shift_id)
        .filter(Boolean)
    ).size

  tabsInfo.innerHTML =
    'Tables: ' + hallTables.length
    + ' | Free: ' + free
    + ' | Occupied: ' + occupied
    + ' | Reserved: ' + reserved
    + ' | Cleaning: ' + cleaning
    + ' | Chairs: ' + chairs
    + ' | Clients: ' + clients
    + ' | Waiters in shift: ' + waiters
}

/*
========================================
SET CURRENT HALL
========================================
*/

function setCurrentHall(hallId) {
  currentHallId =
    hallId

  currentHallName =
    getHallName(hallId)

  hallSelect.value =
    hallId

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  sessionStorage.setItem(
    'mysada_current_hall_id',
    currentHallId
  )

  renderHallTabs()
  renderHallGrid()

  if (hallViewMode !== 'all') {
    renderCurrentHall()
  }

  if (hallViewMode === 'all') {
    renderAllHalls()
  }

  setStatus(
    'Selected hall: ' + currentHallName
  )
}

/*
========================================
RENDER HALL TABS
========================================
*/

function renderHallTabs() {
  hallTabs.innerHTML =
    ''

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const button =
      document.createElement('button')

    button.type =
      'button'

    button.className =
      'hall-tab'

    if (hallId === currentHallId) {
      button.classList.add('active')
    }

    button.textContent =
      (hall.name || hallId)
      + ' · '
      + countTablesForHall(hallId)

    button.addEventListener('click', () => {
      setCurrentHall(hallId)
    })

    hallTabs.appendChild(button)
  })
}

/*
========================================
INFO ОКНО ДЛЯ ЗАЛА
правый клик по белому фону в Grid
========================================
*/

function showHallInfoDialog(hallId) {

  const hallTables =
    tablesList.filter(
      table => table.hall_id === hallId
    )

  const free =
    hallTables.filter(
      table => (table.table_status || 'free') === 'free'
    ).length

  const occupied =
    hallTables.filter(
      table => table.table_status === 'occupied'
    ).length

  const reserved =
    hallTables.filter(
      table => table.table_status === 'reserved'
    ).length

  const cleaning =
    hallTables.filter(
      table => table.table_status === 'cleaning'
    ).length

  const chairs =
    hallTables.reduce(
      (sum, table) => sum + getTableSeats(table),
      0
    )

  const openOrders =
    ordersList.filter(order =>
      order.hall_id === hallId
      &&
      (order.order_status || order.status) === 'open'
    )

  const clients =
    openOrders.reduce(
      (sum, order) => sum + Number(order.guest_count || 0),
      0
    )

  const waiters =
    new Set(
      openOrders
        .map(order => order.shift_id)
        .filter(Boolean)
    ).size

  dialogTitle.textContent =
    getHallName(hallId)

      dialog.classList.add('hall-info-mode')
      
  dialogInfo.innerHTML =
    'Tables: ' + hallTables.length
    + '<br>Free: ' + free
    + '<br>Occupied: ' + occupied
    + '<br>Reserved: ' + reserved
    + '<br>Cleaning: ' + cleaning
    + '<br>Chairs: ' + chairs
    + '<br>Clients: ' + clients
    + '<br>Waiters in shift: ' + waiters

  activeTable = null

  dialog.classList.remove('hidden')

}
      
/*
========================================
RENDER HALL GRID
левая кнопка = orders.html
правая кнопка = старый диалог
========================================
*/

function renderHallGrid() {
  hallGrid.innerHTML =
    ''

  if (!hallsList.length) {
    setStatus('No halls to render')
    return
  }

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const card =
      document.createElement('div')

    card.className =
      'hall-card'

    if (hallId === currentHallId) {
      card.classList.add('active')
    }

    const title =
      document.createElement('div')

    title.className =
      'hall-card-title'

    title.textContent =
      hall.name || hallId

    card.appendChild(title)

    const info =
      document.createElement('div')

    info.className =
      'hall-card-info'

    info.textContent =
      'tables: '
      + countTablesForHall(hallId)

    card.appendChild(info)

    const tree =
      document.createElement('div')

    tree.className =
      'table-tree'

    card.appendChild(tree)

    tablesList
      .filter(
        table =>
          table.hall_id === hallId
      )
      .forEach(table => {
        const row =
          document.createElement('button')

        const status =
          table.table_status || 'free'

        row.type =
          'button'

        row.className =
          'table-tree-row table-'
          + status

        row.textContent =
          (table.name || table.table_id)
          + ' · '
          + status
          + ' · chairs '
          + getTableSeats(table)

        row.addEventListener(
          'click',
          event => {
            event.stopPropagation()

            window.location.href =
              'orders.html'
              + '?project_id='
              + table.project_id
              + '&hall_id='
              + table.hall_id
              + '&table_id='
              + table.table_id
          }
        )

        row.addEventListener(
          'contextmenu',
          event => {
            event.preventDefault()
            event.stopPropagation()

            setCurrentHall(hallId)

            openTableDialog(table)
          }
        )

        tree.appendChild(row)
      })

   card.addEventListener(
  'click',
  event => {

    if (
      event.target.closest('.table-tree-row')
    )
      return

    setCurrentHall(
      hallId
    )

    setHallViewMode(
      'tabs'
    )

  }
)

card.addEventListener(
  'contextmenu',
  event => {

    if (
      event.target.closest('.table-tree-row')
    )
      return

    event.preventDefault()
    event.stopPropagation()

    setCurrentHall(
      hallId
    )

    showHallInfoDialog(
      hallId
    )

  }
)
        
    hallGrid.appendChild(card)
  })
}

/*
========================================
SET HALL VIEW MODE
tabs | grid | all
========================================
*/

function setHallViewMode(mode) {
  hallViewMode =
    mode

  sessionStorage.setItem(
    'mysada_hall_view_mode',
    mode
  )

  viewTabsBtn.classList.toggle(
    'active',
    mode === 'tabs'
  )

  viewGridBtn.classList.toggle(
    'active',
    mode === 'grid'
  )

  viewAllBtn.classList.toggle(
    'active',
    mode === 'all'
  )

  hallTabs.classList.toggle(
    'hidden',
    mode !== 'tabs'
  )

  tabsInfo.classList.toggle(
    'hidden',
    mode !== 'tabs'
  )

  hallGrid.classList.toggle(
    'hidden',
    mode !== 'grid'
  )

  singleHallWrap.classList.toggle(
    'hidden',
    mode === 'all' || mode === 'grid'
  )

  allHalls.classList.toggle(
    'hidden',
    mode !== 'all'
  )

  dialog.classList.add('hidden')

  activeTable =
    null

  renderHallTabs()
  renderHallGrid()

  if (mode === 'all') {
    renderAllHalls()
  }

  if (mode === 'tabs') {
    renderCurrentHall()
    renderTabsInfo()
  }

  setStatus(
    'View mode: ' + mode
  )
}

/*
========================================
LOAD TABLES
========================================
*/

function loadTables() {
  renderCurrentHall()
}

/*
========================================
RENDER CURRENT HALL
Tabs mode
========================================
*/

function renderCurrentHall() {
  hallCanvas.innerHTML =
    ''

  activeTable =
    null

  dialog.classList.add('hidden')

  if (!currentHallId) {
    setStatus('No hall selected')
    return
  }

  const tablesForHall =
    tablesList.filter(
      table => table.hall_id === currentHallId
    )

  if (!tablesForHall.length) {
    renderTabsInfo()

    setStatus(
      'No tables found for hall: ' + currentHallName
    )

    return
  }

  tablesForHall.forEach(table => {
    renderTableToCanvas(
      table,
      hallCanvas
    )
  })

  renderTabsInfo()

  setStatus(
    'Tables rendered: '
    + tablesForHall.length
    + ' | '
    + currentHallName
  )
}

/*
========================================
RENDER MOSAIC
двойной клик по залу = перейти в Tabs этого зала
========================================
*/

function renderAllHalls() {
  allHalls.innerHTML =
    ''

  activeTable =
    null

  dialog.classList.add('hidden')

  if (!hallsList.length) {
    setStatus('No halls to render')
    return
  }

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const block =
      document.createElement('section')

    block.className =
      'hall-block'

    if (hallId === currentHallId) {
      block.classList.add('active')
    }

    const title =
      document.createElement('div')

    title.className =
      'hall-block-title'

    title.textContent =
      (hall.name || hallId)
      + ' · tables: '
      + countTablesForHall(hallId)

    const scaleBox =
      document.createElement('div')

    scaleBox.className =
      'hall-scale-box'

    const canvas =
      document.createElement('div')

    canvas.className =
      'hall-canvas-all'

    canvas.dataset.hallId =
      hallId

    scaleBox.appendChild(canvas)

    block.appendChild(title)
    block.appendChild(scaleBox)

    allHalls.appendChild(block)

    block.addEventListener(
      'click',
      () => {
        setCurrentHall(hallId)
      }
    )

    block.addEventListener(
      'dblclick',
      event => {
        event.stopPropagation()

        setCurrentHall(hallId)

        setHallViewMode('tabs')
      }
    )

    tablesList
      .filter(
        table =>
          table.hall_id === hallId
      )
      .forEach(table => {
        renderTableToCanvas(
          table,
          canvas
        )
      })
  })

  setStatus(
    'Mosaic rendered: ' + hallsList.length
  )
}

/*
========================================
RENDER TABLE
========================================
*/

function renderTable(item) {
  renderTableToCanvas(
    item,
    hallCanvas
  )
}

/*
========================================
RENDER CHAIRS
только Tabs
========================================
*/

function renderChairs(parent, table, width, height) {
  const seats =
    getTableSeats(table)

  const shape =
    table.shape || 'square'

  let positions =
    []

  if (shape === 'round') {
    positions = [
      { x: width / 2, y: -10 },
      { x: width / 2, y: height + 10 }
    ]
  }
  else if (shape === 'rect') {
    positions = [
      { x: width * 0.33, y: -10 },
      { x: width * 0.66, y: -10 },
      { x: width * 0.33, y: height + 10 },
      { x: width * 0.66, y: height + 10 },
      { x: -10, y: height / 2 },
      { x: width + 10, y: height / 2 }
    ]
  }
  else {
    positions = [
      { x: width / 2, y: -10 },
      { x: width / 2, y: height + 10 },
      { x: -10, y: height / 2 },
      { x: width + 10, y: height / 2 }
    ]
  }

  for (let i = 0; i < seats; i++) {
    const chair =
      document.createElement('div')

    const pos =
      positions[i % positions.length]

    chair.className =
      'chair-dot'

    chair.style.left =
      pos.x + 'px'

    chair.style.top =
      pos.y + 'px'

    parent.appendChild(chair)
  }
}

/*
========================================
RENDER TABLE TO CANVAS
левая кнопка = orders.html
правая кнопка = старый диалог
========================================
*/

function renderTableToCanvas(item, targetCanvas) {
  const el =
    document.createElement('div')

  const shape =
    item.shape || 'square'

  const x =
    Number(item.x || 0)

  const y =
    Number(item.y || 0)

  const width =
    Number(item.width || 120)

  const height =
    Number(item.height || 120)

  const tableStatus =
    item.table_status || 'free'

  let shapeClass =
    'table-square'

  if (shape === 'round')
    shapeClass =
      'table-round'

  if (shape === 'rect')
    shapeClass =
      'table-rect'

  el.className =
    'table-item '
    + shapeClass
    + ' table-'
    + tableStatus

  el.dataset.tableId =
    item.table_id

  el.style.left =
    x + 'px'

  el.style.top =
    y + 'px'

  el.style.width =
    width + 'px'

  el.style.height =
    height + 'px'

  const label =
    document.createElement('div')

  label.className =
    'table-label'

  label.textContent =
    item.name || 'Table'

  el.appendChild(label)

  if (targetCanvas === hallCanvas) {
    renderChairs(
      el,
      item,
      width,
      height
    )
  }

  el.addEventListener(
    'click',
    event => {
      event.stopPropagation()

      window.location.href =
        'orders.html'
        + '?project_id='
        + item.project_id
        + '&hall_id='
        + item.hall_id
        + '&table_id='
        + item.table_id
    }
  )

  el.addEventListener(
    'contextmenu',
    event => {
      event.preventDefault()
      event.stopPropagation()

      openTableDialog(item)
    }
  )

  targetCanvas.appendChild(el)
}

/*
========================================
ОТКРЫТЬ ДИАЛОГ СТОЛА
========================================
*/

function openTableDialog(table) {
  activeTable =
    table

  dialogTitle.textContent =
    table.name || 'Table'

  dialogInfo.textContent =
    'hall: '
    + getHallName(table.hall_id)
    + ' | status: '
    + (table.table_status || 'free')
    + ' | chairs: '
    + getTableSeats(table)
    + ' | table_id: '
    + table.table_id

  dialog.classList.remove('hidden')

      dialog.classList.remove('hall-info-mode')

  setStatus(
    'Selected table: ' + (table.name || table.table_id)
  )
}

/*
========================================
UPDATE TABLE MEMORY
========================================
*/

function updateTableInMemory(updatedTable) {
  tablesList =
    tablesList.map(table => {
      if (table.table_id === updatedTable.table_id)
        return updatedTable

      return table
    })
}

/*
========================================
UPDATE ORDER MEMORY
========================================
*/

function addOrderInMemory(order) {
  if (!order)
    return

  ordersList =
    [
      order,
      ...ordersList
    ]
}

function updateOrderInMemory(updatedOrder) {
  if (!updatedOrder)
    return

  ordersList =
    ordersList.map(order => {
      if (
        order.order_id === updatedOrder.order_id
        ||
        order.id === updatedOrder.id
      ) {
        return updatedOrder
      }

      return order
    })
}

/*
========================================
UPDATE TABLE SCREEN
========================================
*/

function updateTable(updatedTable) {
  updateTableInMemory(updatedTable)

  if (hallViewMode === 'all') {
    renderAllHalls()
    return
  }

  if (hallViewMode === 'tabs') {
    renderCurrentHall()
    return
  }

  renderHallGrid()
}

/*
========================================
OPEN ORDER
========================================
*/

btnOpenOrder.addEventListener(
  'click',
  async () => {
    try {
      if (!activeTable)
        return

      setStatus('Opening order...')

      const { data: orderData, error: orderError } =
        await supabase
          .from('orders')
          .insert({
            project_id: activeTable.project_id,
            hall_id: activeTable.hall_id,
            table_id: activeTable.table_id,
            guest_count: 2,
            shift_id: activeTable.current_shift_id
          })
          .select()

      console.log('OPEN ORDER DATA:', orderData)
      console.log('OPEN ORDER ERROR:', orderError)

      if (orderError) {
        setStatus(
          'Open order error: ' + orderError.message
        )

        alert('Не удалось открыть заказ')
        return
      }

      if (orderData && orderData[0]) {
        addOrderInMemory(orderData[0])
      }

      await setTableStatus(
        activeTable.table_id,
        'occupied'
      )
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Open order error: ' + err.message
      )
    }
  }
)

/*
========================================
CLOSE ORDER
========================================
*/

btnCloseOrder.addEventListener(
  'click',
  async () => {
    try {
      if (!activeTable)
        return

      setStatus('Finding open order...')

      const { data: openOrder, error: findError } =
        await supabase
          .from('orders')
          .select('*')
          .eq('table_id', activeTable.table_id)
          .eq('order_status', 'open')
          .order('opened_at', { ascending: false })
          .limit(1)
          .maybeSingle()

      console.log('FIND ORDER DATA:', openOrder)
      console.log('FIND ORDER ERROR:', findError)

      if (findError || !openOrder) {
        setStatus('Open order not found')

        alert('Открытый заказ не найден')
        return
      }

      const { data: closedOrder, error: closeError } =
        await supabase
          .from('orders')
          .update({
            order_status: 'closed',
            closed_at: new Date().toISOString()
          })
          .eq('order_id', openOrder.order_id)
          .select()
          .single()

      console.log('CLOSE ORDER DATA:', closedOrder)
      console.log('CLOSE ORDER ERROR:', closeError)

      if (closeError) {
        setStatus(
          'Close order error: ' + closeError.message
        )

        alert('Не удалось закрыть заказ')
        return
      }

      updateOrderInMemory(closedOrder)

      await setTableStatus(
        activeTable.table_id,
        'free'
      )
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Close order error: ' + err.message
      )
    }
  }
)

/*
========================================
RESERVE TABLE
========================================
*/

btnReserveTable.addEventListener(

/*
========================================
ADD / REMOVE CHAIR
========================================
*/

btnAddChair.addEventListener(
  'click',
  async () => {
    if (!activeTable)
      return

    await updateTableSeats(
      activeTable,
      getTableSeats(activeTable) + 1
    )
  }
)

btnRemoveChair.addEventListener(
  'click',
  async () => {
    if (!activeTable)
      return

    await updateTableSeats(
      activeTable,
      Math.max(
        0,
        getTableSeats(activeTable) - 1
      )
    )
  }
)

async function updateTableSeats(table, seats) {
  const { data, error } =
    await supabase
      .from('tables')
      .update({ seats })
      .eq('table_id', table.table_id)
      .select()
      .single()

  if (error) {
    alert('Could not update chairs')

    setStatus(
      'Chair update error: ' + error.message
    )

    return
  }

  updateTable(data)

  activeTable =
    data

  openTableDialog(data)
}

/*
========================================
SET TABLE STATUS
========================================
*/

async function setTableStatus(
  table_id,
  table_status
) {
  setStatus(
    'Updating table status: ' + table_status
  )

  const { data, error } =
    await supabase
      .from('tables')
      .update({
        table_status
      })
      .eq('table_id', table_id)
      .select()
      .single()

  console.log('TABLE STATUS DATA:', data)
  console.log('TABLE STATUS ERROR:', error)

  if (error) {
    setStatus(
      'Table status error: ' + error.message
    )

    alert('Не удалось изменить статус стола')
    return
  }

  if (data) {
    updateTable(data)
  }

  dialog.classList.add('hidden')

  activeTable =
    null

  setStatus(
    'Table status updated: ' + table_status
  )
}

/*
========================================
DIALOG CLICK
========================================
*/

dialog.addEventListener(
  'click',
  event => {
    event.stopPropagation()
  }
)

/*
========================================
CLOSE DIALOG BY OUTSIDE CLICK
========================================
*/

document.addEventListener(
  'click',
  event => {
    if (
      dialog.classList.contains('hidden')
    )
      return

    const clickedInsideDialog =
      dialog.contains(event.target)

    const clickedTable =
      event.target.closest('.table-item')
      ||
      event.target.closest('.table-tree-row')

    if (
      clickedInsideDialog
      ||
      clickedTable
    )
      return

    dialog.classList.add('hidden')

    activeTable =
      null

    setStatus('Table dialog closed')
  }
)

/*
========================================
REALTIME TABLES
========================================
*/

function subscribeTablesRealtime() {
  setStatus('Realtime subscribe tables...')

  supabase
    .channel('tables-' + currentProjectId)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'tables',
        filter: 'project_id=eq.' + currentProjectId
      },
      payload => {
        console.log('REALTIME TABLE:', payload)

        if (!payload.new)
          return

        updateTable(
          payload.new
        )
      }
    )
    .subscribe(status => {
      console.log('REALTIME STATUS:', status)
    })
}

/*
========================================
INIT
========================================
*/

async function init() {
  try {
    console.log('HALL INIT START')

    await loadUser()

    loadProjectFromSession()

    await loadProjectData()

    subscribeTablesRealtime()

    const hallId =
      loadHallList()

    const savedHallId =
      sessionStorage.getItem('mysada_current_hall_id')

    if (
      savedHallId
      &&
      hallsList.some(
        hall => (hall.hall_id || hall.id) === savedHallId
      )
    ) {
      setCurrentHall(savedHallId)
    }
    else if (hallId) {
      setCurrentHall(hallId)
    }

    setHallViewMode(
      hallViewMode
    )
  }
  catch (err) {
    console.error('HALL INIT ERROR:', err)

    setStatus(
      'Hall error: ' + err.message
    )
  }
}

init()

})();
