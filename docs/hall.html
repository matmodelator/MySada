<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>План зала</title>

<link rel="stylesheet"
      href="styles/console.css" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
}

#hall {
  position: relative;
  width: 100%;
  height: 100vh;
  background: #f8fafc;
  overflow: hidden;
}

/* ========================================
   СТОЛЫ
======================================== */

.table-wrap {
  position: absolute;
  width: 160px;
  height: 160px;
  cursor: pointer;
}

.table-core {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  box-sizing: border-box;
  text-align: center;
  z-index: 2;
}

/* Круглый стол — 2 места */
.table-wrap.round {
  width: 150px;
  height: 150px;
}

.table-wrap.round .table-core {
  width: 82px;
  height: 82px;
  border-radius: 50%;
}

/* Квадратный стол — 4 места */
.table-wrap.square {
  width: 170px;
  height: 170px;
}

.table-wrap.square .table-core {
  width: 88px;
  height: 88px;
  border-radius: 12px;
}

/* Прямоугольный стол — 6 мест */
.table-wrap.rect {
  width: 230px;
  height: 160px;
}

.table-wrap.rect .table-core {
  width: 140px;
  height: 82px;
  border-radius: 12px;
}

/* Статусы */
.table-wrap.free .table-core {
  background: #2ecc71;
}

.table-wrap.occupied .table-core {
  background: #e74c3c;
}

.table-wrap.reserved .table-core {
  background: #f1c40f;
}

.table-wrap.cleaning .table-core {
  background: #95a5a6;
}

/* ========================================
   СТУЛЬЯ
======================================== */

.chair {
  position: absolute;
  width: 26px;
  height: 26px;
  background: #374151;
  border-radius: 50%;
  z-index: 1;
}

/* 2 стула */
.seats-2 .chair-1 {
  left: 50%;
  top: 4px;
  transform: translateX(-50%);
}

.seats-2 .chair-2 {
  left: 50%;
  bottom: 4px;
  transform: translateX(-50%);
}

/* 4 стула */
.seats-4 .chair-1 {
  left: 50%;
  top: 2px;
  transform: translateX(-50%);
}

.seats-4 .chair-2 {
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
}

.seats-4 .chair-3 {
  left: 50%;
  bottom: 2px;
  transform: translateX(-50%);
}

.seats-4 .chair-4 {
  left: 2px;
  top: 50%;
  transform: translateY(-50%);
}

/* 6 стульев */
.seats-6 .chair-1 {
  left: 70px;
  top: 0;
}

.seats-6 .chair-2 {
  right: 70px;
  top: 0;
}

.seats-6 .chair-3 {
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
}

.seats-6 .chair-4 {
  right: 70px;
  bottom: 0;
}

.seats-6 .chair-5 {
  left: 70px;
  bottom: 0;
}

.seats-6 .chair-6 {
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
}

/* ========================================
   ДИАЛОГ
======================================== */

.dialog {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.dialog.hidden {
  display: none;
}

.dialog-box {
  width: 380px;
  max-width: calc(100vw - 32px);
  background: white;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  color: #1f2937;
}

#dialog-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 12px;
}

#dialog-body {
  margin-bottom: 16px;
  line-height: 1.5;
  font-size: 14px;
}

.dialog-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.dialog-actions button {
  border: 0;
  border-radius: 8px;
  padding: 11px 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}

#btn-open-order {
  background: #2563eb;
  color: white;
}

#btn-close-order {
  background: #16a34a;
  color: white;
}

#btn-reserve-table {
  background: #facc15;
  color: #111827;
}

#btn-clean-table {
  background: #6b7280;
  color: white;
}
</style>
</head>

<body>

<div id="hall"></div>

<div id="table-dialog" class="dialog hidden">
  <div class="dialog-box">

    <div id="dialog-title">
      Стол
    </div>

    <div id="dialog-body"></div>

    <div class="dialog-actions">

      <button id="btn-open-order">
        Открыть заказ
      </button>

      <button id="btn-close-order">
        Закрыть заказ
      </button>

      <button id="btn-reserve-table">
        Зарезервировать стол
      </button>

      <button id="btn-clean-table">
        Уборка стола
      </button>

    </div>

  </div>
</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

const hall =
  document.getElementById("hall")

const dialog =
  document.getElementById("table-dialog")

const dialogTitle =
  document.getElementById("dialog-title")

const dialogBody =
  document.getElementById("dialog-body")

const btnOpenOrder =
  document.getElementById("btn-open-order")

const btnCloseOrder =
  document.getElementById("btn-close-order")

const btnReserveTable =
  document.getElementById("btn-reserve-table")

const btnCleanTable =
  document.getElementById("btn-clean-table")

let activeTable = null

/* ========================================
   ЗАГРУЗКА СТОЛОВ
======================================== */

async function loadTables() {

  const { data, error } =
    await supabase
      .from("tables")
      .select("*")
      .order("name")

  console.log("TABLES DATA:", data)
  console.log("TABLES ERROR:", error)

  if (error) {
    console.error(error)
    return
  }

  hall.innerHTML = ""

  data.forEach(createTable)
}

/* ========================================
   ОТРИСОВКА СТОЛА
======================================== */

function createTable(row) {

  const shape =
    getShape(row)

  const seats =
    getSeats(row)

  const wrap =
    document.createElement("div")

  wrap.className =
    "table-wrap " +
    shape + " " +
    (row.table_status || "free") + " " +
    "seats-" + seats

  wrap.dataset.tableId =
    row.table_id

  wrap.style.left =
    (row.x ?? 0) + "px"

  wrap.style.top =
    (row.y ?? 0) + "px"

  const core =
    document.createElement("div")

  core.className =
    "table-core"

  core.textContent =
    row.name || "Table"

  wrap.appendChild(core)

  for (let i = 1; i <= seats; i++) {
    const chair =
      document.createElement("div")

    chair.className =
      "chair chair-" + i

    wrap.appendChild(chair)
  }

  wrap.addEventListener(
    "click",
    () => {
      openDialog(row)
    }
  )

  hall.appendChild(wrap)
}

/* ========================================
   ФОРМА СТОЛА
======================================== */

function getShape(row) {

  if (row.shape === "round")
    return "round"

  if (row.shape === "rect")
    return "rect"

  if (row.seats === 2)
    return "round"

  if (row.seats === 6)
    return "rect"

  return "square"
}

/* ========================================
   КОЛИЧЕСТВО СТУЛЬЕВ
======================================== */

function getSeats(row) {

  if (row.seats === 2)
    return 2

  if (row.seats === 6)
    return 6

  return 4
}

/* ========================================
   ОБНОВИТЬ СТОЛ НА ЭКРАНЕ
======================================== */

function updateTable(row) {

  const oldEl =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (oldEl)
    oldEl.remove()

  createTable(row)

  if (
    activeTable &&
    activeTable.table_id === row.table_id
  ) {
    activeTable = row
    renderDialog(row)
  }
}

/* ========================================
   ОТКРЫТЬ ДИАЛОГ
======================================== */

function openDialog(row) {

  activeTable = row

  renderDialog(row)

  dialog.classList.remove("hidden")
}

/* ========================================
   ОТРИСОВАТЬ ДИАЛОГ
======================================== */

function renderDialog(row) {

  dialogTitle.textContent =
    row.name || "Стол"

  dialogBody.innerHTML =
    "Статус: " + (row.table_status || "free") + "<br>" +
    "Мест: " + (row.seats ?? 4) + "<br>" +
    "Форма: " + (getShape(row)) + "<br>" +
    "table_id: " + row.table_id
}

/* ========================================
   ЗАКРЫТЬ ДИАЛОГ ПО ФОНУ
======================================== */

dialog.addEventListener(
  "click",
  e => {
    if (e.target === dialog) {
      dialog.classList.add("hidden")
      activeTable = null
    }
  }
)

/* ========================================
   1. ОТКРЫТЬ ЗАКАЗ
   orders = open
   tables = occupied
======================================== */

btnOpenOrder.addEventListener(
  "click",
  async () => {

    if (!activeTable)
      return

    const { data: orderData, error: orderError } =
      await supabase
        .from("orders")
        .insert({
          project_id: activeTable.project_id,
          hall_id: activeTable.hall_id,
          table_id: activeTable.table_id,
          guest_count: 2,
          shift_id: activeTable.current_shift_id
        })
        .select()

    console.log("OPEN ORDER DATA:", orderData)
    console.log("OPEN ORDER ERROR:", orderError)

    if (orderError) {
      alert("Не удалось открыть заказ")
      return
    }

    await setTableStatus(
      activeTable.table_id,
      "occupied"
    )
  }
)

/* ========================================
   2. ЗАКРЫТЬ ЗАКАЗ
   orders = closed
   tables = free
======================================== */

btnCloseOrder.addEventListener(
  "click",
  async () => {

    if (!activeTable)
      return

    const { data: openOrder, error: findError } =
      await supabase
        .from("orders")
        .select("*")
        .eq("table_id", activeTable.table_id)
        .eq("order_status", "open")
        .order("opened_at", { ascending: false })
        .limit(1)
        .maybeSingle()

    console.log("FIND ORDER DATA:", openOrder)
    console.log("FIND ORDER ERROR:", findError)

    if (findError || !openOrder) {
      alert("Открытый заказ не найден")
      return
    }

    const { error: closeError } =
      await supabase
        .from("orders")
        .update({
          order_status: "closed",
          closed_at: new Date().toISOString()
        })
        .eq("order_id", openOrder.order_id)

    console.log("CLOSE ORDER ERROR:", closeError)

    if (closeError) {
      alert("Не удалось закрыть заказ")
      return
    }

    await setTableStatus(
      activeTable.table_id,
      "free"
    )
  }
)

/* ========================================
   3. ЗАРЕЗЕРВИРОВАТЬ СТОЛ
   tables = reserved
======================================== */

btnReserveTable.addEventListener(
  "click",
  async () => {

    if (!activeTable)
      return

    await setTableStatus(
      activeTable.table_id,
      "reserved"
    )
  }
)

/* ========================================
   4. УБОРКА СТОЛА
   tables = cleaning
======================================== */

btnCleanTable.addEventListener(
  "click",
  async () => {

    if (!activeTable)
      return

    await setTableStatus(
      activeTable.table_id,
      "cleaning"
    )
  }
)

/* ========================================
   ОБЩАЯ ФУНКЦИЯ СМЕНЫ СТАТУСА СТОЛА
======================================== */

async function setTableStatus(
  table_id,
  table_status
) {

  const { data, error } =
    await supabase
      .from("tables")
      .update({
        table_status
      })
      .eq("table_id", table_id)
      .select()
      .single()

  console.log("TABLE STATUS DATA:", data)
  console.log("TABLE STATUS ERROR:", error)

  if (error) {
    alert("Не удалось изменить статус стола")
    return
  }

  if (data) {
    updateTable(data)
  }

  dialog.classList.add("hidden")
  activeTable = null
}

/* ========================================
   REALTIME ДЛЯ ДРУГИХ ЭКРАНОВ
======================================== */

supabase
  .channel("tables-realtime")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "tables"
    },
    payload => {

      console.log("TABLES REALTIME:", payload)

      if (payload.eventType === "DELETE") {
        const el =
          document.querySelector(
            `[data-table-id="${payload.old.table_id}"]`
          )

        if (el)
          el.remove()

        return
      }

      if (payload.new) {
        updateTable(payload.new)
      }
    }
  )
  .subscribe(status => {
    console.log("TABLES REALTIME STATUS:", status)
  })

loadTables()

</script>

<div id="service-console">

  <div class="row" id="build-top">
    tables & orders | v2.3.1
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
