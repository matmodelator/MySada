<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<!-- Адаптация под мобильные -->
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>План зала</title>

<!-- СТИЛЬ КОНСОЛИ -->
<link rel="stylesheet"
      href="styles/console.css" />

<style>
/* ========================================
   ОБЩИЕ СТИЛИ СТРАНИЦЫ
======================================== */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
}

/* ========================================
   ПОЛЕ ПЛАНА ЗАЛА
======================================== */

#hall {
  position: relative;
  width: 100%;
  height: 100vh;
  background: #f8fafc;
  overflow: hidden;
}

/* ========================================
   СТОЛ
======================================== */

.table {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: grab;
  user-select: none;
  transition: background 0.2s;
  box-sizing: border-box;
}

/* Свободный */
.table.free {
  background: #2ecc71;
}

/* Занятый */
.table.occupied {
  background: #e74c3c;
}

/* Резерв */
.table.reserved {
  background: #f1c40f;
}

/* Уборка */
.table.cleaning {
  background: #95a5a6;
}

/* ========================================
   ДИАЛОГОВОЕ ОКНО
======================================== */

.dialog {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.dialog.hidden {
  display: none;
}

.dialog-box {
  width: 360px;
  max-width: calc(100vw - 32px);
  background: white;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  color: #1f2937;
}

#dialog-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 12px;
}

#dialog-body {
  margin-bottom: 16px;
  line-height: 1.5;
}

.dialog-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.dialog-actions button {
  border: 0;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
}

#dialog-open-btn {
  background: #2563eb;
  color: white;
}

#dialog-close-order-btn {
  background: #dc2626;
  color: white;
}

#dialog-close-btn {
  background: #e5e7eb;
  color: #111827;
}
</style>
</head>

<body>

<!-- ========================================
     ПОЛЕ ЗАЛА
======================================== -->
<div id="hall"></div>

<!-- ========================================
     ДИАЛОГОВОЕ ОКНО СТОЛА
======================================== -->
<div id="table-dialog" class="dialog hidden">
  <div class="dialog-box">

    <div id="dialog-title">
      Стол
    </div>

    <div id="dialog-body"></div>

    <div class="dialog-actions">

      <button id="dialog-open-btn">
        Открыть стол
      </button>

      <button id="dialog-close-order-btn">
        Закрыть заказ
      </button>

      <button id="dialog-close-btn">
        Закрыть окно
      </button>

    </div>
  </div>
</div>

<script type="module">
/* ========================================
   ПОДКЛЮЧАЕМ ГОТОВЫЙ КЛИЕНТ SUPABASE
   scripts/config.js должен экспортировать:
   export const supabase = createClient(...)
======================================== */
import { supabase }
from "./scripts/config.js"

/* ========================================
   ОСНОВНЫЕ ЭЛЕМЕНТЫ
======================================== */
const hall =
  document.getElementById("hall")

const dialog =
  document.getElementById("table-dialog")

const dialogTitle =
  document.getElementById("dialog-title")

const dialogBody =
  document.getElementById("dialog-body")

const dialogOpenBtn =
  document.getElementById("dialog-open-btn")

const dialogCloseOrderBtn =
  document.getElementById("dialog-close-order-btn")

const dialogCloseBtn =
  document.getElementById("dialog-close-btn")

/* ========================================
   ПЕРЕМЕННЫЕ ДЛЯ ПЕРЕТАСКИВАНИЯ
======================================== */
let dragging = null
let offsetX = 0
let offsetY = 0

/* ========================================
   АКТИВНЫЙ СТОЛ В ОКНЕ
======================================== */
let activeTable = null

/* ========================================
   ЗАГРУЗКА СТОЛОВ ИЗ БАЗЫ
======================================== */
async function loadTables() {
  const { data, error } =
    await supabase
      .from("tables")
      .select("*")
      .order("name")

  console.log("DATA:", data)
  console.log("ERROR:", error)

  if (error) {
    console.error(error)
    return
  }

  hall.innerHTML = ""
  data.forEach(createTable)
}

/* ========================================
   СОЗДАНИЕ ОДНОГО СТОЛА
======================================== */
function createTable(row) {
  let moved = false

  const el =
    document.createElement("div")

  el.className =
    "table " + (row.table_status || "free")

  el.dataset.tableId =
    row.table_id

  el.textContent =
    row.name || "Table"

  el.style.left =
    (row.x ?? 0) + "px"

  el.style.top =
    (row.y ?? 0) + "px"

  el.style.width =
    (row.width ?? 120) + "px"

  el.style.height =
    (row.height ?? 120) + "px"

  hall.appendChild(el)

  /* Начало перетаскивания */
  el.addEventListener(
    "mousedown",
    e => {
      dragging = el
      moved = false

      offsetX =
        e.clientX - el.offsetLeft

      offsetY =
        e.clientY - el.offsetTop
    }
  )

  /* Если элемент реально двигали — помечаем */
  el.addEventListener(
    "mousemove",
    () => {
      if (dragging === el)
        moved = true
    }
  )

  /* Обычный клик по столу */
  el.addEventListener(
    "click",
    () => {
      if (moved)
        return

      openTableDialog(row)
    }
  )
}

/* ========================================
   ДВИЖЕНИЕ МЫШИ
======================================== */
document.addEventListener(
  "mousemove",
  e => {
    if (!dragging)
      return

    dragging.style.left =
      e.clientX - offsetX + "px"

    dragging.style.top =
      e.clientY - offsetY + "px"
  }
)

/* ========================================
   ОТПУСТИЛИ МЫШЬ
   Сохраняем новые координаты в базу
======================================== */
document.addEventListener(
  "mouseup",
  async () => {

    if (!dragging)
      return

    const table_id =
      dragging.dataset.tableId

    const x =
      parseInt(
        dragging.style.left,
        10
      )

    const y =
      parseInt(
        dragging.style.top,
        10
      )

    const { data, error } =
      await supabase
        .from("tables")
        .update({
          x,
          y
        })
        .eq(
          "table_id",
          table_id
        )
        .select()
        .single()

    console.log(
      "COORD UPDATE DATA:",
      data
    )

    console.log(
      "COORD UPDATE ERROR:",
      error
    )

    if (error) {
      console.error(error)
      dragging = null
      return
    }

    if (data) {
      updateTable(data)
    }

    dragging = null

  }
)

/* ========================================
   REALTIME ПОДПИСКА НА ТАБЛИЦУ TABLES
======================================== */
let tablesChannel

function subscribeTablesRealtime() {

  if (tablesChannel) {
    supabase.removeChannel(tablesChannel)
  }

  tablesChannel =
    supabase
      .channel("tables-realtime")

      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "tables"
        },
        payload => {

          console.log(
            "TABLES REALTIME:",
            payload
          )

          if (payload.eventType === "DELETE") {
            removeTable(payload.old)
            return
          }

          const row =
            payload.new

          if (!row)
            return

          updateTable(row)
        }
      )

      .subscribe(status => {
        console.log(
          "TABLES REALTIME STATUS:",
          status
        )
      })
}

subscribeTablesRealtime()

/* ========================================
   ОБНОВЛЕНИЕ СТОЛА НА ЭКРАНЕ
======================================== */
function updateTable(row) {
  let el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (!el) {
    createTable(row)
    return
  }

  el.textContent =
    row.name || "Table"

  el.classList.remove(
    "free",
    "occupied",
    "reserved",
    "cleaning"
  )

  el.classList.add(
    row.table_status || "free"
  )

  el.style.left =
    (row.x ?? 0) + "px"

  el.style.top =
    (row.y ?? 0) + "px"

  el.style.width =
    (row.width ?? 120) + "px"

  el.style.height =
    (row.height ?? 120) + "px"

  if (
    activeTable &&
    activeTable.table_id === row.table_id
  ) {
    activeTable = row
    renderDialogBody(row)
  }
}

/* ========================================
   УДАЛЕНИЕ СТОЛА ИЗ DOM
======================================== */
function removeTable(row) {
  const el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (el)
    el.remove()
}

/* ========================================
   ОТРИСОВКА ТЕЛА ОКНА
======================================== */
function renderDialogBody(row) {
  dialogBody.innerHTML =
    "Статус: " + (row.table_status || "free") + "<br>" +
    "Мест: " + (row.seats ?? 0) + "<br>" +
    "X: " + (row.x ?? 0) + " | Y: " + (row.y ?? 0)
}

/* ========================================
   ОТКРЫТЬ ДИАЛОГОВОЕ ОКНО
======================================== */
function openTableDialog(row) {
  activeTable = row

  dialogTitle.textContent =
    row.name || "Стол"

  renderDialogBody(row)

  dialog.classList.remove("hidden")
}

/* ========================================
   ЗАКРЫТЬ ДИАЛОГОВОЕ ОКНО
======================================== */
function closeTableDialog() {
  dialog.classList.add("hidden")
  activeTable = null
}

/* ========================================
   ЗАКРЫТЬ ОКНО ПО КНОПКЕ
======================================== */
dialogCloseBtn.addEventListener(
  "click",
  closeTableDialog
)

/* ========================================
   ЗАКРЫТЬ ОКНО ПО КЛИКУ НА ТЁМНЫЙ ФОН
======================================== */
dialog.addEventListener(
  "click",
  e => {
    if (e.target === dialog)
      closeTableDialog()
  }
)

/* ========================================
   ОТКРЫТЬ СТОЛ
   1. Создать заказ
   2. Поменять стол на occupied
======================================== */
dialogOpenBtn.addEventListener(
  "click",
  async () => {
    if (!activeTable)
      return

    if (activeTable.table_status === "occupied") {
      alert("Стол уже открыт")
      return
    }

    const { data: orderData, error: orderError } =
      await supabase
        .from("orders")
        .insert({
          project_id: activeTable.project_id,
          hall_id: activeTable.hall_id,
          table_id: activeTable.table_id,
          guest_count: 2,
          shift_id: activeTable.current_shift_id
        })
        .select()

    console.log("ORDER DATA:", orderData)
    console.log("ORDER ERROR:", orderError)

    if (orderError) {
      alert("Не удалось открыть заказ")
      return
    }

    const { data: tableData, error: tableError } =
      await supabase
        .from("tables")
        .update({
          table_status: "occupied"
        })
        .eq("table_id", activeTable.table_id)
        .select()
        .single()

    console.log("OPEN TABLE DATA:", tableData)
    console.log("OPEN TABLE ERROR:", tableError)

    if (tableError) {
      alert("Заказ создан, но статус стола не обновился")
      return
    }

    if (tableData) {
      updateTable(tableData)
    }

    closeTableDialog()
  }
)

/* ========================================
   ЗАКРЫТЬ ЗАКАЗ
   1. Найти открытый заказ этого стола
   2. Перевести заказ в closed
   3. Освободить стол
======================================== */
dialogCloseOrderBtn.addEventListener(
  "click",
  async () => {
    if (!activeTable)
      return

    const { data: openOrder, error: findError } =
      await supabase
        .from("orders")
        .select("*")
        .eq("table_id", activeTable.table_id)
        .eq("order_status", "open")
        .order("opened_at", { ascending: false })
        .limit(1)
        .maybeSingle()

    console.log("OPEN ORDER:", openOrder)
    console.log("FIND ORDER ERROR:", findError)

    if (findError) {
      alert("Не удалось найти открытый заказ")
      return
    }

    if (!openOrder) {
      alert("Для этого стола нет открытого заказа")
      return
    }

    const { error: closeOrderError } =
      await supabase
        .from("orders")
        .update({
          order_status: "closed",
          closed_at: new Date().toISOString()
        })
        .eq("order_id", openOrder.order_id)

    console.log("CLOSE ORDER ERROR:", closeOrderError)

    if (closeOrderError) {
      alert("Не удалось закрыть заказ")
      return
    }

    const { data: freeTableData, error: freeTableError } =
      await supabase
        .from("tables")
        .update({
          table_status: "free"
        })
        .eq("table_id", activeTable.table_id)
        .select()
        .single()

    console.log("FREE TABLE DATA:", freeTableData)
    console.log("FREE TABLE ERROR:", freeTableError)

    if (freeTableError) {
      alert("Заказ закрыт, но стол не освободился")
      return
    }

    if (freeTableData) {
      updateTable(freeTableData)
    }

    closeTableDialog()
  }
)

/* ========================================
   ПЕРВИЧНАЯ ЗАГРУЗКА
======================================== */
loadTables()

</script>

<!-- ========================================
     SERVICE CONSOLE
======================================== -->
<div id="service-console">

  <div class="row" id="build-top">
    two ways realtime without refresh | v2.2.1
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;
})();
</script>

</body>
</html>
