<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Hall</title>

<link rel="stylesheet"
      href="styles/hall.css" />      
<link rel="stylesheet"
      href="styles/console.css" />


</head>

<body>

<header class="top-bar">
  <div class="top-title">MySada Hall</div>

  <div class="top-buttons">
    <button id="backBtn" type="button">Back</button>
    <button id="reloadBtn" type="button">Reload</button>
  </div>
</header>

<section class="top-info">

  <div class="info-card">
    <div class="info-label">Project</div>
    <div id="projectName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">Select Hall</div>
    <select id="hallSelect">
      <option value="">loading...</option>
    </select>
  </div>

  <div class="info-card">
    <div class="info-label">Hall</div>
    <div id="hallName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">User</div>
    <div id="userName" class="info-value">loading...</div>
  </div>

</section>

<div class="view-panel">

  <div class="view-buttons">

    <button id="viewTabsBtn" type="button">
      Tabs
    </button>

    <button id="viewGridBtn" type="button">
      Grid
    </button>

    <button id="viewAllBtn" type="button">
      All halls
    </button>

  </div>

</div>

<div id="status" class="status">
  Starting...
</div>

<div id="hallTabs" class="hall-tabs"></div>

<div id="hallGrid" class="hall-grid hidden"></div>

<main id="singleHallWrap" class="hall-wrap">
  <div id="hallCanvas" class="hall-canvas"></div>
</main>

<div id="allHalls" class="all-halls hidden"></div>

<!--
========================================
ДИАЛОГ ДЕЙСТВИЙ СО СТОЛОМ
========================================
-->

<div id="tableDialog" class="table-dialog hidden">

  <div id="dialogTitle" class="dialog-title">
    Table
  </div>

  <div id="dialogInfo" class="dialog-info">
    Status
  </div>

  <div class="dialog-actions">

    <button id="btnOpenOrder" type="button">
      Open order
    </button>

    <button id="btnCloseOrder" type="button">
      Close order
    </button>

    <button id="btnReserveTable" type="button">
      Reserve table
    </button>

    <button id="btnCleanTable" type="button">
      Cleaning
    </button>

    <button id="btnCloseDialog" type="button">
      Cancel
    </button>

  </div>

</div>

<!--
========================================
КОНСОЛЬ
========================================
-->

<div id="service-console">

  <div class="row" id="build-top">
    Hall modes tabs grid all | v5.0.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectNameBox =
  document.getElementById('projectName')

const hallNameBox =
  document.getElementById('hallName')

const userNameBox =
  document.getElementById('userName')

const hallSelect =
  document.getElementById('hallSelect')

const statusBox =
  document.getElementById('status')

const hallTabs =
  document.getElementById('hallTabs')

const hallGrid =
  document.getElementById('hallGrid')

const singleHallWrap =
  document.getElementById('singleHallWrap')

const hallCanvas =
  document.getElementById('hallCanvas')

const allHalls =
  document.getElementById('allHalls')

const buildDown =
  document.getElementById('build-down')

const viewTabsBtn =
  document.getElementById('viewTabsBtn')

const viewGridBtn =
  document.getElementById('viewGridBtn')

const viewAllBtn =
  document.getElementById('viewAllBtn')

const dialog =
  document.getElementById('tableDialog')

const dialogTitle =
  document.getElementById('dialogTitle')

const dialogInfo =
  document.getElementById('dialogInfo')

const btnOpenOrder =
  document.getElementById('btnOpenOrder')

const btnCloseOrder =
  document.getElementById('btnCloseOrder')

const btnReserveTable =
  document.getElementById('btnReserveTable')

const btnCleanTable =
  document.getElementById('btnCleanTable')

const btnCloseDialog =
  document.getElementById('btnCloseDialog')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let currentProjectId =
  null

let currentProjectName =
  ''

let currentHallId =
  null

let currentHallName =
  ''

let activeTable =
  null

let hallViewMode =
  sessionStorage.getItem('mysada_hall_view_mode') || 'tabs'

let hallsList =
  []

let tablesList =
  []

/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

function setStatus(text) {
  statusBox.textContent =
    text

  console.log('[HALL]', text)

  updateBuildLine(text)
}

/*
========================================
LOAD USER
берём текущего Supabase Auth пользователя
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser = {
    user_id: data.user.id,
    email: data.user.email,
    name: data.user.email,
    role: 'user'
  }

  userNameBox.textContent =
    currentUser.name + ' / ' + currentUser.role

  sessionStorage.setItem(
    'mysada_user',
    JSON.stringify(currentUser)
  )

  return currentUser
}

/*
========================================
LOAD PROJECT
берём project из sessionStorage после Upload в index.html
========================================
*/

function loadProjectFromSession() {
  setStatus('Loading project from session...')

  const rawProject =
    sessionStorage.getItem('mysada_project')

  if (!rawProject)
    throw new Error('Project not found in sessionStorage')

  const savedProject =
    JSON.parse(rawProject)

  currentProjectId =
    savedProject.project_id

  currentProjectName =
    savedProject.project_name || savedProject.name || 'Project'

  if (!currentProjectId)
    throw new Error('Project ID is empty in sessionStorage')

  projectNameBox.textContent =
    currentProjectName + ' / ' + currentProjectId

  return currentProjectId
}

/*
========================================
LOAD PROJECT DATA
сразу грузим все залы и все столы проекта из Supabase
========================================
*/

async function loadProjectData() {
  setStatus('Loading halls and tables...')

  const { data: halls, error: hallsError } =
    await supabase
      .from('halls')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('name', { ascending: true })

  if (hallsError)
    throw hallsError

  hallsList =
    halls || []

  const { data: tables, error: tablesError } =
    await supabase
      .from('tables')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('name', { ascending: true })

  if (tablesError)
    throw tablesError

  tablesList =
    tables || []

  setStatus(
    'Project data loaded: halls '
    + hallsList.length
    + ', tables '
    + tablesList.length
  )
}

/*
========================================
LOAD HALL LIST
строим список залов из уже загруженных данных
========================================
*/

function loadHallList() {
  setStatus('Rendering hall list...')

  hallSelect.innerHTML =
    ''

  if (!hallsList.length) {
    hallSelect.innerHTML =
      '<option value="">No halls</option>'

    hallNameBox.textContent =
      'No halls'

    setStatus('No halls found for project')

    return null
  }

  hallsList.forEach(hall => {
    const option =
      document.createElement('option')

    option.value =
      hall.hall_id || hall.id

    option.textContent =
      hall.name || option.value

    hallSelect.appendChild(option)
  })

  const params =
    new URLSearchParams(window.location.search)

  const hallIdFromUrl =
    params.get('hall_id')

  if (hallIdFromUrl) {
    hallSelect.value =
      hallIdFromUrl
  }

  if (!hallSelect.value) {
    hallSelect.selectedIndex =
      0
  }

  currentHallId =
    hallSelect.value

  currentHallName =
    hallSelect.options[hallSelect.selectedIndex].textContent

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  setStatus(
    'Hall list rendered: ' + hallsList.length
  )

  return currentHallId
}

/*
========================================
COUNT TABLES FOR HALL
========================================
*/

function countTablesForHall(hallId) {
  return tablesList.filter(
    table => table.hall_id === hallId
  ).length
}

/*
========================================
GET HALL NAME
========================================
*/

function getHallName(hallId) {
  const hall =
    hallsList.find(
      item => (item.hall_id || item.id) === hallId
    )

  if (!hall)
    return hallId

  return hall.name || hallId
}

/*
========================================
SET CURRENT HALL
выбор активного зала
========================================
*/

function setCurrentHall(hallId) {
  currentHallId =
    hallId

  currentHallName =
    getHallName(hallId)

  hallSelect.value =
    hallId

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  sessionStorage.setItem(
    'mysada_current_hall_id',
    currentHallId
  )

  renderHallTabs()
  renderHallGrid()

  if (hallViewMode !== 'all') {
    renderCurrentHall()
  }

  setStatus(
    'Selected hall: ' + currentHallName
  )
}

/*
========================================
RENDER HALL TABS
закладки залов
========================================
*/

function renderHallTabs() {
  hallTabs.innerHTML =
    ''

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const button =
      document.createElement('button')

    button.type =
      'button'

    button.className =
      'hall-tab'

    if (hallId === currentHallId) {
      button.classList.add('active')
    }

    button.textContent =
      (hall.name || hallId)
      + ' · '
      + countTablesForHall(hallId)

    button.addEventListener('click', () => {
      setCurrentHall(hallId)
    })

    hallTabs.appendChild(button)
  })
}

/*
========================================
RENDER HALL GRID
мозаика залов
========================================
*/

function renderHallGrid() {
  hallGrid.innerHTML =
    ''

  const menu =
    document.createElement('div')

  menu.className =
    'hall-tabs'

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const button =
      document.createElement('button')

    button.type =
      'button'

    button.className =
      'hall-tab'

    if (hallId === currentHallId)
      button.classList.add('active')

    button.textContent =
      hall.name || hallId

    button.addEventListener('click', () => {
      setCurrentHall(hallId)
      renderHallGrid()
    })

    menu.appendChild(button)
  })

  hallGrid.appendChild(menu)

  const list =
    document.createElement('div')

  list.className =
    'table-tree'

  tablesList
    .filter(table => table.hall_id === currentHallId)
    .sort((a, b) => Number(a.name) - Number(b.name))
    .forEach(table => {
      const row =
        document.createElement('button')

      const status =
        table.table_status || 'free'

      row.type =
        'button'

      row.className =
        'table-tree-row table-' + status

      row.textContent =
        (table.name || table.table_id)
        + ' · '
        + status

      row.addEventListener('click', () => {
        openTableDialog(table)
      })

      list.appendChild(row)
    })

  hallGrid.appendChild(list)
}

/*
========================================
SET HALL VIEW MODE
tabs | grid | all
========================================
*/

function setHallViewMode(mode) {
  hallViewMode =
    mode

  sessionStorage.setItem(
    'mysada_hall_view_mode',
    mode
  )

  viewTabsBtn.classList.toggle(
    'active',
    mode === 'tabs'
  )

  viewGridBtn.classList.toggle(
    'active',
    mode === 'grid'
  )

  viewAllBtn.classList.toggle(
    'active',
    mode === 'all'
  )

  hallTabs.classList.toggle(
    'hidden',
    mode !== 'tabs'
  )

  hallGrid.classList.toggle(
    'hidden',
    mode !== 'grid'
  )

  singleHallWrap.classList.toggle(
    'hidden',
    mode === 'all' || mode === 'grid'
  )

  allHalls.classList.toggle(
    'hidden',
    mode !== 'all'
  )

  dialog.classList.add('hidden')

  activeTable =
    null

  renderHallTabs()
  renderHallGrid()

  if (mode === 'all') {
    renderAllHalls()
  }

  if (mode === 'tabs') {
    renderCurrentHall()
  }

  setStatus(
    'View mode: ' + mode
  )
}

/*
========================================
LOAD TABLES
грузим столы выбранного зала из уже загруженных данных
========================================
*/

function loadTables() {
  renderCurrentHall()
}

/*
========================================
RENDER CURRENT HALL
один выбранный зал
========================================
*/

function renderCurrentHall() {
  hallCanvas.innerHTML =
    ''

  activeTable =
    null

  dialog.classList.add('hidden')

  if (!currentHallId) {
    setStatus('No hall selected')
    return
  }

  const tablesForHall =
    tablesList.filter(
      table => table.hall_id === currentHallId
    )

  if (!tablesForHall.length) {
    setStatus(
      'No tables found for hall: ' + currentHallName
    )

    return
  }

  tablesForHall.forEach(table => {
    renderTableToCanvas(
      table,
      hallCanvas
    )
  })

  setStatus(
    'Tables rendered: '
    + tablesForHall.length
    + ' | '
    + currentHallName
  )
}

/*
========================================
RENDER ALL HALLS
все залы одновременно
========================================
*/

function renderAllHalls() {
  allHalls.innerHTML =
    ''

  activeTable =
    null

  dialog.classList.add('hidden')

  if (!hallsList.length) {
    setStatus('No halls to render')
    return
  }

  hallsList.forEach(hall => {
    const hallId =
      hall.hall_id || hall.id

    const block =
      document.createElement('section')

    block.className =
      'hall-block'
        
if (hallId === currentHallId) {
  block.classList.add('active')
}
    
        const title =
      document.createElement('div')

    title.className =
      'hall-block-title'

    title.textContent =
      (hall.name || hallId)
      + ' · tables: '
      + countTablesForHall(hallId)

    const canvas =
      document.createElement('div')

    canvas.className =
      'hall-canvas-all'

    canvas.dataset.hallId =
      hallId

    block.appendChild(title)
    block.appendChild(canvas)

    allHalls.appendChild(block)

    tablesList
      .filter(table => table.hall_id === hallId)
      .forEach(table => {
        renderTableToCanvas(
          table,
          canvas
        )
      })
  })

  setStatus(
    'All halls rendered: ' + hallsList.length
  )
}

/*
========================================
RENDER TABLE
совместимость со старым названием функции
========================================
*/

function renderTable(item) {
  renderTableToCanvas(
    item,
    hallCanvas
  )
}

/*
========================================
RENDER TABLE TO CANVAS
столы отображаются и открывают диалог действий
========================================
*/

function renderTableToCanvas(item, targetCanvas) {
  const el =
    document.createElement('div')

  const shape =
    item.shape || 'square'

  const x =
    Number(item.x || 0)

  const y =
    Number(item.y || 0)

  const width =
    Number(item.width || 120)

  const height =
    Number(item.height || 120)

  const tableStatus =
    item.table_status || 'free'

  let shapeClass =
    'table-square'

  if (shape === 'round')
    shapeClass =
      'table-round'

  if (shape === 'rect')
    shapeClass =
      'table-rect'

  el.className =
    'table-item '
    + shapeClass
    + ' table-'
    + tableStatus

  el.dataset.tableId =
    item.table_id

  el.style.left =
    x + 'px'

  el.style.top =
    y + 'px'

  el.style.width =
    width + 'px'

  el.style.height =
    height + 'px'

  const label =
    document.createElement('div')

  label.className =
    'table-label'

  label.textContent =
    item.name || 'Table'

  el.appendChild(label)

  el.addEventListener('click', () => {
    openTableDialog(item)
  })

  targetCanvas.appendChild(el)
}

/*
========================================
ОТКРЫТЬ ДИАЛОГ СТОЛА
========================================
*/

function openTableDialog(table) {
  activeTable =
    table

  dialogTitle.textContent =
    table.name || 'Table'

  dialogInfo.textContent =
    'hall: '
    + getHallName(table.hall_id)
    + ' | status: '
    + (table.table_status || 'free')
    + ' | table_id: '
    + table.table_id

  dialog.classList.remove('hidden')

  setStatus(
    'Selected table: ' + (table.name || table.table_id)
  )
}

/*
========================================
ОБНОВИТЬ СТОЛ В ПАМЯТИ
чтобы при переключении зала статус не откатился
========================================
*/

function updateTableInMemory(updatedTable) {
  tablesList =
    tablesList.map(table => {
      if (table.table_id === updatedTable.table_id)
        return updatedTable

      return table
    })
}

/*
========================================
ОБНОВИТЬ СТОЛ НА ЭКРАНЕ
========================================
*/

function updateTable(updatedTable) {
  updateTableInMemory(updatedTable)

  if (hallViewMode === 'all') {
    renderAllHalls()
    return
  }

  if (hallViewMode === 'tabs') {
    renderCurrentHall()
    return
  }

  renderHallGrid()
}

/*
========================================
1. ОТКРЫТЬ ЗАКАЗ
orders = open
tables = occupied
========================================
*/

btnOpenOrder.addEventListener(
  "click",
  async () => {

    try {

      if (!activeTable)
        return

      setStatus('Opening order...')

      const { data: orderData, error: orderError } =
        await supabase
          .from("orders")
          .insert({
            project_id: activeTable.project_id,
            hall_id: activeTable.hall_id,
            table_id: activeTable.table_id,
            guest_count: 2,
            shift_id: activeTable.current_shift_id
          })
          .select()

      console.log("OPEN ORDER DATA:", orderData)
      console.log("OPEN ORDER ERROR:", orderError)

      if (orderError) {
        setStatus(
          'Open order error: ' + orderError.message
        )

        alert("Не удалось открыть заказ")
        return
      }

      await setTableStatus(
        activeTable.table_id,
        "occupied"
      )

    }
    catch (err) {
      console.error(err)

      setStatus(
        'Open order error: ' + err.message
      )
    }

  }
)

/*
========================================
2. ЗАКРЫТЬ ЗАКАЗ
orders = closed
tables = free
========================================
*/

btnCloseOrder.addEventListener(
  "click",
  async () => {

    try {

      if (!activeTable)
        return

      setStatus('Finding open order...')

      const { data: openOrder, error: findError } =
        await supabase
          .from("orders")
          .select("*")
          .eq("table_id", activeTable.table_id)
          .eq("order_status", "open")
          .order("opened_at", { ascending: false })
          .limit(1)
          .maybeSingle()

      console.log("FIND ORDER DATA:", openOrder)
      console.log("FIND ORDER ERROR:", findError)

      if (findError || !openOrder) {
        setStatus('Open order not found')

        alert("Открытый заказ не найден")
        return
      }

      const { error: closeError } =
        await supabase
          .from("orders")
          .update({
            order_status: "closed",
            closed_at: new Date().toISOString()
          })
          .eq("order_id", openOrder.order_id)

      console.log("CLOSE ORDER ERROR:", closeError)

      if (closeError) {
        setStatus(
          'Close order error: ' + closeError.message
        )

        alert("Не удалось закрыть заказ")
        return
      }

      await setTableStatus(
        activeTable.table_id,
        "free"
      )

    }
    catch (err) {
      console.error(err)

      setStatus(
        'Close order error: ' + err.message
      )
    }

  }
)

/*
========================================
3. ЗАРЕЗЕРВИРОВАТЬ СТОЛ
tables = reserved
========================================
*/

btnReserveTable.addEventListener(
  "click",
  async () => {

    try {

      if (!activeTable)
        return

      await setTableStatus(
        activeTable.table_id,
        "reserved"
      )

    }
    catch (err) {
      console.error(err)

      setStatus(
        'Reserve table error: ' + err.message
      )
    }

  }
)

/*
========================================
4. УБОРКА СТОЛА
tables = cleaning
========================================
*/

btnCleanTable.addEventListener(
  "click",
  async () => {

    try {

      if (!activeTable)
        return

      await setTableStatus(
        activeTable.table_id,
        "cleaning"
      )

    }
    catch (err) {
      console.error(err)

      setStatus(
        'Cleaning table error: ' + err.message
      )
    }

  }
)

/*
========================================
ОБЩАЯ ФУНКЦИЯ СМЕНЫ СТАТУСА СТОЛА
========================================
*/

async function setTableStatus(
  table_id,
  table_status
) {

  setStatus(
    'Updating table status: ' + table_status
  )

  const { data, error } =
    await supabase
      .from("tables")
      .update({
        table_status
      })
      .eq("table_id", table_id)
      .select()
      .single()

  console.log("TABLE STATUS DATA:", data)
  console.log("TABLE STATUS ERROR:", error)

  if (error) {
    setStatus(
      'Table status error: ' + error.message
    )

    alert("Не удалось изменить статус стола")
    return
  }

  if (data) {
    updateTable(data)
  }

  dialog.classList.add("hidden")

  activeTable =
    null

  setStatus(
    'Table status updated: ' + table_status
  )
}

/*
========================================
ЗАКРЫТЬ ДИАЛОГ СТОЛА
========================================
*/

btnCloseDialog.addEventListener(
  "click",
  () => {

    dialog.classList.add("hidden")

    activeTable =
      null

    setStatus("Table dialog closed")

  }
)

/*
========================================
SELECT HALL
при выборе зала грузим его столы
========================================
*/

hallSelect.addEventListener('change', () => {
  try {
    setCurrentHall(
      hallSelect.value
    )

    if (hallViewMode !== 'tabs') {
      setHallViewMode('tabs')
    }
  }
  catch (err) {
    console.error(err)

    setStatus(
      'Select hall error: ' + err.message
    )
  }
})

/*
========================================
VIEW BUTTONS
переключение режимов представления залов
========================================
*/

viewTabsBtn.addEventListener(
  'click',
  () => {
    setHallViewMode('tabs')
  }
)

viewGridBtn.addEventListener(
  'click',
  () => {
    setHallViewMode('grid')
  }
)

viewAllBtn.addEventListener(
  'click',
  () => {
    setHallViewMode('all')
  }
)

/*
========================================
BUTTONS

document
  .getElementById('backBtn')
  .addEventListener('click', () => {
    window.location.href =
      'index.html'
  })

document
  .getElementById('reloadBtn')
  .addEventListener('click', async () => {
    try {
      await loadProjectData()

      loadHallList()

      renderHallTabs()
      renderHallGrid()

      setHallViewMode(
        hallViewMode
      )
    }
    catch (err) {
      console.error(err)

      setStatus(
        'Reload error: ' + err.message
      )
    }
  })

/*
========================================
INIT
загрузка пользователя, проекта, всех залов и всех столов
========================================
*/

async function init() {
  try {
    console.log('HALL INIT START')

    await loadUser()

    loadProjectFromSession()

    await loadProjectData()

    const hallId =
      loadHallList()

    const savedHallId =
      sessionStorage.getItem('mysada_current_hall_id')

    if (
      savedHallId
      &&
      hallsList.some(hall => (hall.hall_id || hall.id) === savedHallId)
    ) {
      setCurrentHall(savedHallId)
    }
    else if (hallId) {
      setCurrentHall(hallId)
    }

    setHallViewMode(
      hallViewMode
    )
  }
  catch (err) {
    console.error('HALL INIT ERROR:', err)

    setStatus(
      'Hall error: ' + err.message
    )
  }
}

init()

</script>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>
