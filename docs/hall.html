<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>MySada Hall</title>

  <link rel="stylesheet"
        href="styles/console.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f6;
      color: #243447;
      min-height: 100vh;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 14px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .top-info {
      max-width: 1200px;
      margin: 16px auto 10px;
      padding: 14px 18px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .info-card {
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      word-break: break-word;
    }

    .status {
      max-width: 1200px;
      margin: 10px auto;
      padding: 0 16px;
      color: #475569;
      font-size: 14px;
    }

    .hall-wrap {
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 16px;
    }

    .hall-canvas {
      position: relative;
      width: 100%;
      height: 680px;
      background: #ffffff;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.03),
        0 6px 18px rgba(0,0,0,0.08);
    }

    .table-item {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7dd3fc;
      border: 2px solid #0284c7;
      color: #0f172a;
      font-weight: 800;
      font-size: 18px;
      user-select: none;
      cursor: default;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }

    .table-round {
      border-radius: 50%;
    }

    .table-square {
      border-radius: 8px;
    }

    .table-rect {
      border-radius: 12px;
    }

    .table-label {
      pointer-events: none;
      text-align: center;
      line-height: 1.1;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }

    .bottom-bar button {
      pointer-events: auto;
      padding: 11px 20px;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(0,0,0,0.22);
    }

    #backBtn {
      background: #334155;
      color: white;
    }

    #reloadBtn {
      background: #2563eb;
      color: white;
    }

    @media (max-width: 800px) {
      .top-info {
        grid-template-columns: 1fr;
        margin-left: 12px;
        margin-right: 12px;
      }

      .hall-canvas {
        height: 560px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>MySada Hall</h1>
</header>

<section class="top-info">
  <div class="info-card">
    <div class="info-label">Project</div>
    <div id="projectName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">Hall</div>
    <div id="hallName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">User</div>
    <div id="userName" class="info-value">loading...</div>
  </div>
</section>

<div id="status" class="status">
  Loading hall from database...
</div>

<main class="hall-wrap">
  <div id="hallCanvas" class="hall-canvas"></div>
</main>

<div class="bottom-bar">
  <button id="backBtn" type="button">
    Back to Index
  </button>

  <button id="reloadBtn" type="button">
    Reload Hall
  </button>
</div>

<div id="service-console">
  <div class="row" id="build-top">
    Hall | v1.1.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>
</div>

<script type="module">
  /*
  ========================================
  SUPABASE
  ========================================
  */
  import { supabase }
  from "./scripts/config.js"

  /*
  ========================================
  DOM
  ========================================
  */
  const projectNameBox =
    document.getElementById('projectName')

  const hallNameBox =
    document.getElementById('hallName')

  const userNameBox =
    document.getElementById('userName')

  const statusBox =
    document.getElementById('status')

  const hallCanvas =
    document.getElementById('hallCanvas')

  const buildDown =
    document.getElementById('build-down')

  /*
  ========================================
  URL PARAMS
  ========================================
  */
  const params =
    new URLSearchParams(window.location.search)

  const projectId =
    params.get('project_id')

  const hallId =
    params.get('hall_id')

  const userNameFromUrl =
    params.get('user_name')

  let currentProject =
    null

  let currentHall =
    null

  let currentUser =
    null

  /*
  ========================================
  STATUS / CONSOLE
  ========================================
  */
  function updateBuildLine(text) {
    const now =
      new Date()

    const pad =
      n => String(n).padStart(2, '0')

    const date =
      pad(now.getDate()) +
      '.' +
      pad(now.getMonth() + 1) +
      '.' +
      now.getFullYear()

    const time =
      pad(now.getHours()) +
      ':' +
      pad(now.getMinutes())

    buildDown.textContent =
      'deploy: ' + date + ' ' + time + ' | ' + text
  }

  function setStatus(text) {
    statusBox.textContent =
      text

    console.log('[HALL]', text)

    updateBuildLine(text)
  }

  /*
  ========================================
  LOAD USER
  ВАЖНО:
  это НЕ Supabase Auth
  это твоя таблица users
  ========================================
  */
  async function loadUserFromName() {
    if (!userNameFromUrl) {
      setStatus('Missing user_name in URL')
      userNameBox.textContent =
        'missing user_name'

      return null
    }

    const { data, error } =
      await supabase
        .from('users')
        .select('user_id, project_id, name, role, status')
        .eq('name', userNameFromUrl)
        .maybeSingle()

    if (error) {
      console.error(error)

      setStatus(
        'User load error: ' + error.message
      )

      userNameBox.textContent =
        'User load error'

      return null
    }

    if (!data) {
      setStatus(
        'User not found: ' + userNameFromUrl
      )

      userNameBox.textContent =
        'User not found'

      return null
    }

    if (data.status !== 'on') {
      setStatus(
        'User switched off: ' + data.name
      )

      userNameBox.textContent =
        data.name + ' / off'

      return null
    }

    currentUser =
      data

    userNameBox.textContent =
      data.name + ' / ' + data.role

    setStatus(
      'User loaded: ' + data.name
    )

    return data
  }

  /*
  ========================================
  LOAD PROJECT
  ========================================
  */
  async function loadProject() {
    if (!projectId) {
      projectNameBox.textContent =
        'missing project_id'

      setStatus('Missing project_id in URL')

      return null
    }

    const { data, error } =
      await supabase
        .from('projects')
        .select('*')
        .or(
          'project_id.eq.' + projectId +
          ',id.eq.' + projectId
        )
        .maybeSingle()

    if (error) {
      console.error(error)

      projectNameBox.textContent =
        'Project load error'

      setStatus(
        'Project load error: ' + error.message
      )

      return null
    }

    if (!data) {
      projectNameBox.textContent =
        'Project not found'

      setStatus(
        'Project not found: ' + projectId
      )

      return null
    }

    currentProject =
      data

    projectNameBox.textContent =
      data.name || data.project_name || projectId

    return data
  }

  /*
  ========================================
  LOAD HALL
  ========================================
  */
  async function loadHallInfo() {
    if (!hallId) {
      hallNameBox.textContent =
        'missing hall_id'

      setStatus('Missing hall_id in URL')

      return null
    }

    const { data, error } =
      await supabase
        .from('halls')
        .select('*')
        .or(
          'hall_id.eq.' + hallId +
          ',id.eq.' + hallId
        )
        .maybeSingle()

    if (error) {
      console.error(error)

      hallNameBox.textContent =
        'Hall load error'

      setStatus(
        'Hall load error: ' + error.message
      )

      return null
    }

    if (!data) {
      hallNameBox.textContent =
        'Hall not found'

      setStatus(
        'Hall not found: ' + hallId
      )

      return null
    }

    currentHall =
      data

    hallNameBox.textContent =
      data.name || hallId

    return data
  }

  /*
  ========================================
  LOAD TABLES
  таблица: tables
  поля: project_id, hall_id, name, x, y, width, height, shape
  ========================================
  */
  async function loadTables() {
    hallCanvas.innerHTML =
      ''

    if (!projectId || !hallId) {
      setStatus(
        'Cannot load tables: missing project_id or hall_id'
      )

      return
    }

    const { data, error } =
      await supabase
        .from('tables')
        .select('*')
        .eq('project_id', projectId)
        .eq('hall_id', hallId)
        .order('name', { ascending: true })

    if (error) {
      console.error(error)

      setStatus(
        'Tables load error: ' + error.message
      )

      return
    }

    if (!data || !data.length) {
      setStatus(
        'Hall loaded. No tables found.'
      )

      return
    }

    data.forEach(renderTable)

    setStatus(
      'Hall loaded from database. Tables: ' + data.length
    )
  }

  /*
  ========================================
  RENDER TABLE
  СТОЛЫ НЕ ДВИГАЮТСЯ
  ========================================
  */
  function renderTable(item) {
    const el =
      document.createElement('div')

    const shape =
      item.shape || 'square'

    const x =
      Number(item.x || 0)

    const y =
      Number(item.y || 0)

    const width =
      Number(item.width || 120)

    const height =
      Number(item.height || 120)

    let shapeClass =
      'table-square'

    if (shape === 'round') {
      shapeClass =
        'table-round'
    }

    if (shape === 'rect') {
      shapeClass =
        'table-rect'
    }

    el.className =
      'table-item ' + shapeClass

    el.style.left =
      x + 'px'

    el.style.top =
      y + 'px'

    el.style.width =
      width + 'px'

    el.style.height =
      height + 'px'

    el.dataset.tableId =
      item.table_id || item.id || ''

    const label =
      document.createElement('div')

    label.className =
      'table-label'

    label.textContent =
      item.name || 'Table'

    el.appendChild(label)

    hallCanvas.appendChild(el)
  }

  /*
  ========================================
  BUTTONS
  ========================================
  */
  document
    .getElementById('backBtn')
    .addEventListener('click', () => {
      window.location.href =
        'index.html'
    })

  document
    .getElementById('reloadBtn')
    .addEventListener('click', async () => {
      await loadTables()
    })

  /*
  ========================================
  INIT
  ========================================
  */
  async function init() {
    updateBuildLine('init')

    if (!projectId || !hallId || !userNameFromUrl) {
      setStatus(
        'Missing URL params. Need project_id, hall_id, user_name'
      )

      return
    }

    await loadUserFromName()
    await loadProject()
    await loadHallInfo()
    await loadTables()
  }

  init()
</script>


  /*
    ========================================
    КОНСОЛЬ
    ========================================
  */
     

<div id="service-console">

  <div class="row" id="build-top">
    fix auth | v3.0.1
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
