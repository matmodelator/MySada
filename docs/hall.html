<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>MySada Hall</title>

  <link rel="stylesheet"
        href="styles/console.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f6;
      color: #243447;
      min-height: 100vh;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 14px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .top-info {
      max-width: 1200px;
      margin: 16px auto 10px;
      padding: 14px 18px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .info-card {
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      word-break: break-word;
    }

    .hall-wrap {
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 16px;
    }

    .hall-canvas {
      position: relative;
      width: 100%;
      height: 680px;
      background: #ffffff;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03),
                  0 6px 18px rgba(0,0,0,0.08);
    }

    .table-item {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7dd3fc;
      border: 2px solid #0284c7;
      color: #0f172a;
      font-weight: 800;
      font-size: 18px;
      user-select: none;
      cursor: default;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }

    .table-round {
      border-radius: 50%;
    }

    .table-rect {
      border-radius: 12px;
    }

    .table-label {
      pointer-events: none;
      text-align: center;
      line-height: 1.1;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }

    .bottom-bar button {
      pointer-events: auto;
      padding: 11px 20px;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(0,0,0,0.22);
    }

    #backBtn {
      background: #334155;
      color: white;
    }

    #reloadBtn {
      background: #2563eb;
      color: white;
    }

    .status {
      max-width: 1200px;
      margin: 10px auto;
      padding: 0 16px;
      color: #475569;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .top-info {
        grid-template-columns: 1fr;
        margin-left: 12px;
        margin-right: 12px;
      }

      .hall-canvas {
        height: 560px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>MySada Hall</h1>
</header>

<section class="top-info">
  <div class="info-card">
    <div class="info-label">Project</div>
    <div id="projectName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">Hall</div>
    <div id="hallName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">User</div>
    <div id="userName" class="info-value">loading...</div>
  </div>
</section>

<div id="status" class="status">
  Loading hall from database...
</div>

<main class="hall-wrap">
  <div id="hallCanvas" class="hall-canvas"></div>
</main>

<div class="bottom-bar">
  <button id="backBtn" type="button">
    Back to Index
  </button>

  <button id="reloadBtn" type="button">
    Reload Hall
  </button>
</div>

<!-- СЕРВИСНАЯ КОНСОЛЬ -->
<div id="service-console">
  <div id="build-top">Hall | v1.0.0</div>
  <div id="build-down">loading...</div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  /*
    ========================================
    SUPABASE CONFIG
    ВСТАВЬ СЮДА ТЕ ЖЕ ДАННЫЕ, ЧТО В INDEX.HTML
    ========================================
  */

  const SUPABASE_URL =
    'https://YOUR-PROJECT.supabase.co'

  const SUPABASE_ANON_KEY =
    'YOUR-ANON-KEY'

  const supabase =
    createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  /*
    ========================================
    DOM
    ========================================
  */

  const projectNameBox =
    document.getElementById('projectName')

  const hallNameBox =
    document.getElementById('hallName')

  const userNameBox =
    document.getElementById('userName')

  const statusBox =
    document.getElementById('status')

  const hallCanvas =
    document.getElementById('hallCanvas')

  const buildDown =
    document.getElementById('build-down')

  /*
    ========================================
    URL PARAMS
    ========================================
  */

  const params =
    new URLSearchParams(window.location.search)

  const projectId =
    params.get('project_id')

  const hallId =
    params.get('hall_id')

  let currentUser =
    null

  /*
    ========================================
    SERVICE CONSOLE
    ========================================
  */

  function updateConsole(text) {
    if (buildDown) {
      buildDown.textContent =
        new Date().toLocaleString('ru-RU') + ' | ' + text
    }
  }

  function setStatus(text) {
    statusBox.textContent = text
    console.log('[HALL]', text)
    updateConsole(text)
  }

  /*
    ========================================
    AUTH CHECK
    ========================================
  */

  async function checkAuth() {
    const { data, error } =
      await supabase.auth.getUser()

    if (error || !data || !data.user) {
      setStatus('No active user. Redirecting to index...')
      window.location.href = 'index.html'
      return null
    }

    currentUser =
      data.user

    userNameBox.textContent =
      currentUser.email || currentUser.id

    return currentUser
  }

  /*
    ========================================
    LOAD PROJECT
    ожидаем таблицу projects:
    id, name
    ========================================
  */

  async function loadProject() {
    const { data, error } =
      await supabase
        .from('projects')
        .select('id, name')
        .eq('id', projectId)
        .single()

    if (error) {
      console.error(error)
      projectNameBox.textContent = 'Project not found'
      setStatus('Project load error')
      return
    }

    projectNameBox.textContent =
      data.name || data.id
  }

  /*
    ========================================
    LOAD HALL
    ожидаем таблицу halls:
    id, project_id, name
    ========================================
  */

  async function loadHallInfo() {
    const { data, error } =
      await supabase
        .from('halls')
        .select('id, project_id, name')
        .eq('id', hallId)
        .eq('project_id', projectId)
        .single()

    if (error) {
      console.error(error)
      hallNameBox.textContent = 'Hall not found'
      setStatus('Hall load error')
      return
    }

    hallNameBox.textContent =
      data.name || data.id
  }

  /*
    ========================================
    LOAD TABLES
    ожидаем таблицу hall_tables:
    id, hall_id, name, x, y, width, height, shape
    shape: round / rect
    СТОЛЫ НЕ ДВИГАЮТСЯ
    ========================================
  */

  async function loadTables() {
    hallCanvas.innerHTML = ''

    const { data, error } =
      await supabase
        .from('hall_tables')
        .select('*')
        .eq('hall_id', hallId)
        .order('id', { ascending: true })

    if (error) {
      console.error(error)
      setStatus('Tables load error')
      return
    }

    if (!data || !data.length) {
      setStatus('Hall loaded. No tables found.')
      return
    }

    data.forEach(renderTable)

    setStatus('Hall loaded from database. Tables: ' + data.length)
  }

  /*
    ========================================
    RENDER TABLE
    Без drag/drop
    Без pointer move
    Без сохранения координат
    ========================================
  */

  function renderTable(item) {
    const el =
      document.createElement('div')

    const shape =
      item.shape || item.type || 'rect'

    const x =
      Number(item.x || item.left || 0)

    const y =
      Number(item.y || item.top || 0)

    const width =
      Number(item.width || item.w || 90)

    const height =
      Number(item.height || item.h || 70)

    el.className =
      'table-item ' +
      (shape === 'round' || shape === 'circle'
        ? 'table-round'
        : 'table-rect')

    el.style.left =
      x + 'px'

    el.style.top =
      y + 'px'

    el.style.width =
      width + 'px'

    el.style.height =
      height + 'px'

    el.dataset.id =
      item.id

    const label =
      document.createElement('div')

    label.className =
      'table-label'

    label.textContent =
      item.name || item.number || 'N'

    el.appendChild(label)

    hallCanvas.appendChild(el)
  }

  /*
    ========================================
    INIT
    ========================================
  */

  async function init() {
    updateConsole('init')

    if (!projectId || !hallId) {
      setStatus('Missing project_id or hall_id in URL')
      return
    }

    const user =
      await checkAuth()

    if (!user) {
      return
    }

    setStatus('Auth ok. Loading database...')

    await loadProject()
    await loadHallInfo()
    await loadTables()
  }

  /*
    ========================================
    BUTTONS
    ========================================
  */

  document.getElementById('backBtn').addEventListener('click', function () {
    window.location.href =
      'index.html'
      + '?project_id=' + encodeURIComponent(projectId)
      + '&hall_id=' + encodeURIComponent(hallId)
  })

  document.getElementById('reloadBtn').addEventListener('click', function () {
    loadTables()
  })

  init()
</script>

  /*
    ========================================
    КОНСОЛЬ
    ========================================
  */
     

<div id="service-console">

  <div class="row" id="build-top">
    switch to index | v3.0.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
