<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>План зала</title>

<link rel="stylesheet"
      href="styles/console.css" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
}

#hall {
  position: relative;
  width: 100%;
  height: 100vh;
  background: #f8fafc;
  overflow: hidden;
}

.table {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: grab;
  user-select: none;
  transition: background 0.2s;
  box-sizing: border-box;
}

.table.free {
  background: #2ecc71;
}

.table.occupied {
  background: #e74c3c;
}

.table.reserved {
  background: #f1c40f;
}

.table.cleaning {
  background: #95a5a6;
}
</style>
</head>

<body>

<div id="hall"></div>

<script type="module">

import { supabase }
from "./scripts/config.js"

const hall =
  document.getElementById("hall")

let dragging = null
let offsetX = 0
let offsetY = 0

async function loadTables() {
  const { data, error } =
    await supabase
      .from("tables")
      .select("*")
      .order("name")

  console.log("DATA:", data)
  console.log("ERROR:", error)

  if (error) {
    console.error(error)
    return
  }

  hall.innerHTML = ""

  data.forEach(createTable)
}

function createTable(row) {
  const el =
    document.createElement("div")

  el.className =
    "table " + (row.table_status || "free")

  el.dataset.tableId =
    row.table_id

  el.textContent =
    row.name || "Table"

  el.style.left =
    (row.x ?? 0) + "px"

  el.style.top =
    (row.y ?? 0) + "px"

  el.style.width =
    (row.width ?? 120) + "px"

  el.style.height =
    (row.height ?? 120) + "px"

  hall.appendChild(el)

  el.addEventListener(
    "mousedown",
    e => {
      dragging = el

      offsetX =
        e.clientX - el.offsetLeft

      offsetY =
        e.clientY - el.offsetTop
    }
  )
}

document.addEventListener(
  "mousemove",
  e => {
    if (!dragging)
      return

    dragging.style.left =
      e.clientX - offsetX + "px"

    dragging.style.top =
      e.clientY - offsetY + "px"
  }
)

document.addEventListener(
  "mouseup",
  async () => {
    if (!dragging)
      return

    const table_id =
      dragging.dataset.tableId

    const x =
      parseInt(dragging.style.left, 10)

    const y =
      parseInt(dragging.style.top, 10)

    const { error } =
      await supabase
        .from("tables")
        .update({
          x,
          y
        })
        .eq("table_id", table_id)

    if (error) {
      console.error("UPDATE ERROR:", error)
    }

    dragging = null
  }
)

supabase
  .channel("tables-realtime")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "tables"
    },
    payload => {
      console.log("Realtime:", payload)

      if (payload.eventType === "DELETE") {
        removeTable(payload.old)
        return
      }

      const row = payload.new

      if (!row)
        return

      updateTable(row)
    }
  )
  .subscribe()

function updateTable(row) {
  let el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (!el) {
    createTable(row)
    return
  }

  el.textContent =
    row.name || "Table"

  el.classList.remove(
    "free",
    "occupied",
    "reserved",
    "cleaning"
  )

  el.classList.add(
    row.table_status || "free"
  )

  if (typeof row.x === "number")
    el.style.left = row.x + "px"

  if (typeof row.y === "number")
    el.style.top = row.y + "px"

  if (typeof row.width === "number")
    el.style.width = row.width + "px"

  if (typeof row.height === "number")
    el.style.height = row.height + "px"
}

function removeTable(row) {
  const el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (el)
    el.remove()
}

loadTables()

</script>

<div id="service-console">

  <div class="row" id="build-top">
    hall realtime | v1.0.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;
})();
</script>





<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

   логическое ядро| v1.1.0

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

  </body>
</html>
