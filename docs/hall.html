<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<!--
  Адаптация под мобильные устройства.
  initial-scale=1.0 — чтобы страница открывалась без дополнительного зума.
-->
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>План зала</title>

<!--
  Внешний CSS твоей сервисной консоли.
  Если путь неверный — поправь href под свою структуру папок.
-->
<link rel="stylesheet"
      href="styles/console.css" />

<style>
/* ========================================
   ОБЩИЕ СТИЛИ СТРАНИЦЫ
======================================== */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
}

/* ========================================
   ПОЛЕ ПЛАНА ЗАЛА
   Здесь будут рисоваться столы.
======================================== */

#hall {
  position: relative;
  width: 100%;
  height: 100vh;
  background: #f8fafc;
  overflow: hidden;
}

/* ========================================
   ВИЗУАЛЬНЫЙ ВИД СТОЛА
======================================== */

.table {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: grab;
  user-select: none;
  transition: background 0.2s;
  box-sizing: border-box;
}

/* Стол свободен */
.table.free {
  background: #2ecc71;
}

/* Стол занят */
.table.occupied {
  background: #e74c3c;
}

/* Стол зарезервирован */
.table.reserved {
  background: #f1c40f;
}

/* Стол на уборке */
.table.cleaning {
  background: #95a5a6;
}

/* ========================================
   ДИАЛОГОВОЕ ОКНО
   Это затемнение на весь экран.
======================================== */

.dialog {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

/* Скрытое состояние окна */
.dialog.hidden {
  display: none;
}

/* Белая карточка в центре */
.dialog-box {
  width: 340px;
  max-width: calc(100vw - 32px);
  background: white;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  color: #1f2937;
}

/* Заголовок окна */
#dialog-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 12px;
}

/* Текстовая часть окна */
#dialog-body {
  margin-bottom: 16px;
  line-height: 1.5;
}

/* Контейнер кнопок */
.dialog-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* Общий стиль кнопок */
.dialog-actions button {
  border: 0;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
}

/* Кнопка открытия стола */
#dialog-open-btn {
  background: #2563eb;
  color: white;
}

/* Кнопка закрытия окна */
#dialog-close-btn {
  background: #e5e7eb;
  color: #111827;
}
</style>
</head>

<body>

<!--
  Основное поле зала.
  Все столы добавляются сюда через JavaScript.
-->
<div id="hall"></div>

<!-- ========================================
     ВНУТРЕННЕЕ ДИАЛОГОВОЕ ОКНО
     Открывается при клике на стол.
======================================== -->

<div id="table-dialog" class="dialog hidden">
  <div class="dialog-box">

    <!-- Заголовок окна: сюда подставляется название стола -->
    <div id="dialog-title">Стол</div>

    <!-- Тело окна: сюда подставляется статус, места, координаты -->
    <div id="dialog-body"></div>

    <!-- Кнопки действий -->
    <div class="dialog-actions">

      <!--
        Кнопка открытия стола.
        Создаёт заказ и ставит стол в occupied.
      -->
      <button id="dialog-open-btn">
        Открыть стол
      </button>

      <!-- Кнопка просто закрывает окно -->
      <button id="dialog-close-btn">
        Закрыть
      </button>

    </div>
  </div>
</div>

<!-- ========================================
     ОСНОВНОЙ JS-КОД СТРАНИЦЫ
======================================== -->

<script type="module">

/*
========================================
ПОДКЛЮЧАЕМ ГОТОВЫЙ КЛИЕНТ SUPABASE
Файл scripts/config.js должен экспортировать:
export const supabase = createClient(...)
========================================
*/
import { supabase }
from "./scripts/config.js"

/*
========================================
ПОЛУЧАЕМ ОСНОВНЫЕ ЭЛЕМЕНТЫ DOM
========================================
*/
const hall =
  document.getElementById("hall")

const dialog =
  document.getElementById("table-dialog")

const dialogTitle =
  document.getElementById("dialog-title")

const dialogBody =
  document.getElementById("dialog-body")

const dialogOpenBtn =
  document.getElementById("dialog-open-btn")

const dialogCloseBtn =
  document.getElementById("dialog-close-btn")

/*
========================================
ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ДЛЯ DRAG & DROP
========================================
*/
let dragging = null
let offsetX = 0
let offsetY = 0

/*
========================================
АКТИВНЫЙ СТОЛ В ДИАЛОГОВОМ ОКНЕ
Сюда сохраняем строку таблицы, по которой кликнули.
========================================
*/
let activeTable = null

/*
========================================
ЗАГРУЗКА СТОЛОВ ИЗ БАЗЫ
========================================
*/
async function loadTables() {

  /*
    Читаем все столы из таблицы tables.
    order("name") — просто сортировка по имени.
  */
  const { data, error } =
    await supabase
      .from("tables")
      .select("*")
      .order("name")

  /*
    Диагностика в консоли.
    Можно оставить — полезно при отладке.
  */
  console.log("DATA:", data)
  console.log("ERROR:", error)

  /*
    Если Supabase вернул ошибку — показываем её и выходим.
  */
  if (error) {
    console.error(error)
    return
  }

  /*
    Очищаем поле зала перед новой отрисовкой.
    Это важно при полном перерисовывании.
  */
  hall.innerHTML = ""

  /*
    Для каждой строки таблицы создаём визуальный блок стола.
  */
  data.forEach(createTable)
}

/*
========================================
СОЗДАНИЕ ОДНОГО СТОЛА НА ЭКРАНЕ
row — это одна строка из таблицы tables
========================================
*/
function createTable(row) {

  /*
    moved = false означает:
    пользователь просто кликнул по столу.
    Если moved = true — значит он стол двигал,
    и обычный click после drag мы игнорируем.
  */
  let moved = false

  /*
    Создаём div для визуального отображения стола.
  */
  const el =
    document.createElement("div")

  /*
    Базовый класс + класс статуса.
    Например: "table free" или "table occupied"
  */
  el.className =
    "table " + (row.table_status || "free")

  /*
    Сохраняем table_id в data-атрибут,
    чтобы потом можно было легко найти именно этот стол.
  */
  el.dataset.tableId =
    row.table_id

  /*
    Текст внутри стола — имя из базы.
    Например "Table 1".
  */
  el.textContent =
    row.name || "Table"

  /*
    Позиция и размеры берутся из базы.
    Если каких-то значений нет — подставляем запасные.
  */
  el.style.left =
    (row.x ?? 0) + "px"

  el.style.top =
    (row.y ?? 0) + "px"

  el.style.width =
    (row.width ?? 120) + "px"

  el.style.height =
    (row.height ?? 120) + "px"

  /*
    Добавляем стол в поле зала.
  */
  hall.appendChild(el)

  /*
  ========================================
  НАЧАЛО ПЕРЕТАСКИВАНИЯ
  ========================================
  */
  el.addEventListener(
    "mousedown",
    e => {

      /*
        Сохраняем текущий элемент как перетаскиваемый.
      */
      dragging = el

      /*
        Сбрасываем флаг движения.
        Пока человек только нажал — это ещё не drag.
      */
      moved = false

      /*
        Запоминаем смещение мыши относительно левого верхнего угла стола.
        Это нужно, чтобы стол не прыгал.
      */
      offsetX =
        e.clientX - el.offsetLeft

      offsetY =
        e.clientY - el.offsetTop
    }
  )

  /*
  ========================================
  ФИКСИРУЕМ ФАКТ ДВИЖЕНИЯ
  ========================================
  */
  el.addEventListener(
    "mousemove",
    () => {
      if (dragging === el)
        moved = true
    }
  )

  /*
  ========================================
  ОБЫЧНЫЙ КЛИК ПО СТОЛУ
  Если стол двигали — окно не открываем.
  Если просто нажали — открываем диалог.
  ========================================
  */
  el.addEventListener(
    "click",
    () => {

      /*
        Если был drag — игнорируем click.
      */
      if (moved)
        return

      /*
        Открываем внутреннее окно для этого стола.
      */
      openTableDialog(row)
    }
  )
}

/*
========================================
ДВИЖЕНИЕ МЫШИ ПО ДОКУМЕНТУ
Если сейчас есть dragging — двигаем стол.
========================================
*/
document.addEventListener(
  "mousemove",
  e => {

    /*
      Если сейчас ничего не перетаскивается — выходим.
    */
    if (!dragging)
      return

    /*
      Новая позиция стола = положение курсора
      минус сохранённое начальное смещение.
    */
    dragging.style.left =
      e.clientX - offsetX + "px"

    dragging.style.top =
      e.clientY - offsetY + "px"
  }
)

/*
========================================
ОТПУСТИЛИ МЫШЬ
Сохраняем новые координаты в базу.
========================================
*/
document.addEventListener(
  "mouseup",
  async () => {

    /*
      Если сейчас нет перетаскиваемого стола — выходим.
    */
    if (!dragging)
      return

    /*
      Берём table_id из data-атрибута.
    */
    const table_id =
      dragging.dataset.tableId

    /*
      Берём новую позицию из inline-стилей.
      parseInt(..., 10) — переводим строку "123px" в число 123.
    */
    const x =
      parseInt(dragging.style.left, 10)

    const y =
      parseInt(dragging.style.top, 10)

    /*
      Обновляем координаты стола в таблице tables.
      .eq("table_id", table_id) — обновляем только нужный стол.
    */
   const { data, error } =
  await supabase
    .from("tables")
    .update({
      x,
      y
    })
    .eq("table_id", table_id)
    .select()

console.log("COORD UPDATE DATA:", data)
console.log("COORD UPDATE ERROR:", error)

if (error) {
  console.error("UPDATE ERROR:", error)
}

    /*
      Завершаем drag.
    */
    dragging = null
  }
)

/*
========================================
ПОДПИСКА НА REALTIME ИЗМЕНЕНИЯ ТАБЛИЦЫ tables
Это даёт мгновенное обновление зала без refresh.
========================================
*/
supabase
  .channel("tables-realtime")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "tables"
    },
    payload => {

      console.log("Realtime:", payload)

      /*
        Если запись удалили — удаляем и стол со страницы.
      */
      if (payload.eventType === "DELETE") {
        removeTable(payload.old)
        return
      }

      /*
        Для INSERT / UPDATE берём новое состояние строки.
      */
      const row = payload.new

      if (!row)
        return

      /*
        Обновляем уже существующий стол
        или создаём новый, если его ещё нет на странице.
      */
      updateTable(row)
    }
  )
  .subscribe((status) => {
    console.log("Realtime status:", status)
  })

/*
========================================
ОБНОВЛЕНИЕ СТОЛА НА СТРАНИЦЕ
Вызывается при realtime insert/update.
========================================
*/
function updateTable(row) {

  /*
    Ищем уже существующий DOM-элемент по table_id.
  */
  let el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  /*
    Если элемента нет — создаём новый.
    Например если запись добавили из другой вкладки.
  */
  if (!el) {
    createTable(row)
    return
  }

  /*
    Обновляем текст стола.
  */
  el.textContent =
    row.name || "Table"

  /*
    Сбрасываем старые классы статуса.
  */
  el.classList.remove(
    "free",
    "occupied",
    "reserved",
    "cleaning"
  )

  /*
    Ставим новый статус.
  */
  el.classList.add(
    row.table_status || "free"
  )

  /*
    Обновляем позицию и размеры,
    если они пришли в realtime-событии.
  */
  if (typeof row.x === "number")
    el.style.left = row.x + "px"

  if (typeof row.y === "number")
    el.style.top = row.y + "px"

  if (typeof row.width === "number")
    el.style.width = row.width + "px"

  if (typeof row.height === "number")
    el.style.height = row.height + "px"
}

/*
========================================
УДАЛЕНИЕ СТОЛА СО СТРАНИЦЫ
Используется при realtime DELETE.
========================================
*/
function removeTable(row) {

  const el =
    document.querySelector(
      `[data-table-id="${row.table_id}"]`
    )

  if (el)
    el.remove()
}

/*
========================================
ОТКРЫТИЕ ДИАЛОГОВОГО ОКНА
row — строка таблицы tables для выбранного стола
========================================
*/
function openTableDialog(row) {

  /*
    Сохраняем активный стол глобально,
    чтобы потом кнопка "Открыть стол" знала, с чем работать.
  */
  activeTable = row

  /*
    Заголовок окна = имя стола.
  */
  dialogTitle.textContent =
    row.name || "Стол"

  /*
    Формируем текстовую информацию внутри окна.
  */
  dialogBody.innerHTML =
    "Статус: " + (row.table_status || "free") + "<br>" +
    "Мест: " + (row.seats ?? 0) + "<br>" +
    "X: " + (row.x ?? 0) + " | Y: " + (row.y ?? 0)

  /*
    Показываем окно.
  */
  dialog.classList.remove("hidden")
}

/*
========================================
ЗАКРЫТИЕ ДИАЛОГОВОГО ОКНА
========================================
*/
function closeTableDialog() {
  dialog.classList.add("hidden")
  activeTable = null
}

/*
========================================
КНОПКА "ЗАКРЫТЬ" В ДИАЛОГЕ
========================================
*/
dialogCloseBtn.addEventListener(
  "click",
  closeTableDialog
)

/*
========================================
КЛИК ПО ТЁМНОМУ ФОНУ ВНЕ КАРТОЧКИ
Тоже закрывает окно.
========================================
*/
dialog.addEventListener(
  "click",
  e => {
    if (e.target === dialog)
      closeTableDialog()
  }
)

/*
========================================
КНОПКА "ОТКРЫТЬ СТОЛ"
Логика:
1. Создаём заказ в orders
2. Меняем table_status на occupied
========================================
*/
dialogOpenBtn.addEventListener(
  "click",
  async () => {

    if (!activeTable)
      return

    if (activeTable.table_status === "occupied") {
      alert("Стол уже открыт")
      return
    }

    const { data: orderData, error: orderError } =
      await supabase
        .from("orders")
        .insert({
          project_id: activeTable.project_id,
          hall_id: activeTable.hall_id,
          table_id: activeTable.table_id,
          guest_count: 2,
          shift_id: activeTable.current_shift_id
        })
        .select()

    console.log("ORDER DATA:", orderData)
    console.log("ORDER ERROR:", orderError)

    if (orderError) {
      alert("Не удалось открыть заказ")
      return
    }

    const { data: tableData, error: tableError } =
      await supabase
        .from("tables")
        .update({
          table_status: "occupied"
        })
        .eq("table_id", activeTable.table_id)
        .select()

    console.log("TABLE DATA:", tableData)
    console.log("TABLE ERROR:", tableError)

    if (tableError) {
      alert("Заказ создан, но статус стола не обновился")
      return
    }

    closeTableDialog()
  }
)

/*
========================================
ПЕРВИЧНАЯ ЗАГРУЗКА ВСЕХ СТОЛОВ
========================================
*/
loadTables()

</script>

<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">
    open table/ drag&drop  | v2.1.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<!-- ========================================
     СКРИПТ ДЛЯ ВЫВОДА ДАТЫ И ВРЕМЕНИ СБОРКИ
======================================== -->

<script>
(function () {

  /*
    Текущая дата и время в момент открытия страницы.
  */
  const now = new Date();

  /*
    Функция добавляет ведущий ноль.
    Например 7 -> 07
  */
  const pad = n =>
    String(n).padStart(2, '0');

  /*
    Формируем дату.
  */
  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /*
    Формируем время.
  */
  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /*
    Пишем в нижнюю строку сервисной консоли.
  */
  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
