<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Hall</title>

<link rel="stylesheet"
      href="styles/console.css" />

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
  color: #243447;
  min-height: 100vh;
}

.top-bar {
  background: #2563eb;
  color: white;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.top-title {
  font-size: 22px;
  font-weight: 700;
}

.top-buttons {
  display: flex;
  gap: 10px;
}

.top-buttons button {
  border: none;
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  background: white;
  color: #2563eb;
  cursor: pointer;
}

.top-info {
  max-width: 1200px;
  margin: 16px auto 10px;
  padding: 14px 18px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.info-card {
  background: #f8fafc;
  border: 1px solid #dbe3ef;
  border-radius: 10px;
  padding: 12px;
}

.info-label {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.info-value {
  font-size: 16px;
  font-weight: 700;
  color: #0f172a;
  word-break: break-word;
}

.status {
  max-width: 1200px;
  margin: 10px auto;
  padding: 0 16px;
  color: #475569;
  font-size: 14px;
}

/*
========================================
ПАРАМЕТРЫ МАСШТАБА
меняешь только здесь
========================================
*/

:root {

  /*
  масштаб всего зала
  */

  --hall-scale: 0.5;

  /*
  масштаб столов
  */

  --table-scale: 0.65;

  /*
  размер текста на столах
  */

  --table-font-size: 10px;

}

/*
========================================
HALL WRAP
контейнер с прокруткой
========================================
*/

.hall-wrap {

  max-width: 1500px;

  margin: 0 auto 80px;

  padding: 8px;

  overflow: auto;

}

/*
========================================
HALL CANVAS
реальный размер зала
но отображаем уменьшенным
========================================
*/

.hall-canvas {

  position: relative;

  /*
  РЕАЛЬНЫЙ РАЗМЕР
  должен совпадать с редактором
  */

  width: 1460px;

  height: 1180px;

  background: #ffffff;

  border: 2px solid #cbd5e1;

  border-radius: 14px;

  overflow: hidden;

  /*
  масштаб всего зала
  */

  transform: scale(
    var(--hall-scale)
  );

  transform-origin:
    top left;

  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.03),
    0 6px 18px rgba(0,0,0,0.08);

}

/*
========================================
TABLE ITEM
уменьшаем сами столы
========================================
*/

.table-item {

  position: absolute;

  display: flex;

  align-items: center;

  justify-content: center;

  background: #7dd3fc;

  border: 2px solid #0284c7;

  color: #0f172a;

  font-weight: 800;

  font-size:
    var(--table-font-size);

  user-select: none;

  cursor: default;

  /*
  масштаб столов
  */

  transform: scale(
    var(--table-scale)
  );

  transform-origin:
    center center;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.18);

}

/*
========================================
ФОРМЫ СТОЛОВ
========================================
*/

.table-round {

  border-radius: 50%;

}

.table-square {

  border-radius: 8px;

}

.table-rect {

  border-radius: 12px;

}

/*
========================================
LABEL
========================================
*/

.table-label {

  pointer-events: none;

  text-align: center;

  line-height: 1.1;

}
</style>
</head>

<body>

<header class="top-bar">
  <div class="top-title">MySada Hall</div>

  <div class="top-buttons">
    <button id="backBtn" type="button">Back</button>
    <button id="reloadBtn" type="button">Reload</button>
  </div>
</header>

<section class="top-info">
  <div class="info-card">
    <div class="info-label">Project</div>
    <div id="projectName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">Hall</div>
    <div id="hallName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">User</div>
    <div id="userName" class="info-value">loading...</div>
  </div>
</section>

<div id="status" class="status">
  Starting...
</div>

<main class="hall-wrap">
  <div id="hallCanvas" class="hall-canvas"></div>
</main>

<div id="service-console">
  <div class="row" id="build-top">
    Hall fixed | v3.1.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>
</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectNameBox =
  document.getElementById('projectName')

const hallNameBox =
  document.getElementById('hallName')

const userNameBox =
  document.getElementById('userName')

const statusBox =
  document.getElementById('status')

const hallCanvas =
  document.getElementById('hallCanvas')

const buildDown =
  document.getElementById('build-down')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let currentProjectId =
  null

let currentProjectName =
  ''

let currentHallId =
  null

let currentHallName =
  ''

/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  buildDown.textContent =
    'deploy: '
    + pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()
    + ' '
    + pad(now.getHours())
    + ':'
    + pad(now.getMinutes())
    + ' | '
    + text
}

function setStatus(text) {
  statusBox.textContent =
    text

  console.log('[HALL]', text)

  updateBuildLine(text)
}

/*
========================================
LOAD USER
берём текущего Supabase Auth пользователя
========================================
*/

async function loadUser() {
  setStatus('Loading user...')

  const { data, error } =
    await supabase.auth.getUser()

  if (error)
    throw error

  if (!data || !data.user)
    throw new Error('User not logged in')

  currentUser = {
    user_id: data.user.id,
    email: data.user.email,
    name: data.user.email,
    role: 'user'
  }

  userNameBox.textContent =
    currentUser.name + ' / ' + currentUser.role

  sessionStorage.setItem(
    'mysada_user',
    JSON.stringify(currentUser)
  )

  return currentUser
}

/*
========================================
LOAD PROJECT
берём project из sessionStorage после Upload в index.html
========================================
*/

function loadProjectFromSession() {
  setStatus('Loading project from session...')

  const rawProject =
    sessionStorage.getItem('mysada_project')

  if (!rawProject)
    throw new Error('Project not found in sessionStorage')

  const savedProject =
    JSON.parse(rawProject)

  currentProjectId =
    savedProject.project_id

  currentProjectName =
    savedProject.project_name || savedProject.name || 'Project'

  if (!currentProjectId)
    throw new Error('Project ID is empty in sessionStorage')

  projectNameBox.textContent =
    currentProjectName + ' / ' + currentProjectId

  return currentProjectId
}

/*
========================================
LOAD HALL ID
берём hall_id из URL
========================================
*/

function loadHallIdFromUrl() {
  setStatus('Reading hall_id...')

  const params =
    new URLSearchParams(window.location.search)

  currentHallId =
    params.get('hall_id')

  if (!currentHallId)
    throw new Error('hall_id missing in URL')

  return currentHallId
}

/*
========================================
LOAD HALL INFO
грузим имя зала из базы
========================================
*/

async function loadHallInfo() {
  setStatus('Loading hall info...')

  const { data, error } =
    await supabase
      .from('halls')
      .select('*')
      .eq('hall_id', currentHallId)
      .maybeSingle()

  if (error)
    throw error

  if (!data)
    throw new Error('Hall not found: ' + currentHallId)

  currentHallName =
    data.name || 'Hall'

  hallNameBox.textContent =
    currentHallName + ' / ' + currentHallId

  return data
}

/*
========================================
LOAD TABLES
грузим столы из базы
========================================
*/

async function loadTables() {
  setStatus('Loading tables...')

  hallCanvas.innerHTML =
    ''

  const { data, error } =
    await supabase
      .from('tables')
      .select('*')
      .eq('hall_id', currentHallId)
      .order('name', { ascending: true })

  if (error)
    throw error

  if (!data || !data.length) {
    setStatus('No tables found for hall_id: ' + currentHallId)
    return
  }

  data.forEach(renderTable)

  setStatus('Tables loaded: ' + data.length)
}

/*
========================================
RENDER TABLE
столы только отображаются, не двигаются
========================================
*/

function renderTable(item) {
  const el =
    document.createElement('div')

  const shape =
    item.shape || 'square'

  const x =
    Number(item.x || 0)

  const y =
    Number(item.y || 0)

  const width =
    Number(item.width || 120)

  const height =
    Number(item.height || 120)

  let shapeClass =
    'table-square'

  if (shape === 'round')
    shapeClass =
      'table-round'

  if (shape === 'rect')
    shapeClass =
      'table-rect'

  el.className =
    'table-item ' + shapeClass

  el.style.left =
    x + 'px'

  el.style.top =
    y + 'px'

  el.style.width =
    width + 'px'

  el.style.height =
    height + 'px'

  const label =
    document.createElement('div')

  label.className =
    'table-label'

  label.textContent =
    item.name || 'Table'

  el.appendChild(label)

  hallCanvas.appendChild(el)
}

/*
========================================
BUTTONS
========================================
*/

document
  .getElementById('backBtn')
  .addEventListener('click', () => {
    window.location.href =
      'index.html'
  })

document
  .getElementById('reloadBtn')
  .addEventListener('click', async () => {
    try {
      await loadTables()
    }
    catch (err) {
      console.error(err)
      setStatus('Reload error: ' + err.message)
    }
  })

/*
========================================
INIT
единый понятный запуск
========================================
*/

async function init() {
  try {
    console.log('HALL INIT START')

    await loadUser()

    loadProjectFromSession()

    loadHallIdFromUrl()

    await loadHallInfo()

    await loadTables()
  }
  catch (err) {
    console.error('HALL INIT ERROR:', err)

    setStatus(
      'Hall error: ' + err.message
    )
  }
}

init()

</script>



  /*
    ========================================
    КОНСОЛЬ
    ========================================
  */
     

<div id="service-console">

  <div class="row" id="build-top">
    размеры и масштаб | v3.1.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
