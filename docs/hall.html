<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<title>MySada Hall</title>

<link rel="stylesheet"
      href="styles/console.css" />

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f6;
  color: #243447;
  min-height: 100vh;
}

.top-bar {
  background: #2563eb;
  color: white;
  padding: 14px 18px;

  display: flex;
  align-items: center;
  justify-content: space-between;
}

.top-title {
  font-size: 22px;
  font-weight: 700;
}

.top-buttons {
  display: flex;
  gap: 10px;
}

.top-buttons button {
  border: none;
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  background: white;
  color: #2563eb;
  cursor: pointer;
}

.top-buttons button:hover {
  background: #e5edff;
}

.top-info {
  max-width: 1200px;
  margin: 16px auto 10px;
  padding: 14px 18px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.info-card {
  background: #f8fafc;
  border: 1px solid #dbe3ef;
  border-radius: 10px;
  padding: 12px;
}

.info-label {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.info-value {
  font-size: 16px;
  font-weight: 700;
  color: #0f172a;
  word-break: break-word;
}

.status {
  max-width: 1200px;
  margin: 10px auto;
  padding: 0 16px;
  color: #475569;
  font-size: 14px;
}

.hall-wrap {
  max-width: 1200px;
  margin: 0 auto 80px;
  padding: 16px;
}

.hall-canvas {
  position: relative;
  width: 100%;
  height: 680px;
  background: #ffffff;
  border: 2px solid #cbd5e1;
  border-radius: 14px;
  overflow: hidden;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.03),
    0 6px 18px rgba(0,0,0,0.08);
}

.table-item {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;

  background: #7dd3fc;
  border: 2px solid #0284c7;
  color: #0f172a;

  font-weight: 800;
  font-size: 18px;

  user-select: none;
  cursor: default;

  box-shadow: 0 4px 10px rgba(0,0,0,0.18);
}

.table-round {
  border-radius: 50%;
}

.table-square {
  border-radius: 8px;
}

.table-rect {
  border-radius: 12px;
}

.table-label {
  pointer-events: none;
  text-align: center;
  line-height: 1.1;
}

@media (max-width: 800px) {
  .top-info {
    grid-template-columns: 1fr;
    margin-left: 12px;
    margin-right: 12px;
  }

  .hall-canvas {
    height: 560px;
  }
}
</style>
</head>

<body>

<header class="top-bar">

  <div class="top-title">
    MySada Hall
  </div>

  <div class="top-buttons">
    <button id="backBtn" type="button">
      Back
    </button>

    <button id="reloadBtn" type="button">
      Reload
    </button>
  </div>

</header>

<section class="top-info">

  <div class="info-card">
    <div class="info-label">Project</div>
    <div id="projectName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">Hall</div>
    <div id="hallName" class="info-value">loading...</div>
  </div>

  <div class="info-card">
    <div class="info-label">User</div>
    <div id="userName" class="info-value">loading...</div>
  </div>

</section>

<div id="status" class="status">
  Loading hall from database...
</div>

<main class="hall-wrap">
  <div id="hallCanvas" class="hall-canvas"></div>
</main>

<div id="service-console">
  <div class="row" id="build-top">
    Hall | v1.2.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>
</div>

<script type="module">

import { supabase }
from "./scripts/config.js"

/*
========================================
DOM
========================================
*/

const projectNameBox =
  document.getElementById('projectName')

const hallNameBox =
  document.getElementById('hallName')

const userNameBox =
  document.getElementById('userName')

const statusBox =
  document.getElementById('status')

const hallCanvas =
  document.getElementById('hallCanvas')

const buildDown =
  document.getElementById('build-down')

/*
========================================
STATE
========================================
*/

let currentUser =
  null

let currentProject =
  null

let currentHall =
  null

let currentHallId =
  null

/*
========================================
STATUS
========================================
*/

function updateBuildLine(text) {
  const now =
    new Date()

  const pad =
    n => String(n).padStart(2, '0')

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes())

  buildDown.textContent =
    'deploy: ' + date + ' ' + time + ' | ' + text
}

function setStatus(text) {
  statusBox.textContent =
    text

  console.log('[HALL]', text)

  updateBuildLine(text)
}

/*
========================================
LOAD USER FROM SESSION
НЕ ГРУЗИМ ЮЗЕРА ИЗ URL
НЕ ДЕЛАЕМ SUPABASE AUTH
========================================
*/

function loadUserFromSession() {
  const raw =
    sessionStorage.getItem('mysada_user')

  if (!raw) {
    userNameBox.textContent =
      'No user in session'

    setStatus(
      'User not saved in sessionStorage'
    )

    return null
  }

  try {
    currentUser =
      JSON.parse(raw)
  } catch (err) {
    console.error(err)

    userNameBox.textContent =
      'User session error'

    setStatus(
      'User session parse error: ' + err.message
    )

    return null
  }

  userNameBox.textContent =
    (currentUser.name || '-') +
    ' / ' +
    (currentUser.role || '-')

  setStatus(
    'User loaded from session: ' + currentUser.name
  )

  return currentUser
}

/*
========================================
LOAD PROJECT ИЗ SESSION
никаких user.project_id
========================================
*/

function loadProjectFromSession() {

  const raw =
    sessionStorage.getItem(
      'mysada_project'
    )

  if (!raw) {

    setStatus(
      'Project error: project not found in session'
    )

    return null
  }

  const saved =
    JSON.parse(raw)

  currentProjectId =
    saved.project_id

  currentProjectName =
    saved.project_name

  projectNameLabel.textContent =
    currentProjectName

  addConsoleMessage(
    'Project loaded: '
    + currentProjectName
    + ' / '
    + currentProjectId
  )

  return currentProjectId

}
/*
========================================
LOAD HALL FROM DATABASE
Берём первый зал проекта
========================================
*/

async function loadHall() {
  const projectId =
    currentUser.project_id

  const { data, error } =
    await supabase
      .from('halls')
      .select('*')
      .eq('project_id', projectId)
      .order('created_at', { ascending: true })
      .limit(1)
      .maybeSingle()

  if (error) {
    console.error(error)

    hallNameBox.textContent =
      'Hall load error'

    setStatus(
      'Hall load error: ' + error.message
    )

    return null
  }

  if (!data) {
    hallNameBox.textContent =
      'Hall not found'

    setStatus(
      'Hall not found for project: ' + projectId
    )

    return null
  }

  currentHall =
    data

  currentHallId =
    data.hall_id || data.id

  hallNameBox.textContent =
    (data.name || 'Hall') +
    ' / ' +
    currentHallId

  setStatus(
    'Hall loaded: ' + data.name
  )

  return data
}

/*
========================================
LOAD TABLES
СТОЛЫ НЕ ДВИГАЮТСЯ
диагностика без зависания
========================================
*/

async function loadTables() {

  setStatus(
    'Loading tables... hall_id: ' + currentHallId
  )

  console.log(
    'LOAD TABLES START',
    {
      currentProjectId,
      currentHallId
    }
  )

  const { data, error } =
    await supabase
      .from('tables')
      .select('*')
      .eq('hall_id', currentHallId)

  if (error) {

    console.error(
      'TABLES ERROR:',
      error
    )

    setStatus(
      'Tables error: ' + error.message
    )

    return
  }

  console.log(
    'TABLES DATA:',
    data
  )

  if (!data || !data.length) {

    setStatus(
      'No tables found for hall_id: ' + currentHallId
    )

    return
  }

  hallCanvas.innerHTML =
    ''

  data.forEach(renderTable)

  setStatus(
    'Tables loaded: ' + data.length
  )

}

/*
========================================
RENDER TABLE
NO DRAG
NO MOVE
NO EDIT
========================================
*/

function renderTable(item) {
  const el =
    document.createElement('div')

  const shape =
    item.shape || 'square'

  const x =
    Number(item.x || 0)

  const y =
    Number(item.y || 0)

  const width =
    Number(item.width || 120)

  const height =
    Number(item.height || 120)

  let shapeClass =
    'table-square'

  if (shape === 'round') {
    shapeClass =
      'table-round'
  }

  if (shape === 'rect') {
    shapeClass =
      'table-rect'
  }

  el.className =
    'table-item ' + shapeClass

  el.style.left =
    x + 'px'

  el.style.top =
    y + 'px'

  el.style.width =
    width + 'px'

  el.style.height =
    height + 'px'

  el.dataset.tableId =
    item.table_id || item.id || ''

  const label =
    document.createElement('div')

  label.className =
    'table-label'

  label.textContent =
    item.name || 'Table'

  el.appendChild(label)

  hallCanvas.appendChild(el)
}

/*
========================================
BUTTONS
========================================
*/

document
  .getElementById('backBtn')
  .addEventListener('click', () => {
    window.location.href =
      'index.html'
  })

document
  .getElementById('reloadBtn')
  .addEventListener('click', async () => {
    await loadTables()
  })

/*
========================================
INIT HALL
жесткий запуск без скрытых зависимостей
========================================
*/

async function init() {

  /*
  ========================================
  СТАРТ
  ========================================
  */

  console.log('HALL INIT START')

  setStatus(
    'Loading hall from database...'
  )

  /*
  ========================================
  USER ИЗ AUTH
  ========================================
  */

  let userData

  try {

    const { data, error } =
      await supabase.auth.getUser()

    if (error)
      throw error

    if (!data || !data.user) {

      setStatus(
        'User not logged in'
      )

      window.location.href =
        'sign.html'

      return
    }

    userData =
      data.user

  }
  catch (err) {

    console.error(
      'AUTH ERROR:',
      err
    )

    setStatus(
      'Auth error: '
      + err.message
    )

    return
  }

  currentUser = {
    user_id:
      userData.id,

    email:
      userData.email
  }

  console.log(
    'USER OK:',
    currentUser
  )

  /*
  ========================================
  PROJECT ИЗ SESSION
  ========================================
  */

  const rawProject =
    sessionStorage.getItem(
      'mysada_project'
    )

  console.log(
    'SESSION PROJECT:',
    rawProject
  )

  if (!rawProject) {

    setStatus(
      'Project error: project not found in session'
    )

    return
  }

  const savedProject =
    JSON.parse(rawProject)

  currentProjectId =
    savedProject.project_id

  currentProjectName =
    savedProject.project_name

  /*
  ========================================
  ВЫВОД PROJECT
  ========================================
  */

  const projectBox =
    document.getElementById(
      'projectNameBox'
    )

  if (projectBox)
    projectBox.textContent =
      currentProjectName

  console.log(
    'PROJECT OK:',
    currentProjectId
  )

  /*
  ========================================
  HALL ИЗ URL
  ========================================
  */

  const params =
    new URLSearchParams(
      window.location.search
    )

  currentHallId =
    params.get('hall_id')

  console.log(
    'HALL ID:',
    currentHallId
  )

  if (!currentHallId) {

    setStatus(
      'Hall error: hall_id missing'
    )

    return
  }

  const hallBox =
    document.getElementById(
      'hallNameBox'
    )

  if (hallBox)
    hallBox.textContent =
      'Loading hall...'

  /*
  ========================================
  ЗАГРУЗКА TABLES
  ========================================
  */

  try {

    console.log(
      'LOAD TABLES START'
    )

    await loadTables()

    console.log(
      'TABLES LOADED'
    )

    setStatus(
      'Hall ready'
    )

  }
  catch (err) {

    console.error(
      'LOAD TABLES ERROR:',
      err
    )

    setStatus(
      'Load tables error: '
      + err.message
    )

  }

}
init()

      
</script>


  /*
    ========================================
    КОНСОЛЬ
    ========================================
  */
     

<div id="service-console">

  <div class="row" id="build-top">
    жесткий запуск | v3.0.6
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<script>
(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: ' + date + ' ' + time;

})();
</script>

</body>
</html>
